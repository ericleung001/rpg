<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的背包</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { 
            background-color: #2c3e50; color: #fff; 
            font-family: 'Press Start 2P', monospace; 
            text-align: center; padding: 15px; 
            display:flex; flex-direction:column; align-items:center; 
            height: 100dvh; margin:0; box-sizing:border-box; 
            overflow: hidden;
        }
        .header { width: 100%; max-width: 600px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .gold-display { color: #f1c40f; font-size: 14px; font-weight: bold; }
        h1 { font-size: 20px; margin: 0; }
        
        /* 分類按鈕列 */
        .category-bar, .category-bar-2 {
            width: 100%; max-width: 600px;
            display: grid; gap: 5px; 
            margin-bottom: 5px;
        }
        .category-bar { grid-template-columns: repeat(5, 1fr); } 
        .category-bar-2 { grid-template-columns: repeat(3, 1fr); margin-bottom: 15px; } 

        .cat-btn {
            background: #34495e; color: #bdc3c7; border: 2px solid #7f8c8d;
            padding: 8px 0; font-family: inherit; font-size: 10px; cursor: pointer;
            border-radius: 6px; outline: none; white-space: nowrap;
        }
        .cat-btn.active { 
            background: #e67e22; color: #fff; border-color: #fff; font-weight: bold;
        }

        .container { 
            display: flex; flex: 1; width: 100%; max-width: 600px; 
            flex-direction: column; overflow: hidden; margin-bottom: 15px; 
        }
        .bag-list { 
            flex: 1; background: #34495e; border: 3px solid #bdc3c7; 
            overflow-y: auto; padding: 10px; border-radius: 8px; 
        }
        .item-card { 
            background: #ecf0f1; color: #2c3e50; 
            padding: 15px; margin-bottom: 10px; 
            border-radius: 8px; text-align: left; 
            border-bottom: 4px solid #95a5a6;
        }
        .item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .item-name { font-size: 14px; font-weight: bold; color: #2980b9; }
        .item-count { font-size: 14px; background: #2c3e50; color: #fff; padding: 2px 6px; border-radius: 4px; }
        .item-desc { font-size: 10px; color: #7f8c8d; margin-bottom: 10px; }
        .plus-tag { color: #f1c40f; font-weight: bold; margin-left: 5px; }

        .action-btns { display: flex; gap: 8px; flex-wrap: wrap; }
        
        .btn { 
            padding: 10px; font-family: inherit; font-size: 10px; cursor: pointer; flex: 1;
            border: 2px solid rgba(0,0,0,0.2); color: white; border-radius: 6px; font-weight: bold;
        }
        .btn:active { transform: translateY(2px); filter: brightness(0.9); }
        .btn-npc { background: #e74c3c; } 
        .btn-market { background: #3498db; }
        .btn-dismantle { background: #8e44ad; } 
        .btn-use { background: #27ae60; } 

        .back-btn { 
            background: #7f8c8d; color: white; padding: 15px; 
            text-decoration: none; font-size: 14px; 
            border: 3px solid #fff; display: block; 
            width: 100%; max-width: 600px; box-sizing: border-box; border-radius: 8px;
        }

        /* === 彈窗樣式 === */
        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); display: none; 
            flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
        .modal-box { 
            background: #fff; color: #000; 
            padding: 25px; border: 6px solid #f1c40f; 
            width: 80%; max-width: 300px; border-radius: 12px; text-align: center;
        }
        
        .input-group { margin: 15px 0; }
        .input-label { display: block; font-size: 10px; color: #555; margin-bottom: 5px; text-align: left;}
        input { 
            width: 100%; padding: 12px; margin-bottom: 5px;
            font-family: inherit; font-size: 14px; 
            box-sizing: border-box; border: 2px solid #ccc; text-align: center;
        }
        
        /* 數量調整按鈕樣式 */
        .qty-controls {
            display: flex; align-items: center; justify-content: center; gap: 5px; margin-bottom: 10px;
        }
        .qty-btn {
            width: 35px; height: 35px; background: #bdc3c7; border: none; 
            font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 5px;
            font-family: inherit; color: #2c3e50;
        }
        .qty-btn:active { background: #95a5a6; }
        .qty-input { width: 60px !important; margin: 0 !important; }
        .max-btn {
            background: #f39c12; color: white; border: none; 
            font-size: 10px; padding: 5px 8px; border-radius: 4px; cursor: pointer; font-family: inherit;
        }

        #game-toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.95); border: 2px solid #f1c40f;
            color: #fff; padding: 15px 30px; border-radius: 30px; z-index: 9999;
            font-size: 14px; font-weight: bold; transition: top 0.5s ease-in-out;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="game-toast"></div>

    <div class="header">
        <h1>🎒 背包</h1>
        <div class="gold-display">💰 <span id="my-gold">0</span> G</div>
    </div>

    <div class="category-bar">
        <button class="cat-btn active" onclick="setFilter('all')">全部</button>
        <button class="cat-btn" onclick="setFilter('consumable')">消耗品</button>
        <button class="cat-btn" onclick="setFilter('food')">料理</button>
        <button class="cat-btn" onclick="setFilter('material')">材料</button>
        <button class="cat-btn" onclick="setFilter('card')">卡牌</button>
    </div>
    <div class="category-bar-2">
        <button class="cat-btn" onclick="setFilter('weapon')">武器</button>
        <button class="cat-btn" onclick="setFilter('armor')">防具</button>
        <button class="cat-btn" onclick="setFilter('accessory')">飾品</button>
    </div>

    <div class="container">
        <div class="bag-list" id="bag-list">
            <div style="font-size:12px; color:#aaa; margin-top:20px;">載入中...</div>
        </div>
    </div>

    <a href="hub.html" class="back-btn">◀ 返回大廳</a>

    <div id="market-modal" class="modal-overlay">
        <div class="modal-box">
            <h3 id="market-title" style="font-size:16px; margin-bottom:10px;">上架物品</h3>
            
            <div class="input-group">
                <span class="input-label">單價 (G)</span>
                <input type="number" id="sell-price" placeholder="輸入單價" max="999999">
            </div>

            <div class="input-group">
                <span class="input-label">數量 (Max: 30)</span>
                <input type="number" id="market-sell-amount" value="1" min="1" max="30">
                <div style="font-size: 9px; color: #888; text-align: right;">擁有: <span id="owned-count">0</span></div>
            </div>

            <button class="btn btn-market" style="width:100%; margin-bottom:10px;" onclick="confirmMarketSell()">確認上架</button>
            <button class="btn" style="background:#555; width:100%;" onclick="closeAllModals()">取消</button>
        </div>
    </div>

    <div id="npc-modal" class="modal-overlay">
        <div class="modal-box">
            <h3 style="font-size:16px; margin-bottom:10px; color:#e74c3c;">賣給商人</h3>
            
            <div style="margin-bottom:15px; font-size:12px;">
                <div style="color:#2980b9; font-weight:bold; font-size:14px; margin-bottom:5px;" id="npc-item-name">物品名稱</div>
                <div style="color:#555;">回收單價: <span id="npc-unit-price" style="color:#f1c40f; font-weight:bold;">0</span> G</div>
                <div style="color:#888; font-size:10px;">擁有數量: <span id="npc-own-qty">0</span></div>
            </div>

            <div class="qty-controls">
                <button class="qty-btn" onclick="adjustNpcSell(-1)">-</button>
                <input type="number" id="npc-sell-amount" class="qty-input" value="1" min="1" oninput="updateNpcTotal()">
                <button class="qty-btn" onclick="adjustNpcSell(1)">+</button>
                <button class="max-btn" onclick="npcSellMax()">最大</button>
            </div>

            <div style="margin-bottom:20px; font-weight:bold; color:#27ae60; font-size:14px;">
                總獲利: <span id="npc-total-price">0</span> G
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button class="btn" style="background:#e74c3c;" onclick="confirmNPCSell()">賣出</button>
                <button class="btn" style="background:#7f8c8d;" onclick="closeAllModals()">取消</button>
            </div>
        </div>
    </div>

        function showMsg(text) {
            const t = document.getElementById('game-toast');
            t.innerHTML = text; // allow html
            t.style.top = "30px"; 
            setTimeout(() => { t.style.top = "-100px"; }, 3000);
        }

        // 切換分類函數
        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderBag();
        }

        // 渲染背包 (含過濾邏輯)
        function renderBag() {
            const list = document.getElementById('bag-list');
            list.innerHTML = '';
            
            let keys = Object.keys(myInventory).filter(k => myInventory[k] > 0);
            
            // --- 分類邏輯 ---
            if (currentFilter !== 'all') {
                keys = keys.filter(key => {
                    const id = key.toLowerCase();
                    if (currentFilter === 'consumable') return id.includes('potion') || id.includes('elixir') || id.includes('enhance_stone');
                    if (currentFilter === 'food') return id.includes('grilled') || id.includes('sushi') || id.includes('steak') || id.includes('rice') || id.includes('soup') || id.includes('plate');
                    if (currentFilter === 'weapon') return id.includes('sword') || id.includes('bow') || id.includes('staff') || id.includes('dagger') || id.includes('axe') || id.includes('spear') || id.includes('blade') || id.includes('saber') || id.includes('slayer') || id.includes('reaper') || id.includes('club') || id.includes('tooth') || id.includes('dag') || id.includes('weapon');
                    if (currentFilter === 'armor') return id.includes('armor') || id.includes('mail') || id.includes('vest') || id.includes('plate') || id.includes('robe') || id.includes('cloak');
                    
                    if (currentFilter === 'accessory') {
                        return id.includes('ring') || id.includes('necklace') || id.includes('amulet') || 
                               id.includes('bracelet') || id.includes('boots') || id.includes('crown') || 
                               id.includes('_acc') || id.includes('singularity_acc');
                    }
                    
                    if (currentFilter === 'card') return id.startsWith('card_'); 

                    // 材料 (排除所有裝備和消耗品, 以及卡片)
                    if (currentFilter === 'material') {
                        // 🟢 [修正] 材料判斷也要排除碎片飾物
                        return !id.includes('potion') && !id.includes('elixir') && !id.includes('enhance_stone') && 
                               !id.includes('grilled') && !id.includes('sushi') && !id.includes('steak') && !id.includes('rice') && !id.includes('soup') && !id.includes('plate') &&
                               !id.includes('sword') && !id.includes('bow') && !id.includes('staff') && 
                               !id.includes('dagger') && !id.includes('axe') && !id.includes('spear') && 
                               !id.includes('blade') && !id.includes('saber') && !id.includes('slayer') && 
                               !id.includes('reaper') && !id.includes('club') && !id.includes('tooth') && !id.includes('dag') && !id.includes('weapon') &&
                               !id.includes('armor') && !id.includes('mail') && !id.includes('vest') && !id.includes('robe') && !id.includes('cloak') && 
                               !id.includes('ring') && !id.includes('necklace') && !id.includes('amulet') && !id.includes('bracelet') && !id.includes('boots') && !id.includes('crown') &&
                               !id.includes('_acc') && !id.includes('singularity_acc') &&
                               !id.includes('shard_') && // 排除所有 shard_ 開頭的飾物
                               !id.includes('plate') && 
                               !id.startsWith('card_') && true; 
                    }
                    return true;
                });
            }

            if (keys.length === 0) {
                list.innerHTML = '<div style="margin-top:20px; font-size:12px; color:#aaa;">此分類沒有物品</div>';
                return;
            }

            keys.forEach(key => {
                let item = ITEM_DB[key];
                
                if (!item) {
                     if (key.startsWith('card_')) {
                        const monsterKey = key.replace('card_', '');
                        const cardName = CARD_NAME_MAP[monsterKey] || monsterKey;
                        item = { name: `卡片: ${cardName}`, cost: 100, desc: "可用於卡牌對戰" };
                     } else {
                        item = { name: key, cost: 10, desc: "未知物品" };
                     }
                }

                let npcPrice = Math.floor((item.cost || 10) * 0.2);
                if(npcPrice < 1) npcPrice = 1;

                // 計算裝備中數量 & 可用數量
                const equippedCount = Object.values(myEquipment).filter(e => e === key).length;
                const totalCount = myInventory[key] || 0;
                const availableCount = totalCount - equippedCount;
                const isEquipped = equippedCount > 0;

                // 判斷是否可分解（裝備類，非消耗品禁分解，有RECIPE才能分解—server會判斷）
                const kid = key.toLowerCase();
                const isEquipmentType = kid.includes('sword') || kid.includes('bow') || kid.includes('staff') || kid.includes('dagger') || kid.includes('axe') || kid.includes('blade') || kid.includes('saber') || kid.includes('slayer') || kid.includes('reaper') || kid.includes('armor') || kid.includes('mail') || kid.includes('plate') || kid.includes('robe') || kid.includes('cloak') || kid.includes('ring') || kid.includes('necklace') || kid.includes('amulet') || kid.includes('crown') || kid.includes('weapon') || kid.includes('_acc') || kid.includes('vest') || kid.includes('boots') || kid.includes('belt') || kid.includes('bracelet') || kid.includes('earring') || kid.includes('charm') || kid.includes('pendant') || kid.includes('spear') || kid.includes('scythe') || kid.includes('club') || kid.includes('dag') || kid.includes('tooth') || kid.includes('neck') || kid.includes('core') || kid.includes('_wep');
                const isShopItem = NPC_SHOP_ALLOW_LIST.includes(key);
                const showDismantle = isEquipmentType && !isShopItem && !PROHIBITED_DISMANTLE.includes(key) && availableCount > 0;

                let useBtn = '';
                if (key === 'lucky_bag') { 
                    useBtn = `<button class="btn btn-use" onclick="useItem('${key}')">使用</button>`;
                }

                let sellBtns = '';
                if (!PROHIBITED_ITEMS.includes(key) && !key.startsWith('card_') && availableCount > 0) {
                    sellBtns = `
                        <button class="btn btn-npc" onclick="openNPCModal('${key}', '${item.name}', ${npcPrice})">
                            賣店 (${npcPrice}G)
                        </button>
                        <button class="btn btn-market" onclick="openMarketModal('${key}', '${item.name}', ${availableCount})">
                            上架市集
                        </button>
                    `;
                }

                const lv = myEnhancements[key] || 0;
                let displayName = item.name;
                if (lv > 0) displayName += `<span class="plus-tag">+${lv}</span>`;
                if (isEquipped) displayName += `<span style="color:#27ae60; font-size:10px; margin-left:5px;">[裝備中]</span>`;

                // 耐久度顯示（只對裝備類顯示）
                let durabilityHtml = '';
                let repairBtn = '';
                if (isEquipmentType) {
                    const curDur = (myDurability[key] !== undefined) ? myDurability[key] : MAX_DURABILITY;
                    const durPct = Math.min(100, Math.round((curDur / MAX_DURABILITY) * 100));
                    const durColor = getDurColor(curDur);
                    durabilityHtml = `
                        <div style="margin:6px 0 4px; font-size:9px; color:#555;">
                            耐久度：<span style="color:${durColor};font-weight:bold;">${curDur}/${MAX_DURABILITY}</span>
                            <div style="background:#ccc;border-radius:4px;height:6px;margin-top:3px;">
                                <div style="background:${durColor};width:${durPct}%;height:6px;border-radius:4px;transition:width 0.3s;"></div>
                            </div>
                        </div>`;
                    if (curDur < MAX_DURABILITY) {
                        const repCost = getRepairCostClient(key, curDur);
                        repairBtn = `<button class="btn" style="background:#16a085;" onclick="confirmRepair('${key}', '${item.name}', ${repCost})">🔧 維修 (${repCost}碎片)</button>`;
                    }
                }

                // 棄置按鈕：所有裝備類均可顯示（不限耐久度）
                let discardBtn = '';
                if (isEquipmentType) {
                    const curDurForDiscard = (myDurability[key] !== undefined) ? myDurability[key] : MAX_DURABILITY;
                    discardBtn = `<button class="btn" style="background:#c0392b; font-size:9px;" onclick="confirmDiscard('${key}', '${item.name}', ${curDurForDiscard})">🗑️ 棄置</button>`;
                }

                const div = document.createElement('div');
                div.className = 'item-card';
                div.innerHTML = `
                    <div class="item-header">
                        <span class="item-name">${displayName}</span>
                        <span class="item-count">x${totalCount}${equippedCount > 0 ? ` <span style="color:#27ae60;font-size:10px;">(可用:${availableCount})</span>` : ''}</span>
                    </div>
                    <div class="item-desc">${item.desc}</div>
                    ${durabilityHtml}
                    <div class="action-btns">
                        ${useBtn}
                        ${repairBtn}
                        ${discardBtn}
                        ${sellBtns}
                        ${showDismantle ? `<button class="btn btn-dismantle" onclick="confirmDismantle('${key}', '${item.name}')">分解</button>` : ''}
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function useItem(id) {
            if(confirm("確定要使用這個物品嗎？")) {
                socket.emit('useItem', id);
            }
        }

        function confirmDismantle(id, name) {
            if (confirm(`⚠️ 確定要分解【${name}】嗎？\n\n1. 裝備將會消失。\n2. 僅退還 50% 製作材料 / 碎片。`)) {
                socket.emit('dismantleItem', id);
            }
        }

        function confirmRepair(id, name, cost) {
            const owned = myInventory['skill_shard'] || 0;
            if (owned < cost) {
                showMsg(`❌ 碎片不足！需要 ${cost} 塊，你只有 ${owned} 塊。`);
                return;
            }
            if (confirm(`🔧 維修【${name}】\n\n需要消耗 ${cost} 塊技能碎片\n你目前有 ${owned} 塊\n\n確定維修嗎？`)) {
                socket.emit('repairItem', id);
            }
        }

        function confirmDiscard(id, name, curDur) {
            const totalCount = myInventory[id] || 0;
            const isEquipped = Object.values(myEquipment || {}).includes(id);
            const backupCount = isEquipped ? totalCount : totalCount;

            let msg = `🗑️ 棄置【${name}】\n\n目前耐久度：${curDur}/100\n`;
            if (isEquipped) {
                if (backupCount <= 0) {
                    showMsg(`❌ 棄置失敗！【${name}】正在裝備中，背包無備用件。請先購買備用品。`);
                    return;
                }
                msg += `裝備中：換上備用件（背包剩 ${backupCount} 件），耐久重置為 100。\n\n⚠️ 損壞件將永久消失，確定棄置嗎？`;
            } else {
                msg += `背包中共 ${totalCount} 件，將棄置1件（耐久記錄清除）。\n\n⚠️ 此操作不可撤銷，確定棄置嗎？`;
            }
            if (confirm(msg)) {
                socket.emit('discardEquipment', id);
            }
        }

        // 賣給商人 Modal 控制
        function openNPCModal(id, name, price) {
            currentItemId = id;
            currentNpcPrice = price;
            currentNpcMax = myInventory[id] || 0;

            document.getElementById('npc-item-name').innerText = name;
            document.getElementById('npc-unit-price').innerText = price;
            document.getElementById('npc-own-qty').innerText = currentNpcMax;
            
            // 重置輸入
            const input = document.getElementById('npc-sell-amount');
            input.value = 1;
            input.max = currentNpcMax;
            
            updateNpcTotal();
            document.getElementById('npc-modal').style.display = 'flex';
        }

        function adjustNpcSell(delta) {
            const input = document.getElementById('npc-sell-amount');
            let val = parseInt(input.value) + delta;
            if (val < 1) val = 1;
            if (val > currentNpcMax) val = currentNpcMax;
            input.value = val;
            updateNpcTotal();
        }

        function npcSellMax() {
            document.getElementById('npc-sell-amount').value = currentNpcMax;
            updateNpcTotal();
        }

        function updateNpcTotal() {
            const input = document.getElementById('npc-sell-amount');
            let val = parseInt(input.value);
            if (isNaN(val) || val < 1) val = 1;
            if (val > currentNpcMax) val = currentNpcMax;
            
            const total = val * currentNpcPrice;
            document.getElementById('npc-total-price').innerText = total;
        }

        function confirmNPCSell() { 
            const amount = parseInt(document.getElementById('npc-sell-amount').value);
            if (!amount || amount < 1 || amount > currentNpcMax) {
                showMsg("❌ 數量不正確");
                return;
            }
            socket.emit('npcSell', { itemId: currentItemId, amount: amount }); 
        }

        function openMarketModal(id, name, count) {
            currentItemId = id; 
            document.getElementById('market-title').innerText = `上架: ${name}`;
            document.getElementById('sell-price').value = '';
            
            const amountInput = document.getElementById('market-sell-amount');
            amountInput.value = 1; 
            amountInput.max = Math.min(30, count); 
            document.getElementById('owned-count').innerText = count;

            document.getElementById('market-modal').style.display = 'flex';
        }

        function confirmMarketSell() {
            const priceVal = document.getElementById('sell-price').value;
            const amountVal = document.getElementById('market-sell-amount').value;
            
            const price = parseInt(priceVal);
            const amount = parseInt(amountVal);

            if (!price || price <= 0) { 
                showMsg("❌ 請輸入有效價格"); 
                return; 
            }
            if (price > 999999999) { 
                showMsg("⚠️ 價格不能超過 9.9億 G"); 
                return; 
            }
            
            if (!amount || amount < 1 || amount > 30) {
                showMsg("❌ 數量必須在 1 ~ 30 之間");
                return;
            }

            socket.emit('marketSell', { itemId: currentItemId, price: price, amount: amount });
        }

        function closeAllModals() {
            document.getElementById('market-modal').style.display = 'none';
            document.getElementById('npc-modal').style.display = 'none';
        }
    </script>
</body>
</html>
