<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>幸運彩票</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { 
            background-color: #2c3e50; color: #fff; 
            font-family: 'Press Start 2P', monospace; 
            text-align: center; padding: 20px; 
            display: flex; flex-direction: column; align-items: center;
        }
        .header { color: #f1c40f; margin-bottom: 20px; text-shadow: 2px 2px #000; }
        
        .jackpot-box {
            background: #c0392b; padding: 15px; border-radius: 10px; border: 4px solid #e74c3c;
            margin-bottom: 20px; width: 100%; max-width: 500px; box-sizing: border-box;
            box-shadow: 0 0 20px #e74c3c; position: relative;
        }
        .jackpot-title { font-size: 12px; margin-bottom: 10px; }
        .jackpot-amount { font-size: 20px; font-weight: bold; color: #f1c40f; word-break: break-all; }
        
        /* 系統關閉時的遮罩 */
        .closed-mask {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none;
            justify-content: center; align-items: center;
            font-size: 14px; color: #e74c3c; font-weight: bold;
            z-index: 10; border-radius: 6px;
        }

        .number-grid {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px;
            max-width: 500px; margin-bottom: 20px;
        }
        .ball {
            width: 35px; height: 35px; border-radius: 50%;
            background: #ecf0f1; color: #2c3e50;
            display: flex; justify-content: center; align-items: center;
            font-size: 12px; font-weight: bold; cursor: pointer;
            border: 2px solid #bdc3c7; user-select: none;
            transition: transform 0.1s;
        }
        .ball:active { transform: scale(0.9); }
        .ball.selected { background: #e74c3c; color: white; border-color: #fff; box-shadow: 0 0 10px #e74c3c; }

        .selected-info { font-size: 12px; margin-bottom: 15px; color: #aaa; }
        .buy-btn {
            background: #27ae60; color: white; padding: 15px 30px; font-family: inherit; font-size: 14px;
            border: none; border-radius: 5px; cursor: pointer; box-shadow: 0 4px 0 #1e8449;
            transition: background 0.3s;
            width: 100%; max-width: 500px;
        }
        .buy-btn:active { transform: translateY(4px); box-shadow: none; }
        .buy-btn:disabled { background: #7f8c8d; cursor: not-allowed; box-shadow: none; transform: none; }
        
        /* 🟢 隨機快選按鈕樣式 */
        .quick-buy-grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px;
            width: 100%; max-width: 500px; margin-bottom: 10px;
        }
        .quick-btn {
            background: #8e44ad; color: white; border: 2px solid #9b59b6;
            padding: 10px 0; border-radius: 5px; cursor: pointer;
            font-family: inherit; font-size: 10px; font-weight: bold;
        }
        .quick-btn:active { transform: translateY(2px); filter: brightness(0.9); }

        .back-btn { margin-top: 20px; background: #7f8c8d; padding: 10px 20px; color: white; text-decoration: none; border-radius: 5px; font-size: 12px; display: inline-block;}

        .my-tickets-area { width: 100%; max-width: 500px; margin-top: 30px; text-align: left; }
        .section-title { font-size: 12px; color: #3498db; margin-bottom: 10px; border-bottom: 1px dashed #555; padding-bottom: 5px; }
        
        .ticket-row {
            background: rgba(0,0,0,0.3); padding: 10px; margin-bottom: 5px; border-radius: 5px;
            display: flex; flex-direction: column; gap: 5px;
            border-left: 4px solid #f1c40f;
        }
        .ticket-header { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .ticket-nums { font-size: 12px; color: #fff; letter-spacing: 1px; }
        .ticket-tag { font-size: 10px; color: #aaa; }

        .reward-box {
            font-size: 10px; color: #f1c40f; background: rgba(241, 196, 15, 0.1);
            padding: 5px; border-radius: 4px; margin-top: 5px;
            display: flex; flex-direction: column; gap: 2px;
        }
        .reward-item { color: #2ecc71; }

        .last-result {
            margin-top: 30px; border-top: 1px dashed #7f8c8d; padding-top: 10px; font-size: 10px; color: #bdc3c7; width: 100%; max-width: 500px;
        }
        .result-balls { display: flex; gap: 5px; justify-content: center; margin-top: 10px; flex-wrap: wrap; }
        .res-ball { width: 30px; height: 30px; border-radius: 50%; background: #3498db; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; margin: 2px; }

        .num-hit { color: #f1c40f; font-weight: bold; text-shadow: 0 0 5px #f1c40f; }
        .win-badge { font-size: 10px; background: #e74c3c; color: white; padding: 2px 6px; border-radius: 4px; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <h1 class="header">🎱 彩票</h1>

    <div class="jackpot-box">
        <div id="closed-msg" class="closed-mask">⛔ 暫停購買</div>
        <div class="jackpot-title">本期累積獎金</div>
        <div class="jackpot-amount" id="jackpot-display">Loading...</div>
        <div style="font-size:10px; margin-top:5px;">每晚 10:00 開獎</div>
    </div>

    <div class="selected-info">
        已選號碼: <span id="count">0</span> / 6
        <br><br>
        <span id="selected-nums" style="color:#f1c40f; min-height: 20px; display:block;">-</span>
    </div>

    <div class="number-grid" id="grid"></div>

    <button id="btn-buy" class="buy-btn" onclick="buyTicket()">自選購買 (100 G)</button>

    <div class="my-tickets-area" style="margin-top: 15px;">
        <div class="section-title" style="color: #9b59b6;">🤖 電腦隨機快選 (每注 100 G)</div>
        <div class="quick-buy-grid">
            <button class="quick-btn" onclick="buyRandom(1)">x1</button>
            <button class="quick-btn" onclick="buyRandom(5)">x5</button>
            <button class="quick-btn" onclick="buyRandom(10)">x10</button>
        </div>
    </div>

    <div class="my-tickets-area">
        <div class="section-title">🛒 本期已買 (<span id="my-ticket-count">0</span>)</div>
        <div id="my-ticket-list">
            <div style="font-size:10px; color:#aaa; padding:10px;">尚未購買</div>
        </div>
    </div>

    <div class="my-tickets-area" style="margin-top: 20px;">
        <div class="section-title" style="color: #e67e22;">📜 上期核對</div>
        <div id="last-round-list">
            <div style="font-size:10px; color:#aaa; padding:10px;">無紀錄</div>
        </div>
    </div>

    <div class="last-result" id="last-result-area" style="display:none;">
        上次開獎結果 <span id="last-draw-time" style="font-size:8px; color:#777;"></span> :
        <div class="result-balls" id="res-balls"></div>
    </div>

    <a href="hub.html" class="back-btn">◀ 返回大廳</a>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        const socket = io('https://mmo.ttctv-105.cc', { 
    transports: ['websocket', 'polling'],
    secure: true // 因為你用 https，建議加呢個
});
        
        let myToken = localStorage.getItem('rpg_token');
        if (!myToken) window.location.href = 'index.html';

        let selected = [];
        let isLotteryOpen = true;

        // 初始化 49 個號碼球
        const grid = document.getElementById('grid');
        for(let i=1; i<=49; i++) {
            const ball = document.createElement('div');
            ball.className = 'ball';
            ball.innerText = i;
            ball.onclick = () => toggleNumber(i, ball);
            grid.appendChild(ball);
        }

        function toggleNumber(n, el) {
            if (!isLotteryOpen) return; 

            if (selected.includes(n)) {
                selected = selected.filter(x => x !== n);
                el.classList.remove('selected');
            } else {
                if (selected.length >= 6) { alert("最多只能選 6 個號碼！"); return; }
                selected.push(n);
                el.classList.add('selected');
            }
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('count').innerText = selected.length;
            document.getElementById('selected-nums').innerText = selected.sort((a,b)=>a-b).join(', ');
        }

        function buyTicket() {
            if (!isLotteryOpen) { alert("⛔ 系統目前暫停購買！"); return; }
            if (selected.length !== 6) { alert("請選擇 6 個號碼！"); return; }
            if (!confirm(`確定要花費 100 G 購買號碼 [${selected.join(',')}] 嗎？`)) return;
            
            socket.emit('buyLottery', selected);
        }

        // 🟢 [新增] 隨機購買函式
        function buyRandom(count) {
            if (!isLotteryOpen) { alert("⛔ 系統目前暫停購買！"); return; }
            const cost = count * 100;
            if (!confirm(`確定要花費 ${cost.toLocaleString()} G 隨機購買 ${count} 注嗎？`)) return;
            
            // 發送新的 Socket 事件 (需要 Server 支援)
            socket.emit('buyLotteryRandom', count);
        }

        function initData() {
            socket.emit('joinGame', myToken);
            socket.emit('getLotteryData'); 
        }

        socket.on('connect', initData);
        if (socket.connected) initData();

        const ITEM_NAMES = {
            'lucky_bag': '奇蹟福袋',
            'entropy_sword': '終焉·熱寂之劍',
            'entropy_god_armor': '終焉·神之庇護',
            'nebula_plate': '星雲板甲',
            'galaxy_saber': '銀河光劍',
            'time_sand': '時光之沙',
            'enhance_stone': '強化石',
            'singularity_weapon': '奇點·萬象崩壞',
            'singularity_armor': '奇點·絕對防禦',
            'singularity_acc': '奇點·因果律',
            'infinity_blade': '無限之刃',
            'event_horizon': '視界戰甲',
            'mobius_ring': '莫比烏斯環'
        };

        socket.on('lotteryUpdate', (data) => {
            document.getElementById('jackpot-display').innerText = `$ ${data.jackpot.toLocaleString()}`;
            
            if (data.isOpen !== undefined) {
                isLotteryOpen = data.isOpen;
                const btn = document.getElementById('btn-buy');
                const mask = document.getElementById('closed-msg');
                const quickBtns = document.querySelectorAll('.quick-btn');
                
                if (isLotteryOpen) {
                    btn.disabled = false;
                    btn.innerText = "自選購買 (100 G)";
                    mask.style.display = 'none';
                    quickBtns.forEach(b => b.disabled = false);
                } else {
                    btn.disabled = true;
                    btn.innerText = "⛔ 暫停購買";
                    mask.style.display = 'flex';
                    quickBtns.forEach(b => b.disabled = true);
                }
            }

            if (data.myBets) {
                const list = document.getElementById('my-ticket-list');
                const count = document.getElementById('my-ticket-count');
                
                count.innerText = data.myBets.length;
                list.innerHTML = '';

                if (data.myBets.length === 0) {
                    list.innerHTML = '<div style="font-size:10px; color:#aaa; padding:10px;">尚未購買</div>';
                } else {
                    const reversedBets = [...data.myBets].reverse();
                    
                    reversedBets.forEach((bet, idx) => {
                        const div = document.createElement('div');
                        div.className = 'ticket-row';
                        
                        const fmtNums = bet.nums.map(n => n.toString().padStart(2, '0')).join(' - ');
                        const ticketNum = data.myBets.length - idx;

                        div.innerHTML = `
                            <div class="ticket-header">
                                <span class="ticket-nums">${fmtNums}</span>
                                <span class="ticket-tag">#${ticketNum}</span>
                            </div>
                        `;
                        list.appendChild(div);
                    });
                }
            }

            if (data.myLastBets && data.lastDraw && data.lastDraw.numbers) {
                const lastList = document.getElementById('last-round-list');
                const winNums = data.lastDraw.numbers; 
                lastList.innerHTML = '';

                if (data.myLastBets.length === 0) {
                    lastList.innerHTML = '<div style="font-size:10px; color:#aaa; padding:10px;">上期無購買紀錄</div>';
                } else {
                    data.myLastBets.forEach((bet) => {
                        const div = document.createElement('div');
                        div.className = 'ticket-row';
                        
                        let hits = 0;
                        let numsHtml = bet.nums.map(n => {
                            const isHit = winNums.includes(n);
                            if (isHit) hits++;
                            return isHit ? `<span class="num-hit">${n.toString().padStart(2,'0')}</span>` : n.toString().padStart(2,'0');
                        }).join(' - ');

                        let winTag = "";
                        let rewardHtml = "";

                        if (hits === 6) {
                            winTag = '<span class="win-badge">頭獎!</span>';
                            rewardHtml = `<div class="reward-box"><div>💰 平分獎池</div><div class="reward-item">🎁 奇蹟福袋 x1</div><div class="reward-item">🔥 奇點套裝 x1</div></div>`;
                        } else if (hits === 5) {
                            winTag = '<span class="win-badge">二獎!</span>';
                            rewardHtml = `<div class="reward-box"><div>💰 $500,000</div><div class="reward-item">🎁 奇蹟福袋 x1</div><div class="reward-item">♾️ 神話套裝 x1</div></div>`;
                        } else if (hits === 4) {
                            winTag = '<span class="win-badge">三獎</span>';
                            rewardHtml = `<div class="reward-box"><div>💰 $10,000</div><div class="reward-item">⏳ 時光之沙 x30</div></div>`;
                        } else if (hits === 3) {
                            winTag = '<span class="win-badge">安慰獎</span>';
                            rewardHtml = `<div class="reward-box"><div>💰 $500</div><div class="reward-item">💎 強化石 x30</div></div>`;
                        } else if (hits === 2) {
                            winTag = '<span class="win-badge" style="background:#3498db;">小獎</span>';
                            rewardHtml = `<div class="reward-box"><div class="reward-item">💎 強化石 x20</div></div>`;
                        } else if (hits === 1) {
                            winTag = '<span class="win-badge" style="background:#95a5a6;">參加獎</span>';
                            rewardHtml = `<div class="reward-box"><div class="reward-item">💎 強化石 x10</div></div>`;
                        }

                        div.innerHTML = `
                            <div class="ticket-header">
                                <span class="ticket-nums">${numsHtml}</span>
                                <div style="display:flex; align-items:center;">
                                    ${winTag}
                                    <span class="ticket-tag" style="margin-left:5px;">(${hits}星)</span>
                                </div>
                            </div>
                            ${rewardHtml}
                        `;
                        lastList.appendChild(div);
                    });
                }
            }

            if (data.lastDraw && data.lastDraw.numbers) {
                document.getElementById('last-result-area').style.display = 'block';
                const container = document.getElementById('res-balls');
                container.innerHTML = '';
                
                data.lastDraw.numbers.forEach(n => {
                    const b = document.createElement('div');
                    b.className = 'res-ball';
                    b.innerText = n;
                    container.appendChild(b);
                });

                if (data.lastDraw.time) {
                    const date = new Date(data.lastDraw.time);
                    document.getElementById('last-draw-time').innerText = 
                        `(${date.getMonth()+1}/${date.getDate()} ${date.getHours()}:${date.getMinutes().toString().padStart(2,'0')})`;
                }
            }
        });

        socket.on('lotteryResult', (res) => {
            alert(res.msg);
            if(res.success) {
                selected = [];
                document.querySelectorAll('.ball').forEach(b => b.classList.remove('selected'));
                updateDisplay();
            }
        });

        socket.on('errorMessage', (msg) => { alert(msg); });

    </script>
</body>
</html>
