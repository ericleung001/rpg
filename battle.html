<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>戰鬥中 (Multi-Monster)2</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { 
            background-color: #111; font-family: 'Press Start 2P', monospace; 
            height: 100dvh; margin: 0; overflow: hidden; 
            display: flex; flex-direction: column; justify-content: flex-start; align-items: center; 
            padding: 10px 10px 50px 10px; box-sizing: border-box; overscroll-behavior: none;
        }
        #game-container { 
            width: 100%; max-width: 640px; height: 100%; 
            background: linear-gradient(135deg, #a8c0b0 50%, #789080 50%); 
            border: 4px solid #2c3e50; 
            display: grid; grid-template-rows: 35px 30px 1.2fr 0.8fr 1.8fr; /* 調整高度比例 */
            position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.5); border-radius: 8px;
        }
        #turn-bar { background: #333; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; border-bottom: 4px solid #000; letter-spacing: 1px;}
        
        #auto-panel {
            background: rgba(0,0,0,0.85); color: #fff; display: flex; align-items: center; justify-content: space-between;
            padding: 0 10px; font-size: 10px; border-bottom: 2px solid #555;
        }

        /* 🟢 修改：怪物容器 (支援多怪) */
        .monsters-container {
            display: flex; justify-content: center; align-items: center; gap: 8px;
            padding: 10px 5px; overflow-x: auto;
        }
        
        .monster-card {
            background: #f0f0d8; border: 3px solid #706870; border-radius: 6px;
            padding: 5px; width: 30%; min-width: 80px; max-width: 120px;
            text-align: center; cursor: pointer; position: relative;
            box-shadow: 3px 3px 0 rgba(0,0,0,0.3); transition: transform 0.1s;
        }
        .monster-card.selected { border-color: #f1c40f; transform: translateY(-3px); box-shadow: 0 0 10px #f1c40f; }
        .monster-card.dead { opacity: 0.5; filter: grayscale(100%); pointer-events: none; border-color: #555; }
        
        .boss-sprite { 
            width: 50px; height: 50px; object-fit: contain; margin-bottom: 2px; 
            image-rendering: pixelated; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5)); 
        }
        .m-info { font-size: 9px; color: #333; font-weight: bold; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .player-area { display: flex; flex-direction: column; justify-content: center; padding: 0 10px; width: 100%; box-sizing: border-box; gap: 4px; }
        .my-status { width: 100%; box-sizing: border-box; padding: 5px; } 
        .teammates { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-top: 2px;} 
        
        .gba-box { background: #f0f0d8; border: 4px solid #706870; border-radius: 8px; padding: 5px; color: #383838; font-size: 10px; box-shadow: 4px 4px 0 rgba(0,0,0,0.3); }
        .mini-box { background: #ecf0f1; border: 2px solid #95a5a6; padding: 3px; font-size: 9px; color: #333; overflow: hidden; border-radius: 4px; }
        
        .hp-bar { width: 100%; height: 8px; background: #555; border: 2px solid #333; margin-top: 3px; border-radius: 2px; }
        .hp-fill { height: 100%; background: #48c058; transition: width 0.3s; }
        .mp-bar { width: 100%; height: 5px; background: #555; border: 2px solid #333; margin-top: 2px; border-radius: 2px; }
        .mp-fill { height: 100%; background: #3498db; transition: width 0.3s; }

        .mini-hp-bar { width: 100%; height: 4px; background: #555; margin-top: 2px; }
        .mini-hp-fill { height: 100%; background: #e74c3c; width: 100%; }

        .stat-text { font-size: 8px; margin-top: 2px; font-weight: bold; }
        
        .hud { background: #305080; border-top: 4px solid #c8c8f8; display: flex; height: 100%; overflow: hidden; }
        .log { width: 40%; padding: 8px; color: white; font-size: 9px; line-height: 1.5; overflow-y: auto; display: flex; flex-direction: column; justify-content: flex-start; border-right: 2px solid rgba(255,255,255,0.1); }
        
        .menu { 
            width: 60%; display: flex; flex-direction: column; 
            background: #fff; border-left: 4px solid #c8c8f8; 
            padding: 5px; box-sizing: border-box; position: relative; 
        }
        
        #shortcut-area {
            display: grid; grid-template-columns: 1fr 1fr; gap: 4px;
            margin-bottom: 5px; padding-bottom: 5px; border-bottom: 2px solid #ccc;
            flex-shrink: 0;
        }
        .btn-shortcut {
            background: #ecf0f1; border: 1px solid #bdc3c7; color: #2c3e50;
            font-size: 9px; padding: 8px 2px; cursor: pointer; border-radius: 4px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            font-family: inherit; font-weight: bold;
        }
        .btn-shortcut:active { background: #bdc3c7; transform: translateY(1px); }
        .btn-shortcut:disabled { opacity: 0.5; cursor: not-allowed; background: #95a5a6; }

        .fixed-top-area {
            flex-shrink: 0; padding-bottom: 5px; border-bottom: 1px solid #ccc; margin-bottom: 5px; display: none; 
        }

        .scroll-area { 
            flex: 1; overflow-y: auto; 
            display: grid; grid-template-columns: 1fr 1fr; gap: 5px; 
            align-content: start; padding-bottom: 5px;
        }

        .btn { 
            background: #f8f8f8; border: 2px solid #888; cursor: pointer; font-family: inherit; font-size: 11px; font-weight: bold; 
            text-align: center; display:flex; align-items:center; justify-content:center; border-radius: 6px; min-height: 42px;
            touch-action: manipulation; -webkit-tap-highlight-color: transparent;
        }
        .btn:active { background: #f8d030; color: #000; transform: scale(0.98); }
        .btn:disabled { background: #999; color: #555; cursor: not-allowed; opacity: 0.6; }
        
        #lobby-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .player-list { border: 4px solid #fff; padding: 20px; width: 80%; min-height: 100px; text-align: left; margin-bottom: 30px; font-size: 14px; line-height: 2; overflow-y: auto; }
        
        .start-btn { display: none; padding: 15px 30px; font-size: 16px; background: #e74c3c; color: white; border: 4px solid #c0392b; cursor: pointer; font-family: inherit; }
        .start-btn:disabled { background: #7f8c8d; border-color: #555; cursor: wait; }
        
        #chat-container { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0, 0, 0, 0.95); border-top: 4px solid #bdc3c7; display: flex; flex-direction: column; font-size: 12px; z-index: 100; padding-bottom: env(safe-area-inset-bottom); transition: height 0.3s ease-in-out; height: 35px; }
        #chat-header { height: 35px; background: #34495e; color: #fff; line-height: 35px; cursor: pointer; font-weight: bold; border-bottom: 1px solid #555; display: flex; justify-content: center; align-items: center; touch-action: manipulation; }
        .chat-open { height: 30vh !important; }
        #chat-body { flex: 1; display: none; flex-direction: column; overflow: hidden; }
        .chat-open #chat-body { display: flex; }
        #chat-history { flex: 1; overflow-y: auto; padding: 10px; text-align: left; color: white; }
        #chat-input-area { display: flex; border-top: 1px solid #555; height: 45px; }
        #chat-input { flex: 1; background: #222; color: white; border: none; padding: 0 15px; font-family: inherit; font-size: 14px; outline: none; }
        #chat-send { background: #2980b9; color: white; border: none; padding: 0 20px; cursor: pointer; font-family: inherit; font-size: 14px; font-weight: bold; touch-action: manipulation; }
        
        .shake { animation: shake 0.5s; } .flash { animation: flash 0.3s; }
        .damaged { animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both; filter: sepia(1) hue-rotate(-50deg) saturate(3) drop-shadow(0 0 10px red) !important; }
        @keyframes shake { 0%,100% {transform:translateX(0);} 25% {transform:translateX(-5px);} 75% {transform:translateX(5px);} }
        @keyframes flash { 0%,100% {filter:none;} 50% {filter:sepia(1) hue-rotate(-50deg) saturate(5);} }
        
        #game-toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.95); border: 2px solid #f1c40f; color: #fff; padding: 15px 30px; border-radius: 30px; z-index: 9999; font-size: 14px; font-weight: bold; transition: top 0.5s ease-in-out; pointer-events: none; }

        #countdown-timer { position: absolute; top: 10px; right: 10px; color: #e74c3c; font-size: 10px; font-weight: bold; display: none; background: rgba(0,0,0,0.7); padding: 5px; border-radius: 4px; }

        /* 自訂設定面板 (保留) */
        #config-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 10000; flex-direction: column; padding: 20px; box-sizing: border-box;
            color: #fff; overflow-y: auto;
        }
        .config-box { background: #2c3e50; border: 2px solid #3498db; border-radius: 8px; padding: 10px; margin-bottom: 10px; }
        .config-header { font-size: 14px; color: #f1c40f; margin-bottom: 10px; border-bottom: 1px solid #555; padding-bottom: 5px; }
        .config-row { display: flex; gap: 5px; margin-bottom: 5px; align-items: center; font-size: 10px; flex-wrap: wrap; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 4px;}
        .config-input { width: 40px; padding: 3px; background: #eee; border: none; text-align: center; }
        .config-select { padding: 3px; background: #eee; border: none; max-width: 100px;}
        .btn-del { background: #c0392b; color: white; border: none; padding: 2px 6px; font-size: 10px; cursor: pointer; border-radius: 3px;}
        .btn-add { background: #27ae60; color: white; border: none; padding: 5px 10px; font-size: 10px; cursor: pointer; width: 100%; margin-top: 5px; border-radius: 4px;}
        .config-close { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 200px; padding: 10px; background: #34495e; color: white; border: 2px solid #fff; font-weight: bold; cursor: pointer; box-shadow: 0 0 10px black; }
        
        #afk-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 99999; 
            flex-direction: column; justify-content: center; align-items: center;
        }
        .afk-box {
            background: #fff; color: #2c3e50; padding: 20px; border-radius: 10px; 
            border: 4px solid #e74c3c; text-align: center; max-width: 300px; width: 80%;
        }
        .afk-title { color: #c0392b; margin-top: 0; font-size: 16px; font-weight: bold; }
        .afk-desc { font-size: 10px; margin-bottom: 15px; color: #555; line-height: 1.5; }
        .afk-question { font-size: 20px; font-weight: bold; margin: 20px 0; color: #2980b9; word-break: break-all; }
        .afk-input { padding: 10px; font-size: 16px; width: 80%; text-align: center; margin-bottom: 10px; border: 2px solid #bdc3c7; border-radius: 5px; outline: none; }
        .afk-btn { background: #27ae60; color: white; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; width: 100%; border-radius: 5px; font-family: inherit; }
    </style>
</head>
<body>
    <div id="game-toast"></div>
    
    <div id="afk-modal">
        <div class="afk-box">
            <div class="afk-title">⚠️ 靈魂拷問 ⚠️</div>
            <div class="afk-desc">系統偵測到你操作過快，<br>請證明你不是機器人！</div>
            <div id="afk-timer-display" style="color:red; font-weight:bold; margin-bottom:10px;">剩餘時間: 60s</div>
            <div class="afk-question" id="afk-question">...</div>
            <input type="number" id="afk-answer" class="afk-input" placeholder="輸入數字答案">
            <button class="afk-btn" onclick="submitAfk()">確認</button>
        </div>
    </div>

    <div id="config-modal">
        <div style="font-size:16px; text-align:center; margin-bottom:15px; color:#3498db; font-weight:bold;">⚙️ 自訂腳本設定</div>
        <div class="config-box">
            <div class="config-header">🚨 緊急觸發 (優先執行)</div>
            <div id="trigger-list"></div>
            <button class="btn-add" onclick="addTrigger()">+ 新增條件</button>
        </div>
        <div class="config-box">
            <div class="config-header">🔄 出招循環 (順序執行)</div>
            <div id="rotation-list"></div>
            <button class="btn-add" onclick="addRotation()">+ 新增動作</button>
        </div>
        <div class="config-box">
            <div class="config-header">💧 沒魔時 (MP不足)</div>
            <select id="low-mp-action" class="config-select" style="width:100%" onchange="saveConfig()">
                <option value="attack">🗡️ 普通攻擊</option>
                <option value="item">🧪 自動喝藍水</option>
                <option value="wait">⏳ 待機</option>
            </select>
        </div>
        <div style="height: 60px;"></div> <button class="config-close" onclick="closeConfig()">💾 儲存並關閉</button>
    </div>

    <div id="game-container">
        <div id="countdown-timer">⚠️ 滅團倒數: 09:00</div>

        <div id="lobby-overlay">
            <div style="color:#f1c40f; margin-bottom:20px; font-size:18px;">等待隊友...</div>
            <div class="player-list" id="lobby-players">讀取中...</div>
            
            <div id="host-controls" style="margin-top: 20px;">
                <button class="start-btn" id="start-btn" onclick="requestStart()">房主開始</button>
            </div>
            
            <div id="waiting-txt" style="margin-top:15px; font-size:12px; color:#aaa; display:none;">(等待房主...)</div>
            <button onclick="leaveRoom()" style="margin-top:20px; background:transparent; border:2px solid #aaa; color:#aaa; cursor:pointer; font-size:12px; padding:10px;">離開房間</button>
        </div>
        
        <div id="turn-bar">等待...</div>
        
        <div id="auto-panel">
            <div style="display:flex; gap:5px; align-items:center;">
                <select id="auto-mode" onchange="updateAutoMode()" style="font-size:10px; padding:2px; border-radius:4px; border:none; background:#eee; color:#333; font-weight:bold;">
                    <option value="custom">🛠️ 自訂</option>
                    <option value="atk">⚔️ 輸出</option>
                    <option value="tank">🛡️ 坦克</option>
                    <option value="heal">💖 補師</option>
                </select>

                <button id="btn-config" onclick="openConfig()" style="background:#3498db; border:1px solid #2980b9; color:white; font-size:10px; padding:4px 8px; border-radius:4px; cursor:pointer;">⚙️ 設定</button>
                <span id="current-action-disp" style="color:#aaa; font-size:9px;">...</span>
            </div>
            <button id="auto-btn" onclick="toggleAuto()" style="background:#e74c3c; color:white; border:1px solid #555; font-size:10px; padding:4px 8px; cursor:pointer; border-radius:4px;">
                自動: OFF
            </button>
        </div>
        
        <div class="monsters-container" id="monsters-container">
            </div>
        
        <div class="player-area">
            <div class="gba-box my-status">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:3px;">
                    <span style="font-size:11px; font-weight:bold;"><span id="my-name">勇者</span>(你)</span>
                    <span style="font-size:9px; color:#f1c40f;">⚔️<span id="atk-val">0</span> 🛡️<span id="def-val">0</span></span>
                </div>
                <div class="hp-bar"><div id="php" class="hp-fill" style="width:100%"></div></div>
                <div class="mp-bar"><div id="pmp" class="mp-fill" style="width:100%"></div></div>
                <div style="font-size: 9px; margin-top: 3px; text-align:right;" id="hp-txt">...</div>
            </div>
            
            <div class="teammates" id="teammates-box"></div>
        </div>
        
        <div class="hud">
            <div class="log" id="log"><div>準備戰鬥...</div></div>
            <div class="menu" id="menu-container">
                <div id="shortcut-area"></div>

                <div id="fixed-top-area" class="fixed-top-area">
                    <button class="btn" style="width:100%; background:#ddd; color:#555;" onclick="resetButtons()">◀ 返回選單</button>
                </div>

                <div id="btns" class="scroll-area">
                    <button class="btn battle-action" onclick="act('attack')">攻擊</button>
                    <button class="btn battle-action" onclick="openSkill()">魔法</button>
                    <button class="btn battle-action" onclick="openBag()">物品</button>
                    <button class="btn" onclick="leaveRoom()">逃跑</button>
                </div>
            </div>
        </div>
    </div>
    
    <div id="chat-container">
        <div id="chat-header" onclick="toggleChat()"> 聊天室 (點擊展開)</div>
        <div id="chat-body">
            <div id="chat-history"></div>
            <div id="chat-input-area">
                <input type="text" id="chat-input" placeholder="輸入訊息..." maxlength="50">
                <button id="chat-send">發送</button>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        const socket = io('https://mmo.ttctv-105.cc', { 
    transports: ['websocket', 'polling'],
    secure: true // 因為你用 https，建議加呢個
});

        let myToken = localStorage.getItem('rpg_token');
        let isAuto = false;
        let autoMode = 'custom';
        let allPlayers = []; 
        let rotationIndex = 0; 
        let rotationCounter = 0; 
        let afkInterval = null;
        let tankAttackCounter = 0; 
        let healerAttackCounter = 0; 

        // 🟢 多怪相關變數
        let currentMonsters = []; // 存儲目前所有怪物的資料
        let selectedTargetIndex = 0; // 玩家當前選定的目標 (預設第一個)

        // 自訂模式設定
        let autoConfig = {
            triggers: [
                { type: 'hp_self', val: 30, actionType: 'item', actionId: 'potion_mid' }
            ],
            rotation: [
                { actionType: 'attack', actionId: 'normal', count: 1 }
            ],
            lowMp: 'attack'
        };

        const SKILL_INFO = {
            'fireball':      { name: "火球術", mp: 5, cat: 'atk', desc: "傷x1.5" },
            'thunder':       { name: "雷擊",   mp: 15, cat: 'atk', desc: "傷x1.2+暈" },
            'poison_touch': { name: "劇毒之觸", mp: 25, cat: 'atk', desc: "傷x2.5" },
            'frost_nova':    { name: "冰霜新星", mp: 30, cat: 'atk', desc: "傷x1.2+降防" },
            'meteor':        { name: "隕石術",   mp: 80, cat: 'atk', desc: "傷x3.5" },
            'divine_slash': { name: "次元斬",   mp: 150, cat: 'atk', desc: "傷x5.0" },
            'drain':         { name: "吸血",     mp: 20, cat: 'atk', desc: "吸血100%" },
            'void_crush':    { name: "虛空碎擊", mp: 1000, cat: 'atk', desc: "傷x10" },
            'big_bang':      { name: "宇宙大爆炸", mp: 5000, cat: 'atk', desc: "傷x25" },
            'entropy_decay':{ name: "熱寂·衰變", mp: 2500, cat: 'atk', desc: "5%真傷" },
            'holy_shield':  { name: "聖光守護", mp: 40, cat: 'buff', desc: "防禦x2" },
            'berserk':       { name: "狂暴",     mp: 60, cat: 'buff', desc: "攻x2(自殘)" },
            'god_mode':      { name: "天神下凡", mp: 300, cat: 'buff', desc: "全能x3" },
            'heal_light':    { name: "小回復",   mp: 10, cat: 'heal', desc: "HP+20%" },
            'god_light':     { name: "神之光",   mp: 50, cat: 'heal', desc: "HP+50%" },
            'heal_all':      { name: "聖光普照", mp: 100, cat: 'heal', desc: "全隊滿HP" },
            'full_heal':     { name: "大天使息", mp: 200, cat: 'heal', desc: "HP全滿" }
        };

        const SKILL_PRIORITY = {
            atk: ['big_bang', 'entropy_decay', 'void_crush', 'divine_slash', 'meteor', 'poison_touch', 'frost_nova', 'thunder', 'drain', 'fireball'],
            tank: ['god_mode', 'holy_shield', 'divine_slash', 'poison_touch', 'drain'],
            heal: ['heal_all', 'full_heal', 'god_light', 'heal_light']
        };

        const ITEM_NAMES = {
            'potion_hp': '紅水(小)', 'potion_mid': '紅水(中)', 'potion_high': '紅水(大)', 'potion_max': '秘藥', 'elixir': '甘露',
            'potion_mp': '藍水(小)', 'potion_mp_mid': '藍水(中)', 'potion_mp_high': '藍水(大)',
            'grilled_carp': '烤鯉魚', 'salmon_sushi': '鮭魚壽司', 'tuna_steak': '鮪魚排', 
            'eel_rice': '鰻魚飯', 'void_soup': '虛空湯', 'sushi_plate': '壽司拼盤'
        };

        const ITEMS_HP_DESC = ['void_soup', 'elixir', 'potion_max', 'potion_high', 'sushi_plate', 'tuna_steak', 'potion_mid', 'eel_rice', 'grilled_carp', 'potion_hp'];
        const ITEMS_MP_DESC = ['elixir', 'void_soup', 'potion_mp_high', 'potion_mp_mid', 'eel_rice', 'salmon_sushi', 'potion_mp'];

        let isMyTurn = false; 
        const params = new URLSearchParams(window.location.search);
        const roomId = params.get('room');
        let myPlayer = { mp: 0, hp: 0, maxMp: 100, maxHp: 100, skills: ['fireball'] };
        let battleTimer = null;
        let timeLeft = 530;

        let myShortcuts = []; 
        try {
            const saved = localStorage.getItem('rpg_shortcuts');
            if (saved) { myShortcuts = JSON.parse(saved); }
            const savedConfig = localStorage.getItem('rpg_auto_config');
            if (savedConfig) { autoConfig = JSON.parse(savedConfig); }
            const savedMode = localStorage.getItem('rpg_auto_mode');
            if(savedMode) { 
                autoMode = savedMode;
                document.getElementById('auto-mode').value = autoMode;
                updateAutoMode(); 
            }
        } catch(e) { console.error("讀取失敗", e); }

        function updateAutoMode() {
            autoMode = document.getElementById('auto-mode').value;
            localStorage.setItem('rpg_auto_mode', autoMode);
            const configBtn = document.getElementById('btn-config');
            if (autoMode === 'custom') { configBtn.style.display = 'block'; } else { configBtn.style.display = 'none'; }
        }

        function toggleAuto() {
            isAuto = !isAuto;
            const btn = document.getElementById('auto-btn');
            rotationIndex = 0; rotationCounter = 0; tankAttackCounter = 0; healerAttackCounter = 0;

            if (isAuto) {
                btn.innerText = "自動: ON"; btn.style.background = "#2ecc71"; btn.style.border = "1px solid #27ae60";
                if (isMyTurn) autoPlayLogic(); 
            } else {
                btn.innerText = "自動: OFF"; btn.style.background = "#e74c3c"; btn.style.border = "1px solid #555";
            }
        }

        // 🟢 核心：AI 邏輯 (支援自動選怪)
        function autoPlayLogic() {
            if (!isAuto || !isMyTurn) return;
            
            // 找出一個活著的目標 (優先打當前選擇的，如果死了就找第一個)
            let targetIdx = selectedTargetIndex;
            if (!currentMonsters[targetIdx] || currentMonsters[targetIdx].hp <= 0) {
                targetIdx = currentMonsters.findIndex(m => m.hp > 0);
            }
            if (targetIdx === -1) return; // 怪全死

            // 更新選定目標，讓 UI 也跟著變
            selectMonster(targetIdx); 

            if (autoMode === 'custom') { runCustomAuto(); return; }

            const delay = Math.random() * 700 + 800;
            setTimeout(() => {
                if (!isMyTurn || roomId === 'world_boss') { 
                    if(roomId === 'world_boss' && isAuto) socket.emit('worldBossAction', { type: 'attack' });
                    return; 
                }

                document.getElementById('current-action-disp').innerText = `AI: ${autoMode}`;
                const myHpPct = (myPlayer.hp / myPlayer.maxHp) * 100;
                
                // [1] 緊急自保
                if (autoMode === 'heal' && myHpPct < 50) {
                    if (attemptSkill('heal_all')) { healerAttackCounter = 0; return; }
                    if (attemptSkill('full_heal')) return;
                    if (recoverStat('hp')) return; 
                } else if (autoMode !== 'heal' && myHpPct < 40) {
                    if (attemptSkill('heal_all')) return;
                    if (attemptSkill('drain')) return;
                    if (attemptSkill('heal_light')) return;
                    if (recoverStat('hp')) return; 
                }

                // [2] 職業行為
                switch (autoMode) {
                    case 'heal':
                        const teamEmergency = allPlayers.some(p => p.id !== myPlayer.id && (p.hp / p.maxHp) < 0.5);
                        if (teamEmergency) {
                            if (attemptSkill('heal_all')) { healerAttackCounter = 0; return; }
                            if (attemptSkill('full_heal')) return;
                        } 
                        if (healerAttackCounter > 0) {
                            healerAttackCounter--;
                            if (attemptSkill('divine_slash')) return;
                            if (attemptSkill('thunder')) return; 
                        } else {
                            if (attemptSkill('full_heal')) { healerAttackCounter = 2; return; }
                            if (attemptSkill('god_light')) { healerAttackCounter = 3; return; }
                            if (attemptSkill('divine_slash')) return; 
                        }
                        break;
                    case 'tank':
                        if (tankAttackCounter > 0) {
                            tankAttackCounter--; 
                            if (attemptSkill('divine_slash')) return;
                            if (attemptSkill('poison_touch')) return;
                            if (attemptSkill('drain')) return;
                        } else {
                            if (attemptSkill('god_mode')) { tankAttackCounter = 3; return; }
                            if (attemptSkill('holy_shield')) { tankAttackCounter = 3; return; }
                            if (attemptSkill('divine_slash')) return;
                            if (attemptSkill('poison_touch')) return;
                        }
                        break;
                    case 'atk':
                    default:
                        for (let skill of SKILL_PRIORITY.atk) {
                            if (attemptSkill(skill)) return;
                        }
                        break;
                }
                doNormalAttack();
            }, delay);
        }

        function runCustomAuto() {
            const delay = Math.random() * 500 + 500; 
            setTimeout(() => {
                if (!isMyTurn || roomId === 'world_boss') return;
                const myHpPct = (myPlayer.hp / myPlayer.maxHp) * 100;
                const myMpPct = (myPlayer.mp / myPlayer.maxMp) * 100;
                document.getElementById('current-action-disp').innerText = "腳本執行中...";

                for (let rule of autoConfig.triggers) {
                    let triggered = false;
                    if (rule.type === 'hp_self' && myHpPct < rule.val) triggered = true;
                    if (rule.type === 'mp_self' && myMpPct < rule.val) triggered = true;
                    if (rule.type === 'hp_team' && rule.actionType === 'skill') {
                        const needHeal = allPlayers.some(p => p.id !== myPlayer.id && (p.hp / p.maxHp * 100) < rule.val);
                        if (needHeal) triggered = true;
                    }
                    if (triggered) {
                        if (tryExecute(rule.actionType, rule.actionId)) {
                            document.getElementById('current-action-disp').innerText = `觸發: ${rule.actionId}`;
                            return;
                        }
                    }
                }

                if (autoConfig.rotation.length === 0) { act('attack'); return; }
                if (rotationIndex >= autoConfig.rotation.length) rotationIndex = 0;
                const step = autoConfig.rotation[rotationIndex];
                let executed = false;
                
                if (step.actionType === 'attack') { act('attack'); executed = true; } 
                else if (step.actionType === 'skill') {
                    if (canUseSkill(step.actionId)) { useSkill(step.actionId); executed = true; } 
                    else { handleLowMp(); return; }
                } 
                else if (step.actionType === 'item') {
                    if (hasItem(step.actionId)) { useItem(step.actionId); executed = true; } 
                    else { executed = true; } 
                }

                if (executed) {
                    rotationCounter++;
                    if (rotationCounter >= step.count) {
                        rotationCounter = 0; rotationIndex++;
                        if (rotationIndex >= autoConfig.rotation.length) rotationIndex = 0;
                    }
                    document.getElementById('current-action-disp').innerText = `循環: ${step.actionId}`;
                }
            }, delay);
        }

        function attemptSkill(skillId) {
            if (!myPlayer.skills || !myPlayer.skills.includes(skillId)) return false;
            const info = SKILL_INFO[skillId];
            if (!info) return false;
            if (myPlayer.mp >= info.mp) { useSkill(skillId); return true; } 
            else { if (recoverStat('mp')) return true; return false; }
        }

        function recoverStat(type) {
            const hpPct = myPlayer.hp / myPlayer.maxHp;
            const mpPct = myPlayer.mp / myPlayer.maxMp;
            const isDoubleCritical = (hpPct < 0.3 && mpPct < 0.3);
            const isMpDry = (mpPct < 0.1); 
            const isHpCritical = (hpPct < 0.15); 
            const listDesc = (type === 'hp') ? ITEMS_HP_DESC : ITEMS_MP_DESC;
            let targetList = (type === 'hp' ? hpPct < 0.4 : mpPct < 0.4) ? [...listDesc] : [...listDesc].reverse();
            let hasVoidSoup = false, hasElixir = false;    

            for (let itemId of targetList) {
                if (myPlayer.inventory && myPlayer.inventory[itemId] > 0) {
                    if (itemId === 'void_soup') hasVoidSoup = true;
                    if (itemId === 'elixir') hasElixir = true;
                    
                    if (isDoubleCritical && (itemId === 'void_soup' || itemId === 'elixir')) { useItem(itemId); return true; }
                    if (type === 'mp' && isMpDry && (itemId === 'void_soup' || itemId === 'elixir')) { useItem(itemId); return true; }
                    if (type === 'hp' && isHpCritical && (itemId === 'void_soup' || itemId === 'elixir')) { useItem(itemId); return true; }
                    
                    if (itemId !== 'void_soup' && itemId !== 'elixir') { useItem(itemId); return true; }
                }
            }
            if ((type === 'hp' && hpPct < 0.4) || (type === 'mp' && mpPct < 0.4)) {
                if (hasElixir && type === 'mp') { useItem('elixir'); return true; }
                if (hasVoidSoup) { useItem('void_soup'); return true; }
            }
            return false;
        }

        function doNormalAttack() { act('attack'); }

        function handleLowMp() {
            const action = autoConfig.lowMp;
            if (action === 'attack') { act('attack'); document.getElementById('current-action-disp').innerText = "沒魔 -> 普攻"; } 
            else if (action === 'item') { if (!recoverStat('mp')) act('attack'); } 
            else { document.getElementById('current-action-disp').innerText = "沒魔 -> 待機"; }
        }

        function tryExecute(type, id) {
            if (type === 'skill') { if (canUseSkill(id)) { useSkill(id); return true; } } 
            else if (type === 'item') { if (hasItem(id)) { useItem(id); return true; } }
            return false;
        }

        function canUseSkill(sid) {
            const info = SKILL_INFO[sid];

        function renderMonsters(monsters) {
            currentMonsters = monsters;
            const container = document.getElementById('monsters-container');
            container.innerHTML = '';

            // 1. 檢查當前目標是否有效 (活著)
            // 如果當前選的目標不存在，或已經死了 (hp <= 0)，就自動找下一個活著的

                const firstAliveIdx = currentMonsters.findIndex(m => m.hp > 0);
                if (firstAliveIdx !== -1) {
                    selectedTargetIndex = firstAliveIdx;
                }
            }

            monsters.forEach((m, index) => {
                const isDead = m.hp <= 0;

                if (m.img) imgSrc = `img/monsters/${m.img}`;
                
                // 點擊事件：如果是活著的，就設定為目標
                const clickAction = isDead ? '' : `onclick="selectMonster(${index})"`;

                container.innerHTML += `
                    <div class="monster-card ${isDead?'dead':''} ${isSelected?'selected':''}" ${clickAction}>
                        <img class="boss-sprite" src="${imgSrc}" onerror="this.src='img/monsters/slime.png'">
                        <div class="m-info">${m.name}</div>
                        <div class="hp-bar" style="height:5px; margin:2px 0;">
                            <div class="hp-fill" style="width:${hpPct}%;"></div>

                        ${isSelected ? '<div style="font-size:8px; color:#f1c40f;">▼ 目標</div>' : ''}
                    </div>
                `;
            });
        }

        function openSkill() {
            const btnArea = document.getElementById('btns');

                    btn.style.fontSize = '12px'; btn.style.display = 'flex'; btn.style.justifyContent = 'space-between'; btn.style.alignItems = 'center'; btn.style.padding = '0 15px'; btn.style.minHeight = '45px'; 
                    let nameColor = "#333";
                    if (info.cat === 'heal') nameColor = "#27ae60";
                    if (info.cat === 'buff') nameColor = "#e67e22";
                    if (skillId === 'void_crush' || skillId === 'big_bang' || skillId === 'entropy_decay') nameColor = "#8e44ad"; 

                    btn.innerHTML = `<div style="font-weight:bold; color:${nameColor};">${info.name}</div><div style="text-align:right; font-size:10px;"><div style="color:#3498db; margin-bottom:2px;">MP-${info.mp}</div><div style="color:#7f8c8d;">${info.desc}</div></div>`;

                    if (myPlayer.mp < info.mp) { btn.disabled = true; btn.style.opacity = 0.5; }
                    btn.onclick = () => { useSkill(skillId); };
                    btnArea.appendChild(btn);
                }
            });
        }

        function openBag() {
            const btnArea = document.getElementById('btns');
            document.getElementById('fixed-top-area').style.display = 'block'; 
            document.getElementById('shortcut-area').style.display = 'none'; 
            btnArea.innerHTML = ''; btnArea.style.gridTemplateColumns = '1fr 1fr';
            
            const itemsToShow = ['potion_hp', 'potion_mid', 'potion_high', 'potion_max', 'elixir', 'potion_mp', 'potion_mp_mid', 'potion_mp_high'];
            itemsToShow.forEach(itemId => {
                const count = (myPlayer.inventory && myPlayer.inventory[itemId]) || 0;
                if(count > 0) {
                    const btn = document.createElement('button');
                    btn.className = 'btn battle-action'; btn.style.fontSize = '10px';
                    btn.innerText = `${ITEM_NAMES[itemId] || itemId}(${count})`;
                    btn.onclick = () => { useItem(itemId); };
                    btnArea.appendChild(btn);
                }
            });
        }

        function resetButtons() {
            document.getElementById('fixed-top-area').style.display = 'none'; 
            document.getElementById('shortcut-area').style.display = 'grid'; 
            const btnArea = document.getElementById('btns');
            btnArea.style.gridTemplateColumns = '1fr 1fr';
            btnArea.innerHTML = `<button class="btn battle-action" onclick="act('attack')">攻擊</button><button class="btn battle-action" onclick="openSkill()">魔法</button><button class="btn battle-action" onclick="openBag()">物品</button><button class="btn" onclick="leaveRoom()">逃跑</button>`;
            if (roomId === 'world_boss') { toggle(false); } else { toggle(!isMyTurn); }
        }

        function useSkill(skillId) {
            const info = SKILL_INFO[skillId];
            if (info && myPlayer.mp < info.mp) { showMsg("MP 不足！"); return; }
            
            const existingIndex = myShortcuts.indexOf(skillId);
            if (existingIndex !== -1) {
            } else {
                myShortcuts.unshift(skillId);
                if (myShortcuts.length > 4) { myShortcuts.pop(); }
                localStorage.setItem('rpg_shortcuts', JSON.stringify(myShortcuts));
                updateShortcutStates(myPlayer);
            }

            if (roomId === 'world_boss') { 
                toggle(true); socket.emit('worldBossAction', { type: 'skill', skillId: skillId }); setTimeout(() => toggle(false), 500); 
            } else { 
                if(!isMyTurn) return; 
                toggle(true); 
                // 🟢 傳送目標索引
                socket.emit('combatAction', { roomId, type: 'skill', skillId: skillId, targetIndex: selectedTargetIndex }); 
            }
        }

        function useItem(itemId) {
            if (roomId === 'world_boss') { showMsg("BOSS 戰無法使用道具！"); resetButtons(); }
            else { 
                if(!isMyTurn) return; 
                toggle(true); 
                socket.emit('combatAction', { roomId, type: 'item', itemId: itemId }); 
                resetButtons(); 
            }
        }

        function toggle(disabled) { 
            document.querySelectorAll('.battle-action').forEach(b => { b.disabled = disabled; b.style.opacity = disabled ? "0.5" : "1"; }); 
        }

        function log(m) { 
            const box = document.getElementById('log'); const div = document.createElement('div');
            div.innerHTML = `> ${m}`; box.insertBefore(div, box.firstChild); 
            if (box.children.length > 20) box.removeChild(box.lastChild);
        }

        function openConfig() {
            document.getElementById('config-modal').style.display = 'flex';
            renderTriggerList();
            renderRotationList();
            document.getElementById('low-mp-action').value = autoConfig.lowMp;
        }
        function closeConfig() {
            saveConfig();
            document.getElementById('config-modal').style.display = 'none';
        }
        function saveConfig() {
            autoConfig.lowMp = document.getElementById('low-mp-action').value;
            localStorage.setItem('rpg_auto_config', JSON.stringify(autoConfig));
        }
        function renderTriggerList() {
            const div = document.getElementById('trigger-list');
            div.innerHTML = '';
            autoConfig.triggers.forEach((t, i) => {
                div.innerHTML += `
                    <div class="config-row">
                        <select onchange="updateTrigger(${i}, 'type', this.value)" class="config-select">
                            <option value="hp_self" ${t.type=='hp_self'?'selected':''}>HP(自) <</option>
                            <option value="mp_self" ${t.type=='mp_self'?'selected':''}>MP(自) <</option>
                            <option value="hp_team" ${t.type=='hp_team'?'selected':''}>HP(隊) <</option>
                        </select>
                        <input type="number" class="config-input" value="${t.val}" onchange="updateTrigger(${i}, 'val', this.value)"> %
                        <span>用</span>
                        <select onchange="updateTrigger(${i}, 'actionType', this.value)" class="config-select" style="width:60px;">
                            <option value="item" ${t.actionType=='item'?'selected':''}>物品</option>
                            <option value="skill" ${t.actionType=='skill'?'selected':''}>技能</option>
                        </select>
                        <select class="config-select" onchange="updateTrigger(${i}, 'actionId', this.value)" style="flex:1;">
                            ${getOptionsHtml(t.actionType, t.actionId)}
                        </select>
                        <button class="btn-del" onclick="delTrigger(${i})">X</button>
                    </div>
                `;
            });
        }
        function renderRotationList() {
            const div = document.getElementById('rotation-list');
            div.innerHTML = '';
            autoConfig.rotation.forEach((r, i) => {
                div.innerHTML += `
                    <div class="config-row">
                        <span style="color:#aaa; font-weight:bold; margin-right:5px;">${i+1}.</span>
                        <select onchange="updateRotation(${i}, 'actionType', this.value)" class="config-select" style="width:60px;">
                            <option value="attack" ${r.actionType=='attack'?'selected':''}>普攻</option>
                            <option value="skill" ${r.actionType=='skill'?'selected':''}>技能</option>
                            <option value="item" ${r.actionType=='item'?'selected':''}>物品</option>
                        </select>
                        ${r.actionType !== 'attack' ? `
                        <select class="config-select" onchange="updateRotation(${i}, 'actionId', this.value)" style="flex:1;">
                            ${getOptionsHtml(r.actionType, r.actionId)}
                        </select>` : '<span style="flex:1; text-align:center; color:#aaa;">-</span>'}
                        <input type="number" class="config-input" value="${r.count}" onchange="updateRotation(${i}, 'count', this.value)" min="1"> 回
                        <button class="btn-del" onclick="delRotation(${i})">X</button>
                    </div>
                `;
            });
        }
        function getOptionsHtml(type, currentId) {
            let html = '';
            if (type === 'skill') {
                if(myPlayer.skills) {
                    myPlayer.skills.forEach(sid => {
                        const name = SKILL_INFO[sid] ? SKILL_INFO[sid].name : sid;
                        html += `<option value="${sid}" ${sid===currentId?'selected':''}>${name}</option>`;
                    });
                }
            } else if (type === 'item') {
                const keys = Object.keys(ITEM_NAMES);
                keys.forEach(iid => {
                    html += `<option value="${iid}" ${iid===currentId?'selected':''}>${ITEM_NAMES[iid]}</option>`;
                });
            }
            return html;
        }
        function addTrigger() { autoConfig.triggers.push({ type: 'hp_self', val: 50, actionType: 'item', actionId: 'potion_mid' }); renderTriggerList(); }
        function delTrigger(i) { autoConfig.triggers.splice(i, 1); renderTriggerList(); }
        function updateTrigger(i, field, val) { autoConfig.triggers[i][field] = val; if (field === 'actionType') renderTriggerList(); }
        function addRotation() { autoConfig.rotation.push({ actionType: 'attack', actionId: 'normal', count: 1 }); renderRotationList(); }
        function delRotation(i) { autoConfig.rotation.splice(i, 1); renderRotationList(); }
        function updateRotation(i, field, val) { autoConfig.rotation[i][field] = val; if (field === 'actionType') renderRotationList(); }
    </script>
</body>
</html>
