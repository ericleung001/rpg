<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>神話鍛造</title>
<script src="socket.io.js"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500&display=swap');

    :root {
        --gold: #c9a84c;
        --gold-light: #f0d080;
        --ember: #e05c20;
        --void: #6a0dad;
        --ice: #4fc3f7;
        --dark: #200080;
        --bg: #0a0a12;
        --panel: #11111e;
        --border: #2a2a45;
        --text: #ccc;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        background: var(--bg);
        color: var(--text);
        font-family: 'Noto Sans TC', sans-serif;
        min-height: 100vh;
        overflow-x: hidden;
    }

    /* Animated forge background */
    body::before {
        content: '';
        position: fixed; inset: 0; z-index: 0;
        background:
            radial-gradient(ellipse 60% 40% at 50% 100%, rgba(224,92,32,0.15) 0%, transparent 60%),
            radial-gradient(ellipse 40% 30% at 20% 80%, rgba(106,13,173,0.12) 0%, transparent 50%),
            radial-gradient(ellipse 40% 30% at 80% 70%, rgba(79,195,247,0.08) 0%, transparent 50%);
        pointer-events: none;
    }

    .page-wrap { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 16px; }

    /* Header */
    .forge-header {
        text-align: center;
        padding: 20px 0 12px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 16px;
    }
    .forge-title {
        font-family: 'Cinzel', serif;
        font-size: 26px;
        font-weight: 900;
        background: linear-gradient(135deg, var(--gold), var(--gold-light), var(--ember));
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        letter-spacing: 3px;
        text-shadow: none;
    }
    .forge-sub { font-size: 11px; color: #666; margin-top: 4px; letter-spacing: 2px; }

    /* Top bar */
    .top-bar {
        display: flex; justify-content: space-between; align-items: center;
        background: var(--panel); border: 1px solid var(--border);
        border-radius: 8px; padding: 8px 14px; margin-bottom: 14px; font-size: 12px;
    }
    .res-item { display: flex; align-items: center; gap: 5px; }
    .res-val { color: var(--gold-light); font-weight: 500; }

    /* Tab nav */
    .tab-nav { display: flex; gap: 6px; margin-bottom: 14px; }
    .tab-btn {
        flex: 1; padding: 9px; border: 1px solid var(--border);
        background: var(--panel); color: #888; border-radius: 6px;
        cursor: pointer; font-family: 'Noto Sans TC', sans-serif;
        font-size: 12px; transition: all 0.2s; text-align: center;
    }
    .tab-btn:hover { border-color: var(--gold); color: var(--gold); }
    .tab-btn.active {
        background: linear-gradient(135deg, #1a1200, #1e1600);
        border-color: var(--gold); color: var(--gold-light); font-weight: 500;
        box-shadow: 0 0 10px rgba(201,168,76,0.2);
    }

    /* Tab panels */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Section label */
    .section-label {
        font-size: 10px; color: #555; letter-spacing: 2px;
        text-transform: uppercase; margin-bottom: 10px;
        display: flex; align-items: center; gap: 8px;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* Recipe cards grid */
    .recipe-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    @media (max-width: 500px) { .recipe-grid { grid-template-columns: 1fr; } }

    .recipe-card {
        background: var(--panel); border: 1px solid var(--border);
        border-radius: 10px; padding: 14px; cursor: pointer;
        transition: all 0.2s; position: relative; overflow: hidden;
    }
    .recipe-card::before {
        content: ''; position: absolute; inset: 0;
        background: linear-gradient(135deg, transparent 60%, rgba(201,168,76,0.04));
        pointer-events: none;
    }
    .recipe-card:hover { border-color: #444; transform: translateY(-1px); }
    .recipe-card.selected {
        border-color: var(--gold);
        box-shadow: 0 0 15px rgba(201,168,76,0.15), inset 0 0 20px rgba(201,168,76,0.03);
    }
    .recipe-card.can-craft { border-color: #2a5a2a; }
    .recipe-card.can-craft:hover { border-color: #3a8a3a; }

    .rc-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .rc-icon { font-size: 22px; }
    .rc-name { font-size: 13px; font-weight: 500; color: #ddd; }
    .rc-type { font-size: 9px; color: #555; letter-spacing: 1px; }

    .rc-mats { font-size: 10px; }
    .mat-row {
        display: flex; justify-content: space-between; align-items: center;
        padding: 3px 0; border-bottom: 1px solid #1a1a2e;
    }
    .mat-row:last-child { border-bottom: none; }
    .mat-name { color: #888; }
    .mat-qty.ok { color: #4caf50; }
    .mat-qty.no { color: #e74c3c; }

    .rc-footer { margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
    .rc-cost { font-size: 10px; color: #9b59b6; }

    .forge-btn {
        padding: 7px 16px; border: none; border-radius: 5px;
        font-family: 'Noto Sans TC', sans-serif; font-size: 11px;
        cursor: pointer; transition: all 0.2s; font-weight: 500;
    }
    .forge-btn.ready {
        background: linear-gradient(135deg, #8b6914, #c9a84c);
        color: #0a0a12;
    }
    .forge-btn.ready:hover { filter: brightness(1.2); transform: scale(1.02); }
    .forge-btn.disabled { background: #1a1a2a; color: #444; cursor: not-allowed; }

    /* Gear cards (layer 3) */
    .gear-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
    .gear-card {
        background: linear-gradient(135deg, #0e0e1e, #12101e);
        border: 1px solid #3a2a00; border-radius: 12px; padding: 16px;
        position: relative; overflow: hidden;
    }
    .gear-card::after {
        content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
        background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .gc-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .gc-icon { font-size: 28px; }
    .gc-info { flex: 1; }
    .gc-name { font-size: 15px; font-weight: 700; color: var(--gold-light); }
    .gc-stats { font-size: 10px; color: #888; margin-top: 3px; }

    .gc-mats { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .artifact-chip {
        display: flex; align-items: center; gap: 5px;
        background: #1a1a30; border: 1px solid #2a2a50;
        border-radius: 20px; padding: 4px 10px; font-size: 10px;
    }
    .artifact-chip.ok { border-color: #2a5a2a; color: #4caf50; }
    .artifact-chip.no { border-color: #5a2a2a; color: #e74c3c; }

    .gc-cost { font-size: 10px; color: #888; margin-bottom: 10px; }
    .gc-cost span { color: var(--gold); }

    /* Toast */
    #forge-toast {
        position: fixed; top: -80px; left: 50%; transform: translateX(-50%);
        background: #1a1a2e; border: 1px solid var(--gold);
        color: var(--gold-light); padding: 12px 24px; border-radius: 8px;
        font-size: 13px; transition: top 0.4s cubic-bezier(0.34,1.56,0.64,1);
        z-index: 1000; white-space: nowrap; max-width: 90vw;
        box-shadow: 0 4px 20px rgba(201,168,76,0.2);
    }
    #forge-toast.show { top: 20px; }
    #forge-toast.error { border-color: #e74c3c; color: #e74c3c; }

    /* Flow diagram */
    .flow-diagram {
        display: flex; align-items: center; justify-content: center;
        gap: 8px; flex-wrap: wrap;
        padding: 14px; background: var(--panel);
        border: 1px solid var(--border); border-radius: 8px; margin-bottom: 14px;
        font-size: 11px; color: #666;
    }
    .flow-step {
        padding: 5px 12px; border-radius: 20px; background: #16161e;
        border: 1px solid #2a2a40; color: #aaa;
    }
    .flow-arrow { color: var(--gold); font-size: 14px; }

    .back-btn {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 8px 14px; background: #111; border: 1px solid #333;
        border-radius: 6px; color: #888; font-size: 12px; cursor: pointer;
        text-decoration: none; margin-bottom: 14px;
        transition: border-color 0.2s, color 0.2s;
    }
    .back-btn:hover { border-color: var(--gold); color: var(--gold); }

    .empty-state { text-align: center; padding: 40px; color: #444; font-size: 12px; }

    /* Forge animation overlay */
    #forge-anim {
        display: none; position: fixed; inset: 0; z-index: 500;
        background: rgba(0,0,0,0.85); justify-content: center; align-items: center;
        flex-direction: column; gap: 16px;
    }
    #forge-anim.show { display: flex; }
    .forge-flame { font-size: 60px; animation: flamePulse 0.6s infinite alternate; }
    @keyframes flamePulse { from { transform: scale(1); filter: brightness(1); } to { transform: scale(1.15); filter: brightness(1.4); } }
    .forge-anim-text { color: var(--gold-light); font-size: 14px; letter-spacing: 2px; }
</style>
</head>
<body>
<div class="page-wrap">
    <a class="back-btn" href="hub.html">← 返回主城</a>

    <div class="forge-header">
        <div class="forge-title">⚗ MYTHIC FORGE</div>
        <div class="forge-sub">神話鍛造 · 四層精煉</div>
    </div>

    <div class="top-bar">
        <div class="res-item">💰 <span id="my-gold" class="res-val">0</span> G</div>
        <div class="res-item">💎 <span id="my-shard" class="res-val">0</span> 碎片</div>
        <div class="res-item" style="font-size:10px; color:#555;">點擊配方查看需求</div>
    </div>

    <div class="flow-diagram">
        <div class="flow-step">⚔️ 普通材料</div>
        <div class="flow-arrow">→</div>
        <div class="flow-step">🔥 精華 ×5種</div>
        <div class="flow-arrow">→</div>
        <div class="flow-step">💎 神器素材 ×3種</div>
        <div class="flow-arrow">→</div>
        <div class="flow-step" style="border-color:#c9a84c; color:#c9a84c;">🌟 神話裝備</div>
    </div>

    <div class="tab-nav">
        <div class="tab-btn active" onclick="switchTab('essence')">🔥 精華煉製</div>
        <div class="tab-btn" onclick="switchTab('artifact')">💎 素材凝聚</div>
        <div class="tab-btn" onclick="switchTab('gear')">🌟 神話鍛造</div>
    </div>

    <!-- Layer 1: Essence -->
    <div class="tab-panel active" id="tab-essence">
        <div class="section-label">第一層：普通材料 → 精華</div>
        <div class="recipe-grid" id="essence-grid"></div>
    </div>

    <!-- Layer 2: Artifact -->
    <div class="tab-panel" id="tab-artifact">
        <div class="section-label">第二層：精華 → 神器素材</div>
        <div class="recipe-grid" id="artifact-grid"></div>
    </div>

    <!-- Layer 3: Gear -->
    <div class="tab-panel" id="tab-gear">
        <div class="section-label">第三層：神器素材 → 神話裝備</div>
        <div class="gear-grid" id="gear-grid"></div>
    </div>
</div>

<!-- Forge animation -->
<div id="forge-anim">
    <div class="forge-flame">🔥</div>
    <div class="forge-anim-text" id="forge-anim-text">鍛造中...</div>
</div>

<div id="forge-toast"></div>

<script>
const myToken = localStorage.getItem('rpg_token');
if (!myToken) { location.href = 'index.html'; }

const socket = io('https://mmo.ttctv-105.cc', {
    transports: ['websocket', 'polling'],
    secure: true
});
let myData = { gold: 0, inventory: {} };

// ── Config (mirrors server) ───────────────────────────────────────────
const ESSENCE_CONFIG = {
    myth_essence_fire:  { name: '烈焰精華',   icon: '🔥', materials: { fire_core: 50, lava_rock: 100, dragon_scale: 30 }, shard: 1000 },
    myth_essence_ice:   { name: '永恆冰精華', icon: '❄️', materials: { ice_crystal: 50, yeti_fur: 80, spirit_dust: 40 },  shard: 1000 },
    myth_essence_dark:  { name: '暗淵精華',   icon: '🌑', materials: { dark_essence: 30, void_dust: 60, demon_horn: 20 }, shard: 1000 },
    myth_essence_light: { name: '神聖精華',   icon: '✨', materials: { angel_feather: 30, god_blood: 10, chaos_orb: 20 }, shard: 1500 },
    myth_essence_chaos: { name: '混沌精華',   icon: '🌀', materials: { chaos_orb: 40, dark_matter: 20, entropy_origin: 5 }, shard: 2000 },
};
const ARTIFACT_CONFIG = {
    myth_core:         { name: '神話核心',   icon: '💎', essences: { myth_essence_fire: 3, myth_essence_light: 2 }, shard: 10000 },
    myth_dragon_soul:  { name: '龍魂結晶',   icon: '🐉', essences: { myth_essence_fire: 2, myth_essence_ice: 2, myth_essence_dark: 1 }, shard: 10000 },
    myth_void_crystal: { name: '虛空神晶',   icon: '🔮', essences: { myth_essence_dark: 3, myth_essence_chaos: 2 }, shard: 15000 },
};
const GEAR_CONFIG = {
    myth_weapon: { name: '神話·毀滅之刃', icon: '⚔️', artifacts: { myth_core: 1, myth_dragon_soul: 1 }, gold: 5000000, shard: 50000, stats: 'ATK+50萬 HP+100萬' },
    myth_armor:  { name: '神話·絕對防禦', icon: '🛡️', artifacts: { myth_core: 1, myth_void_crystal: 1 }, gold: 5000000, shard: 50000, stats: 'DEF+30萬 HP+200萬 MP+50萬' },
    myth_acc:    { name: '神話·命運之環', icon: '💍', artifacts: { myth_dragon_soul: 1, myth_void_crystal: 1 }, gold: 5000000, shard: 50000, stats: 'ATK+20萬 DEF+20萬 HP+300萬 MP+100萬' },
};

const MAT_NAMES = {
    fire_core:'火焰核心', lava_rock:'熔岩石', dragon_scale:'龍鱗',
    ice_crystal:'永恆冰晶', yeti_fur:'雪怪毛皮', spirit_dust:'靈魂粉末',
    dark_essence:'暗之精華', void_dust:'虛空之塵', demon_horn:'惡魔之角',
    angel_feather:'天使之羽', god_blood:'神之血', chaos_orb:'混沌寶珠',
    dark_matter:'暗物質', entropy_origin:'熱寂原點',
    myth_essence_fire:'烈焰精華', myth_essence_ice:'永恆冰精華',
    myth_essence_dark:'暗淵精華', myth_essence_light:'神聖精華',
    myth_essence_chaos:'混沌精華',
    myth_core:'神話核心', myth_dragon_soul:'龍魂結晶', myth_void_crystal:'虛空神晶',
};

// ── Tab switching ──────────────────────────────────────────────────────
function switchTab(id) {
    document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', ['essence','artifact','gear'][i]===id));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-'+id).classList.add('active');
    renderAll();
}

// ── Render helpers ─────────────────────────────────────────────────────
function inv(id) { return myData.inventory[id] || 0; }

function renderEssences() {
    const grid = document.getElementById('essence-grid');
    grid.innerHTML = '';
    for (const [id, cfg] of Object.entries(ESSENCE_CONFIG)) {
        const mats = Object.entries(cfg.materials);
        const canCraft = mats.every(([m,n]) => inv(m) >= n) && inv('skill_shard') >= cfg.shard;
        const matRows = mats.map(([m,n]) => {
            const has = inv(m); const ok = has >= n;
            return `<div class="mat-row"><span class="mat-name">${MAT_NAMES[m]||m}</span><span class="mat-qty ${ok?'ok':'no'}">${has}/${n}</span></div>`;
        }).join('');
        const shardOk = inv('skill_shard') >= cfg.shard;
        grid.innerHTML += `
        <div class="recipe-card ${canCraft?'can-craft':''}">
            <div class="rc-header">
                <span class="rc-icon">${cfg.icon}</span>
                <div><div class="rc-name">${cfg.name}</div><div class="rc-type">LAYER 1 · ESSENCE</div></div>
            </div>
            <div class="rc-mats">
                ${matRows}
                <div class="mat-row">
                    <span class="mat-name">💎 技能碎片</span>
                    <span class="mat-qty ${shardOk?'ok':'no'}">${inv('skill_shard').toLocaleString()}/${cfg.shard.toLocaleString()}</span>
                </div>
            </div>
            <div class="rc-footer">
                <span class="rc-cost">持有：${inv(id)}</span>
                <button class="forge-btn ${canCraft?'ready':'disabled'}" ${canCraft?`onclick="forgeEssence('${id}')"`:'disabled'}>
                    ${canCraft?'🔥 煉製':'材料不足'}
                </button>
            </div>
        </div>`;
    }
}

function renderArtifacts() {
    const grid = document.getElementById('artifact-grid');
    grid.innerHTML = '';
    for (const [id, cfg] of Object.entries(ARTIFACT_CONFIG)) {
        const esses = Object.entries(cfg.essences);
        const canCraft = esses.every(([e,n]) => inv(e) >= n) && inv('skill_shard') >= cfg.shard;
        const esRows = esses.map(([e,n]) => {
            const has = inv(e); const ok = has >= n;
            const esName = ESSENCE_CONFIG[e] ? ESSENCE_CONFIG[e].icon+' '+ESSENCE_CONFIG[e].name : e;
            return `<div class="mat-row"><span class="mat-name">${esName}</span><span class="mat-qty ${ok?'ok':'no'}">${has}/${n}</span></div>`;
        }).join('');
        const shardOk = inv('skill_shard') >= cfg.shard;
        grid.innerHTML += `
        <div class="recipe-card ${canCraft?'can-craft':''}">
            <div class="rc-header">
                <span class="rc-icon">${cfg.icon}</span>
                <div><div class="rc-name">${cfg.name}</div><div class="rc-type">LAYER 2 · ARTIFACT</div></div>
            </div>
            <div class="rc-mats">
                ${esRows}
                <div class="mat-row">
                    <span class="mat-name">💎 技能碎片</span>
                    <span class="mat-qty ${shardOk?'ok':'no'}">${inv('skill_shard').toLocaleString()}/${cfg.shard.toLocaleString()}</span>
                </div>
            </div>
            <div class="rc-footer">
                <span class="rc-cost">持有：${inv(id)}</span>
                <button class="forge-btn ${canCraft?'ready':'disabled'}" ${canCraft?`onclick="forgeArtifact('${id}')"`:'disabled'}>
                    ${canCraft?'💎 凝聚':'材料不足'}
                </button>
            </div>
        </div>`;
    }
}

function renderGears() {
    const grid = document.getElementById('gear-grid');
    grid.innerHTML = '';
    for (const [id, cfg] of Object.entries(GEAR_CONFIG)) {
        const arts = Object.entries(cfg.artifacts);
        const canCraft = arts.every(([a,n]) => inv(a) >= n) && (myData.gold||0) >= cfg.gold && inv('skill_shard') >= cfg.shard;
        const artChips = arts.map(([a,n]) => {
            const has = inv(a); const ok = has >= n;
            const artName = ARTIFACT_CONFIG[a] ? ARTIFACT_CONFIG[a].icon+' '+ARTIFACT_CONFIG[a].name : a;
            return `<div class="artifact-chip ${ok?'ok':'no'}">${artName} ${has}/${n}</div>`;
        }).join('');
        const goldOk = (myData.gold||0) >= cfg.gold;
        const shardOk = inv('skill_shard') >= cfg.shard;
        grid.innerHTML += `
        <div class="gear-card">
            <div class="gc-header">
                <div class="gc-icon">${cfg.icon}</div>
                <div class="gc-info">
                    <div class="gc-name">${cfg.name}</div>
                    <div class="gc-stats">${cfg.stats}</div>
                </div>
                <div style="font-size:10px;color:#555;">持有：${inv(id)}</div>
            </div>
            <div class="gc-mats">${artChips}</div>
            <div class="gc-cost">
                💰 <span style="color:${goldOk?'#4caf50':'#e74c3c'}">${(myData.gold||0).toLocaleString()}</span> / ${cfg.gold.toLocaleString()} G　　
                💎 <span style="color:${shardOk?'#4caf50':'#e74c3c'}">${inv('skill_shard').toLocaleString()}</span> / ${cfg.shard.toLocaleString()} 碎片
            </div>
            <button class="forge-btn ${canCraft?'ready':'disabled'}" style="width:100%;padding:10px;" ${canCraft?`onclick="forgeGear('${id}')"`:'disabled'}>
                ${canCraft?'🌟 開始神話鍛造':'材料/費用不足'}
            </button>
        </div>`;
    }
}

function renderAll() {
    renderEssences();
    renderArtifacts();
    renderGears();
}

// ── Forge actions ──────────────────────────────────────────────────────
function showAnim(text) {
    document.getElementById('forge-anim-text').innerText = text;
    document.getElementById('forge-anim').classList.add('show');
}
function hideAnim() { document.getElementById('forge-anim').classList.remove('show'); }

function showToast(msg, isErr) {
    const t = document.getElementById('forge-toast');
    t.innerText = msg;
    t.className = isErr ? 'error show' : 'show';
    setTimeout(() => t.className = '', 3500);
}

function forgeEssence(id) {
    showAnim('煉製精華中...');
    socket.emit('mythForgeEssence', { essenceId: id });
}
function forgeArtifact(id) {
    showAnim('凝聚神器素材中...');
    socket.emit('mythForgeArtifact', { artifactId: id });
}
function forgeGear(id) {
    const cfg = GEAR_CONFIG[id];
    if (!confirm(`⚠️ 確定要鍛造【${cfg.name}】？\n\n消耗：\n• 神器素材\n• ${cfg.gold.toLocaleString()} G\n• ${cfg.shard.toLocaleString()} 碎片\n\n此操作不可逆！`)) return;
    showAnim('神話鍛造中...');
    socket.emit('mythForgeGear', { gearId: id });
}

// ── Socket ─────────────────────────────────────────────────────────────
socket.on('connect', () => socket.emit('joinGame', myToken));

socket.on('playerStatsUpdate', (p) => {
    myData = p;
    document.getElementById('my-gold').innerText = (p.gold||0).toLocaleString();
    document.getElementById('my-shard').innerText = ((p.inventory&&p.inventory['skill_shard'])||0).toLocaleString();
    renderAll();
});

socket.on('mythForgeResult', (result) => {
    hideAnim();
    showToast(result.msg, !result.success);
    if (result.success) renderAll();
});

socket.on('errorMessage', (msg) => {
    hideAnim();
    showToast(msg, true);
});
</script>
</body>
</html>
