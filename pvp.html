<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PVP 競技場</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body { 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #ecf0f1; 
            font-family: 'Press Start 2P', monospace; 
            text-align: center; 
            margin: 0; padding: 0; 
            min-height: 100vh;
            overflow-x: hidden;
            user-select: none; -webkit-user-select: none;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 80px;
        }
        
        .header {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            border: 3px solid #f1c40f;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.5);
        }
        
        .header h1 {
            font-size: 20px;
            margin: 0 0 10px 0;
            text-shadow: 2px 2px 0 #000;
        }
        
        .header-stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 10px;
            flex-wrap: wrap;
        }
        
        .stat-box {
            background: rgba(0,0,0,0.3);
            padding: 10px 15px;
            border-radius: 8px;
            border: 2px solid #f1c40f;
        }
        
        .stat-box .label { color: #f1c40f; }
        .stat-box .value { color: #fff; font-size: 14px; margin-top: 5px; }
        
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
        }
        
        .tab-btn {
            flex: 1;
            background: #34495e;
            border: 2px solid #7f8c8d;
            color: #bdc3c7;
            font-family: inherit;
            font-size: 10px;
            padding: 12px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .tab-btn.active {
            background: #e74c3c;
            border-color: #f1c40f;
            color: #fff;
        }
        
        .tab-btn:active { transform: scale(0.98); }
        
        .content-panel {
            background: rgba(0, 0, 0, 0.4);
            border: 3px solid #3498db;
            border-radius: 15px;
            padding: 15px;
            min-height: 300px;
        }
        
        /* 排行榜 */
        .ranking-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .ranking-row {
            display: flex;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 9px;
        }
        
        .ranking-row:nth-child(odd) { background: rgba(255,255,255,0.05); }
        
        .rank-num {
            width: 30px;
            font-weight: bold;
            text-align: center;
        }
        
        .rank-1 { color: #ffd700; text-shadow: 0 0 10px #ffd700; }
        .rank-2 { color: #c0c0c0; }
        .rank-3 { color: #cd7f32; }
        
        .rank-name { flex: 1; text-align: left; padding-left: 10px; }
        .rank-level { width: 50px; color: #3498db; }
        .rank-score { width: 60px; color: #f1c40f; font-weight: bold; }
        .rank-wins { width: 50px; color: #2ecc71; }
        
        /* 房間列表 */
        .room-list {
            max-height: 350px;
            overflow-y: auto;
        }
        
        .room-card {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            border: 2px solid #3498db;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .room-card:hover {
            border-color: #f1c40f;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(241, 196, 15, 0.3);
        }
        
        .room-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 10px;
        }
        
        .room-host { color: #f1c40f; }
        .room-level { color: #3498db; }
        
        .room-info {
            display: flex;
            justify-content: space-between;
            font-size: 9px;
            color: #bdc3c7;
        }
        
        .no-rooms {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
            font-size: 12px;
        }
        
        /* 按鈕 */
        .btn {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            border: 2px solid #f1c40f;
            color: white;
            font-family: inherit;
            font-size: 12px;
            padding: 15px 30px;
            cursor: pointer;
            border-radius: 10px;
            margin: 5px;
            transition: all 0.2s;
            text-shadow: 1px 1px 0 #000;
        }
        
        .btn:active { transform: scale(0.95); }
        .btn:disabled { background: #7f8c8d; border-color: #95a5a6; cursor: not-allowed; }
        
        .btn-secondary {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #27ae60 0%, #1e8449 100%);
        }
        
        /* 創建房間面板 */
        .create-panel {
            display: none;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #f1c40f;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
        }
        
        .create-panel.active { display: block; }
        
        .config-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 10px;
        }
        
        .config-row input, .config-row select {
            background: #2c3e50;
            border: 2px solid #3498db;
            color: white;
            padding: 8px;
            border-radius: 5px;
            font-family: inherit;
            font-size: 12px;
            width: 120px;
        }
        
        /* 等待房間 */
        .waiting-room {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }
        
        .waiting-room.active { display: flex; }
        
        .waiting-box {
            background: linear-gradient(135deg, #2c3e50 0%, #1a1a2e 100%);
            border: 4px solid #f1c40f;
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
        }
        
        .waiting-title {
            font-size: 16px;
            color: #f1c40f;
            margin-bottom: 20px;
        }
        
        .player-slot {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid #7f8c8d;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
        }
        
        .player-slot.ready { border-color: #2ecc71; background: rgba(46, 204, 113, 0.1); }
        
        .player-info { font-size: 10px; }
        .player-name { font-size: 12px; color: #f1c40f; margin-bottom: 5px; }
        .player-level { color: #3498db; }
        .player-score { color: #e74c3c; }
        
        .ready-status {
            font-size: 10px;
            padding: 5px 15px;
            border-radius: 5px;
        }
        
        .ready-status.yes { background: #27ae60; color: white; }
        .ready-status.no { background: #e74c3c; color: white; }
        
        .waiting-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .waiting-buttons .btn { flex: 1; }
        
        /* Toast */
        #toast {
            position: fixed;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            background: #e74c3c;
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            border: 2px solid #f1c40f;
            font-size: 12px;
            z-index: 2000;
            transition: top 0.5s ease;
            max-width: 90%;
            text-align: center;
        }
        
        #toast.show { top: 20px; }
        #toast.success { background: #27ae60; }
        
        /* 底部導航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #2c3e50;
            border-top: 3px solid #f1c40f;
            display: flex;
            justify-content: center;
            padding: 10px;
            box-sizing: border-box;
        }
        
        .bottom-nav .btn {
            font-size: 10px;
            padding: 10px 20px;
        }
        
        /* 個人戰績 */
        .my-stats {
            background: linear-gradient(135deg, #8e44ad 0%, #9b59b6 100%);
            border: 3px solid #f1c40f;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .my-stats h3 {
            font-size: 12px;
            margin: 0 0 15px 0;
            color: #f1c40f;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        
        .stat-item {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 8px;
        }
        
        .stat-item .label { font-size: 8px; color: #bdc3c7; }
        .stat-item .value { font-size: 14px; color: #fff; margin-top: 5px; }
        
        .compensation-info {
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 10px;
            margin-top: 10px;
            font-size: 8px;
            color: #f39c12;
        }
    </style>
</head>
<body>
    <div id="toast"></div>
    
    <div class="container">
        <div class="header">
            <h1>⚔️ PVP 競技場 ⚔️</h1>
            <div class="header-stats">
                <div class="stat-box">
                    <div class="label">積分</div>
                    <div class="value" id="my-score">1000</div>
                </div>
                <div class="stat-box">
                    <div class="label">戰績</div>
                    <div class="value" id="my-record">0W / 0L</div>
                </div>
                <div class="stat-box">
                    <div class="label">連勝</div>
                    <div class="value" id="my-streak">0</div>
                </div>
            </div>
        </div>
        
        <div class="my-stats" id="my-stats-panel">
            <h3>📊 我的戰績</h3>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="label">勝場</div>
                    <div class="value" id="stat-wins">0</div>
                </div>
                <div class="stat-item">
                    <div class="label">敗場</div>
                    <div class="value" id="stat-losses">0</div>
                </div>
                <div class="stat-item">
                    <div class="label">勝率</div>
                    <div class="value" id="stat-winrate">-</div>
                </div>
                <div class="stat-item">
                    <div class="label">最高連勝</div>
                    <div class="value" id="stat-maxstreak">0</div>
                </div>
            </div>
            <div class="compensation-info" id="compensation-info">
                等級補償制度：高等級玩家屬性會被下調，低等級玩家獲得傷害加成
            </div>
        </div>
        
        <div class="create-panel" id="create-panel">
            <h3 style="font-size: 14px; color: #f1c40f; margin-bottom: 20px;">🛠️ 創建房間</h3>
            <div class="config-row">
                <span>等級差限制：</span>
                <select id="level-range">
                    <option value="10">±10 級</option>
                    <option value="20">±20 級</option>
                    <option value="30">±30 級</option>
                    <option value="50" selected>±50 級</option>
                    <option value="999">不限制</option>
                </select>
            </div>
            <div class="config-row">
                <span>押注金幣：</span>
                <input type="number" id="bet-gold" value="0" min="0" step="1000">
            </div>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button class="btn btn-success" onclick="createRoom()">創建房間</button>
                <button class="btn btn-secondary" onclick="toggleCreatePanel()">取消</button>
            </div>
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('rooms')">🏠 房間列表</button>
            <button class="tab-btn" onclick="switchTab('ranking')">🏆 排行榜</button>
        </div>
        
        <div class="content-panel">
            <!-- 房間列表 -->
            <div id="rooms-tab">
                <div class="room-list" id="room-list">
                    <div class="no-rooms">載入中...</div>
                </div>
            </div>
            
            <!-- 排行榜 -->
            <div id="ranking-tab" style="display: none;">
                <div class="ranking-list" id="ranking-list">
                    <div class="no-rooms">載入中...</div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 等待房間 -->
    <div class="waiting-room" id="waiting-room">
        <div class="waiting-box">
            <div class="waiting-title" id="waiting-title">等待對手中...</div>
            
            <div class="player-slot" id="slot-1">
                <div class="player-info">
                    <div class="player-name" id="p1-name">-</div>
                    <div class="player-level">Lv. <span id="p1-level">-</span></div>
                    <div class="player-score">積分: <span id="p1-score">-</span></div>
                </div>
                <div class="ready-status yes" id="p1-ready">準備</div>
            </div>
            
            <div class="player-slot" id="slot-2">
                <div class="player-info">
                    <div class="player-name" id="p2-name">等待中...</div>
                    <div class="player-level">Lv. <span id="p2-level">-</span></div>
                    <div class="player-score">積分: <span id="p2-score">-</span></div>
                </div>
                <div class="ready-status no" id="p2-ready">未準備</div>
            </div>
            
            <div class="waiting-buttons">
                <button class="btn btn-success" id="ready-btn" onclick="toggleReady()">準備</button>
                <button class="btn btn-secondary" onclick="leaveRoom()">離開</button>
            </div>
        </div>
    </div>
    
    <div class="bottom-nav">
        <button class="btn" onclick="quickMatch()">⚡ 快速匹配</button>
        <button class="btn btn-secondary" onclick="toggleCreatePanel()">🛠️ 創建房間</button>
        <button class="btn" onclick="window.location.href='hub.html'">🏠 返回大廳</button>
    </div>
    
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        const socket = io('https://mmo.ttctv-105.cc', { 
    transports: ['websocket', 'polling'],
    secure: true // 因為你用 https，建議加呢個
});
        
        let myToken = localStorage.getItem('rpg_token');
        let currentRoom = null;
        let isReady = false;
        
        if (!myToken) {
            window.location.href = 'index.html';
        }
        
        // 初始化
        socket.emit('joinGame', myToken);
        socket.emit('getPvpRooms');
        socket.emit('getPvpRankings');
        
        // Toast
        function showToast(msg, type = 'error') {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.className = type;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        // Tab 切換
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.tab-btn[onclick="switchTab('${tab}')"]`).classList.add('active');
            
            document.getElementById('rooms-tab').style.display = tab === 'rooms' ? 'block' : 'none';
            document.getElementById('ranking-tab').style.display = tab === 'ranking' ? 'block' : 'none';
        }
        
        // 創建房間面板
        function toggleCreatePanel() {
            document.getElementById('create-panel').classList.toggle('active');
        }
        
        // 創建房間
        function createRoom() {
            const levelRange = parseInt(document.getElementById('level-range').value);
            const betGold = parseInt(document.getElementById('bet-gold').value) || 0;
            
            socket.emit('createPvpRoom', { levelRange, betGold });
            toggleCreatePanel();
        }
        
        // 快速匹配
        function quickMatch() {
            socket.emit('pvpQuickMatch');
        }
        
        // 加入房間
        function joinRoom(roomId) {
            socket.emit('joinPvpRoom', roomId);
        }
        
        // 準備/取消準備
        function toggleReady() {
            if (!currentRoom) return;
            
            isReady = !isReady;
            if (isReady) {
                socket.emit('pvpReady', currentRoom.id);
            } else {
                socket.emit('pvpUnready', currentRoom.id);
            }
            
            document.getElementById('ready-btn').innerText = isReady ? '取消準備' : '準備';
            document.getElementById('ready-btn').classList.toggle('btn-success', !isReady);
            document.getElementById('ready-btn').classList.toggle('btn-secondary', isReady);
        }
        
        // 離開房間
        function leaveRoom() {
            if (currentRoom) {
                socket.emit('leavePvpRoom', currentRoom.id);
            }
            currentRoom = null;
            isReady = false;
            document.getElementById('waiting-room').classList.remove('active');
        }
        
        // 渲染房間列表
        function renderRooms(rooms) {
            const list = document.getElementById('room-list');
            
            if (!rooms || rooms.length === 0) {
                list.innerHTML = '<div class="no-rooms">沒有等待中的房間<br><br>點擊「快速匹配」或「創建房間」開始！</div>';
                return;
            }
            
            list.innerHTML = rooms.map(room => `
                <div class="room-card" onclick="joinRoom('${room.id}')">
                    <div class="room-header">
                        <span class="room-host">👤 ${escapeHtml(room.host)}</span>
                        <span class="room-level">Lv.${room.players[0].level}</span>
                    </div>
                    <div class="room-info">
                        <span>等級差: ±${room.config.levelRange === 999 ? '無限制' : room.config.levelRange}</span>
                        <span>押注: ${room.config.betGold > 0 ? room.config.betGold + ' G' : '無'}</span>
                        <span>積分: ${room.players[0].score}</span>
                    </div>
                </div>
            `).join('');
        }
        
        // 渲染排行榜
        function renderRankings(rankings) {
            const list = document.getElementById('ranking-list');
            
            if (!rankings || rankings.length === 0) {
                list.innerHTML = '<div class="no-rooms">尚無排行數據</div>';
                return;
            }
            
            list.innerHTML = rankings.map((r, i) => `
                <div class="ranking-row">
                    <div class="rank-num ${i < 3 ? 'rank-' + (i + 1) : ''}">${i + 1}</div>
                    <div class="rank-name">${escapeHtml(r.name)}</div>
                    <div class="rank-level">Lv.${r.level}</div>
                    <div class="rank-score">${r.score}</div>
                    <div class="rank-wins">${r.wins}W</div>
                </div>
            `).join('');
        }
        
        // 更新等待房間
        function updateWaitingRoom(room) {
            currentRoom = room;
            
            document.getElementById('waiting-title').innerText = 
                room.status === 'waiting' ? '等待對手中...' : '戰鬥準備中！';
            
            // 玩家1
            const p1 = room.players[0];
            document.getElementById('p1-name').innerText = p1.name;
            document.getElementById('p1-level').innerText = p1.level;
            document.getElementById('p1-score').innerText = p1.score;
            document.getElementById('p1-ready').innerText = p1.ready ? '準備' : '未準備';
            document.getElementById('p1-ready').className = 'ready-status ' + (p1.ready ? 'yes' : 'no');
            document.getElementById('slot-1').className = 'player-slot' + (p1.ready ? ' ready' : '');
            
            // 玩家2
            if (room.players[1]) {
                const p2 = room.players[1];
                document.getElementById('p2-name').innerText = p2.name;
                document.getElementById('p2-level').innerText = p2.level;
                document.getElementById('p2-score').innerText = p2.score;
                document.getElementById('p2-ready').innerText = p2.ready ? '準備' : '未準備';
                document.getElementById('p2-ready').className = 'ready-status ' + (p2.ready ? 'yes' : 'no');
                document.getElementById('slot-2').className = 'player-slot' + (p2.ready ? ' ready' : '');
                
                // 更新準備按鈕狀態
                const myIndex = room.players.findIndex(p => p.name === localStorage.getItem('rpg_name'));
                if (myIndex >= 0) {
                    isReady = room.players[myIndex].ready;
                    document.getElementById('ready-btn').innerText = isReady ? '取消準備' : '準備';
                    document.getElementById('ready-btn').className = 'btn ' + (isReady ? 'btn-secondary' : 'btn-success');
                }
            } else {
                document.getElementById('p2-name').innerText = '等待中...';
                document.getElementById('p2-level').innerText = '-';
                document.getElementById('p2-score').innerText = '-';
                document.getElementById('p2-ready').innerText = '-';
                document.getElementById('p2-ready').className = 'ready-status no';
                document.getElementById('slot-2').className = 'player-slot';
            }
            
            document.getElementById('waiting-room').classList.add('active');
        }
        
        // 更新個人統計
        function updateMyStats(p) {
            if (!p) return;
            
            document.getElementById('my-score').innerText = p.pvpScore || 1000;
            document.getElementById('my-record').innerText = `${p.pvpWins || 0}W / ${p.pvpLosses || 0}L`;
            document.getElementById('my-streak').innerText = p.pvpWinStreak || 0;
            
            document.getElementById('stat-wins').innerText = p.pvpWins || 0;
            document.getElementById('stat-losses').innerText = p.pvpLosses || 0;
            
            const total = (p.pvpWins || 0) + (p.pvpLosses || 0);
            document.getElementById('stat-winrate').innerText = total > 0 ? 
                Math.round((p.pvpWins / total) * 100) + '%' : '-';
            document.getElementById('stat-maxstreak').innerText = p.pvpMaxStreak || 0;
        }
        
        // 工具函數
        function escapeHtml(text) {
            if (!text) return text;
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
        
        // Socket 事件
        socket.on('playerStatsUpdate', (p) => {
            updateMyStats(p);
            localStorage.setItem('rpg_name', p.name);
        });
        
        socket.on('pvpRoomsUpdate', renderRooms);
        socket.on('pvpRankingsUpdate', renderRankings);
        
        socket.on('pvpRoomCreated', (data) => {
            showToast('房間已創建！', 'success');
            updateWaitingRoom(data.room);
        });
        
        socket.on('pvpRoomJoined', (data) => {
            showToast('已加入房間！', 'success');
            updateWaitingRoom(data.room);
        });
        
        socket.on('pvpRoomUpdate', updateWaitingRoom);
        
        socket.on('pvpAutoJoin', (roomId) => {
            socket.emit('joinPvpRoom', roomId);
        });
        
        socket.on('pvpBattleStart', (data) => {
            // 跳轉到戰鬥頁面
            const params = new URLSearchParams({ room: data.roomId });
            window.location.href = 'pvp_battle.html?' + params.toString();
        });
        
        socket.on('pvpError', (msg) => {
            showToast(msg);
        });
        
        socket.on('disconnect', () => {
            showToast('連線中斷，請重新整理頁面');
        });
    </script>
</body>
</html>
