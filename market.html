<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>道具屋2</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { 
            background-color: #2c3e50; color: #fff; 
            font-family: 'Press Start 2P', monospace; 
            text-align: center; padding: 15px; 
            display:flex; flex-direction:column; align-items:center; 
            height: 100dvh; margin:0; box-sizing:border-box;
        }
        .header { width: 100%; max-width: 600px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .gold-display { color: #f1c40f; font-size: 14px; font-weight: bold; }
        h1 { font-size: 20px; margin: 0; }
        
        /* 分類按鈕列 */
        .category-bar {
            width: 100%; max-width: 600px;
            display: flex; gap: 5px; 
            margin-bottom: 10px; flex-wrap: wrap; justify-content: center;
        }
        .cat-btn {
            background: #34495e; color: #bdc3c7; border: 2px solid #7f8c8d;
            padding: 8px 12px; font-family: inherit; font-size: 10px; cursor: pointer;
            border-radius: 6px; outline: none; white-space: nowrap; flex: 1;
        }
        .cat-btn.active { 
            background: #e67e22; color: #fff; border-color: #fff; font-weight: bold;
        }

        .container { display: flex; flex: 1; width: 100%; max-width: 600px; flex-direction: column; overflow: hidden; margin-bottom: 15px; }
        .shop-list { flex: 1; background: #34495e; border: 3px solid #bdc3c7; overflow-y: auto; padding: 10px; border-radius: 8px; }
        .item-card { background: #ecf0f1; color: #2c3e50; padding: 15px; margin-bottom: 10px; border-radius: 8px; text-align: left; border-bottom: 4px solid #95a5a6; display: flex; justify-content: space-between; align-items: center;}
        .item-info { flex: 1; }
        .item-name { font-size: 12px; font-weight: bold; color: #2980b9; display: block; margin-bottom: 5px; }
        .item-desc { font-size: 10px; color: #7f8c8d; line-height: 1.4; }
        .buy-section { text-align: right; min-width: 80px; }
        .price { font-size: 10px; color: #e67e22; font-weight: bold; margin-bottom: 5px; }
        
        .btn { padding: 8px 12px; font-family: inherit; font-size: 10px; cursor: pointer; border: 2px solid #27ae60; background: #2ecc71; color: white; border-radius: 6px; font-weight: bold; text-shadow: 1px 1px 0 rgba(0,0,0,0.2);}
        .btn:active { transform: translateY(2px); filter: brightness(0.9); }
        
        .sold-out { background: #95a5a6 !important; border-color: #7f8c8d !important; cursor: not-allowed; }

        .limit-tag {
            background: #e74c3c; color: white; font-size: 8px; 
            padding: 2px 5px; border-radius: 4px; margin-left: 5px;
            vertical-align: middle; display: inline-block;
        }

        .back-btn { background: #7f8c8d; color: white; padding: 15px; text-decoration: none; font-size: 14px; border: 3px solid #fff; display: block; width: 100%; max-width: 600px; box-sizing: border-box; border-radius: 8px;}
        
        #game-toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.95); border: 2px solid #f1c40f;
            color: #fff; padding: 15px 30px; border-radius: 30px; z-index: 20000;
            font-size: 14px; font-weight: bold; white-space: nowrap;
            transition: top 0.5s ease-in-out; box-shadow: 0 5px 15px rgba(0,0,0,0.5); pointer-events: none; 
        }

        #bulk-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 30000; display: none;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #fff; border-top: 4px solid #f1c40f;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="game-toast"></div>
    
    <div id="bulk-overlay">
        <div class="spinner"></div>
        <div id="bulk-text" style="color:white; margin-top:20px; font-size:14px; line-height: 1.6;">
            正在處理...<br>
            <span style="color:#e74c3c; font-weight:bold; font-size:12px;">⚠️ 請勿關閉視窗或上一頁！</span>
        </div>
    </div>

    <div class="header">
        <h1>🛒 道具屋</h1>
        <div class="gold-display">💰 <span id="my-gold">...</span> G</div>
    </div>

    <div class="category-bar">
        <button class="cat-btn active" onclick="filterShop('all')">全部</button>
        <button class="cat-btn" onclick="filterShop('consumable')">消耗/料理</button>
        <button class="cat-btn" onclick="filterShop('equipment')">裝備</button>
        <button class="cat-btn" onclick="filterShop('accessory')">飾品</button>
    </div>

    <!-- 專用優惠區域 -->
    <div id="special-offers-section" style="width: 100%; max-width: 600px; margin-bottom: 10px;">
        <div style="background: linear-gradient(135deg, #1a0a00 0%, #2d1a00 40%, #1a0a00 100%); border: 2px solid #f1c40f; border-radius: 10px; padding: 10px; box-shadow: 0 0 10px rgba(241,196,15,0.3);">
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; border-bottom: 1px solid rgba(241,196,15,0.3); padding-bottom: 8px;">
                <span style="color: #f1c40f; font-size: 12px; font-weight: bold;">⭐ 專用優惠 (10億 G/項)</span>
                <span style="color: #f39c12; font-size: 9px;">效果持續 6 小時</span>
            </div>
            <div id="special-offers-list" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                <div style="text-align: center; padding: 10px; color: #aaa;">載入中...</div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="shop-list" id="shop-list"></div>
    </div>
    <a href="hub.html" class="back-btn">◀ 返回大廳</a>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        const socket = io('https://mmo.ttctv-105.cc', { transports: ['websocket', 'polling'], secure: true });
        let myToken = localStorage.getItem('rpg_token');
        if (!myToken) window.location.href = 'index.html';

        const SHOP_ITEMS = [
            { id: 'safe_stone', name: "防爆石", cost: 5000000000, desc: "強化失敗不掉級，且必定成功！", type: 'consumable' },
            { id: 'enhance_stone', name: "強化石", cost: 50000, desc: "用於強化裝備 (成功率+)", type: 'consumable' },
            { id: 'potion_hp', name: "小紅藥水", cost: 50, desc: "恢復 50 HP", type: 'consumable' },
            { id: 'potion_mid', name: "中紅藥水", cost: 200, desc: "恢復 500 HP", type: 'consumable' },
            { id: 'potion_high', name: "大紅藥水", cost: 600, desc: "恢復 2000 HP", type: 'consumable' }, 
            { id: 'potion_max', name: "特級秘藥", cost: 5000, desc: "恢復 10000 HP", type: 'consumable' },
            { id: 'elixir', name: "神之甘露", cost: 20000, desc: "恢復 50000 HP", type: 'consumable' },
            { id: 'potion_mp', name: "小藍藥水", cost: 80, desc: "恢復 30 MP", type: 'consumable' },
            { id: 'potion_mp_mid', name: "中藍藥水", cost: 200, desc: "恢復 100 MP", type: 'consumable' }, 
            { id: 'potion_mp_high', name: "大藍藥水", cost: 600, desc: "恢復 500 MP", type: 'consumable' }, 
            { id: 'grilled_carp', name: "烤鯉魚", cost: 30, desc: "HP+100", type: 'consumable' },
            { id: 'salmon_sushi', name: "鮭魚壽司", cost: 50, desc: "MP+50", type: 'consumable' },
            { id: 'tuna_steak', name: "煎鮪魚排", cost: 200, desc: "HP+500", type: 'consumable' },
            { id: 'eel_rice', name: "鰻魚飯", cost: 300, desc: "HP+300, MP+100", type: 'consumable' },
            { id: 'void_soup', name: "虛空海鮮湯", cost: 1000000, desc: "HP/MP 全滿", type: 'consumable' },
            { id: 'wood_sword', name: "木劍", cost: 100, desc: "ATK+10", type: 'equipment' },
            { id: 'copper_dagger', name: "銅匕首", cost: 400, desc: "ATK+20", type: 'equipment' }, 
            { id: 'iron_sword', name: "鐵劍", cost: 1500, desc: "ATK+60", type: 'equipment' }, 
            { id: 'silver_blade', name: "銀刃", cost: 4000, desc: "ATK+100", type: 'equipment' }, 
            { id: 'cloth_armor', name: "布衣", cost: 100, desc: "DEF+5", type: 'equipment' },
            { id: 'leather_armor', name: "皮甲", cost: 400, desc: "DEF+15", type: 'equipment' }, 
            { id: 'chain_mail', name: "鎖子甲", cost: 1500, desc: "DEF+40", type: 'equipment' }, 
            { id: 'iron_armor', name: "鐵盔甲", cost: 4000, desc: "DEF+100", type: 'equipment' }, 
            { id: 'oak_bow', name: "橡木弓", cost: 200, desc: "ATK+25 (採集)", type: 'equipment' },
            { id: 'maple_staff', name: "楓木法杖", cost: 500, desc: "ATK+50 (採集)", type: 'equipment' },
            { id: 'ring_str', name: "力量戒指", cost: 3000, desc: "ATK+30", type: 'accessory' },
            { id: 'bracelet_def', name: "堅毅手環", cost: 3000, desc: "DEF+30", type: 'accessory' }, 
            { id: 'necklace_hp', name: "紅水晶項鍊", cost: 5000, desc: "HP+250", type: 'accessory' }, 
            { id: 'necklace_mp', name: "藍水晶項鍊", cost: 5000, desc: "MP+60", type: 'accessory' }, 
        ];

        let currentFilter = 'all';
        let currentStock = { 'lucky_bag': 0 };
        let isBulkBuying = false;
        let myLevel = 1;

        // 裝備等級限制 (同 server)
        const EQUIP_REQ_LV = {
            'wood_sword':1,'copper_dagger':1,'oak_bow':1,'steel_blade':1,'hero_sword':1,
            'iron_sword':1,'maple_staff':1,'shark_tooth':1,'silver_blade':1,
            'spike_club':1,'poison_dag':1,'assassin_dag':1,'emerald_staff':1,
            'flame_staff':1,'gold_axe':1,'obsidian_blade':1,
            'frost_bow':1,'dragon_spear':1,'mithril_saber':1,
            'void_reaper':1,'void_reaper_dark':1,
            'god_slayer':1,'chaos_staff':1,'genesis_weapon':1,
            'void_blade':1,'galaxy_saber':1,'entropy_sword':1,
            'infinity_blade':1,'singularity_weapon':1,
            'cloth_armor':1,'plate_mail':1,'leather_armor':1,'hunt_vest':1,
            'dragon_mail':1,'chain_mail':1,'iron_armor':1,
            'magma_plate':1,'ice_robe':1,'yeti_cloak':1,
            'demon_armor':1,'angel_armor':1,'genesis_armor':1,
            'void_armor':1,'nebula_plate':1,'entropy_god_armor':1,
            'event_horizon':1,'singularity_armor':1,
            'bone_ring':1,'ring_life':1,'ring_magic':1,
            'ring_str':1,'bracelet_def':1,'necklace_hp':1,'necklace_mp':1,
            'fish_ring':1,'snake_boots':1,'pearl_necklace':1,
            'amulet_soul':1,'ring_lord':1,'crown_chaos':1,
            'ring_galaxy':1,'dimension_ring':1,'mobius_ring':1,'singularity_acc':1,
            'myth_weapon':200,'myth_armor':200,'myth_acc':200
        };

        socket.on('connect', () => { socket.emit('joinGame', myToken); });
        socket.on('playerStatsUpdate', (p) => { 
            myLevel = p.level || 1;
            document.getElementById('my-gold').innerText = p.gold.toLocaleString(); 
            renderShop();
        });
        socket.on('buyResult', (res) => { 
            if(!isBulkBuying) showMsg(res.message); 
        });
        
        socket.on('errorMessage', (msg) => { 
            if(isBulkBuying) {
                // 不做任何事，讓 setInterval 裡面的金幣檢查去停
            } else {
                showMsg("❌ " + msg); 
            }
        });

        socket.on('stockUpdate', (data) => {
            currentStock[data.itemId] = data.count;
            renderShop();
        });

        renderShop();

        window.onbeforeunload = function() {
            if (isBulkBuying) return "正在批量購買中，確定要離開嗎？";
        };

        function filterShop(type) {
            currentFilter = type;
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderShop();
        }

        function renderShop() {
            const list = document.getElementById('shop-list');
            list.innerHTML = '';
            
            const filteredItems = SHOP_ITEMS.filter(item => {
                if (currentFilter === 'all') return true;
                return item.type === currentFilter;
            });

            if (filteredItems.length === 0) {
                list.innerHTML = '<div style="padding:20px; font-size:12px; color:#aaa;">此分類暫無商品</div>';
                return;
            }

            filteredItems.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item-card';

                let stockHtml = '';
                let btnDisabled = false;
                let btnText = '購買';

                if (item.isLimited) {
                    const stock = currentStock[item.id] || 0;
                    if (stock > 0) {
                        stockHtml = `<span class="limit-tag">剩餘: ${stock}</span>`;
                    } else {
                        stockHtml = `<span class="limit-tag" style="background:#7f8c8d;">已售罄</span>`;
                        btnDisabled = true;
                        btnText = '售罄';
                    }
                }

                const shardCost = Math.ceil(item.cost * 0.01);
                const reqLv = EQUIP_REQ_LV[item.id] || 0;
                let lvTag = '';
                if (reqLv > 0) {
                    const ok = myLevel >= reqLv;
                    lvTag = `<span style="font-size:9px;color:${ok ? '#27ae60' : '#e74c3c'};margin-left:4px;">[Lv.${reqLv}]</span>`;
                }
                div.innerHTML = `
                    <div class="item-info">
                        <span class="item-name">${item.name}${lvTag} ${stockHtml}</span>
                        <span class="item-desc">${item.desc}</span>
                    </div>
                    <div class="buy-section">
                        <div class="price">${item.cost.toLocaleString()} G &nbsp;<span style="color:#9b59b6;font-size:10px;">| 💎 ${shardCost.toLocaleString()} 碎片</span></div>
                        <div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;">
                            <button class="btn ${btnDisabled ? 'sold-out' : ''}" 
                                    onclick="buy('${item.id}', false)" 
                                    ${btnDisabled ? 'disabled' : ''}>
                                💰 ${btnText}
                            </button>
                            <button class="btn ${btnDisabled ? 'sold-out' : ''}" 
                                    style="background:#8e44ad;"
                                    onclick="buy('${item.id}', true)" 
                                    ${btnDisabled ? 'disabled' : ''}>
                                💎 碎片
                            </button>
                        </div>
                    </div>
                `;
                list.appendChild(div);
            });
        }
        
        function showMsg(text) {
            const toast = document.getElementById('game-toast');
            toast.innerText = text;
            toast.style.top = "30px"; 
            setTimeout(() => { toast.style.top = "-100px"; }, 3000);
        }

        function buy(id, useShard) { 
            useShard = useShard || false;
            if (id === 'enhance_stone') {
                const input = prompt("請輸入購買數量 (1-100):\n(伺服器限制：約 0.6秒/顆)", "1");
                if (input === null) return; 
                
                let count = parseInt(input);
                if (isNaN(count) || count < 1) count = 1;
                if (count > 100) count = 100; 

                const totalCost = count * 50000;
                
                const currentGold = parseInt(document.getElementById('my-gold').innerText.replace(/,/g, ''));
                if (currentGold < totalCost) {
                    showMsg("❌ 金幣不足！"); // 🟢 改用 showMsg
                    return;
                }

                if (!confirm(`確定要花費 ${totalCost.toLocaleString()} G 購買 ${count} 顆強化石嗎？\n(預計耗時 ${Math.ceil(count * 0.6)} 秒)`)) return;

                isBulkBuying = true;
                const overlay = document.getElementById('bulk-overlay');
                const overlayText = document.getElementById('bulk-text');
                overlay.style.display = 'flex';
                
                let sent = 0;
                
                const updateStatus = () => {
                    overlayText.innerHTML = `正在購買 (${sent}/${count})...<br><span style="color:#e74c3c; font-weight:bold; font-size:12px;">⚠️ 請勿關閉視窗或上一頁！</span>`;
                };

                socket.emit('playerBuy', { itemId: id, useShardPay: useShard });
                sent++;
                updateStatus();

                if (count > 1) {
                    const interval = setInterval(() => {
                        const goldNow = parseInt(document.getElementById('my-gold').innerText.replace(/,/g, ''));
                        if (goldNow < 50000) {
                            clearInterval(interval);
                            finishBulkBuy(`❌ 金幣不足，停止購買！(共買了 ${sent} 顆)`);
                            return;
                        }

                        if (sent >= count) {
                            clearInterval(interval);
                            finishBulkBuy(`✅ ${count} 顆強化石購買完成！`);
                            return;
                        }

                        socket.emit('playerBuy', { itemId: id, useShardPay: useShard });
                        sent++;
                        updateStatus();
                        
                    }, 600); 
                } else {
                    setTimeout(() => finishBulkBuy(`✅ 購買完成！`), 500);
                }
                return;
            }

            if(id === 'lucky_bag') {
                if(!confirm("🧧 確定要花費 10億 G 購買福袋嗎？\n(購買後請至背包使用)")) return;
            }

            socket.emit('playerBuy', { itemId: id, useShardPay: useShard }); 
        }

        function finishBulkBuy(msg) {
            isBulkBuying = false;
            document.getElementById('bulk-overlay').style.display = 'none';
            showMsg(msg);
        }
        
        // ==========================================
        //  專用優惠系統
        // ==========================================
        let specialOffersData = {};
        
        // 請求專用優惠資料
        socket.on('connect', () => {
            socket.emit('getSpecialOffers');
        });
        
        // 接收專用優惠資料
        socket.on('specialOffersData', (data) => {
            specialOffersData = data;
            renderSpecialOffers();
        });
        
        // 購買結果
        socket.on('specialOfferResult', (result) => {
            showMsg(result.message);
            if (result.success) {
                socket.emit('getSpecialOffers');
            }
        });
        
        // 格式化剩餘時間
        function formatTime(ms) {
            if (ms <= 0) return '';
            const totalSeconds = Math.floor(ms / 1000);
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            return `${hours}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }
        
        // 渲染專用優惠列表
        function renderSpecialOffers() {
            const list = document.getElementById('special-offers-list');
            list.innerHTML = '';
            
            const offers = [
                { id: 'atk_boost', name: '⚔️ 攻擊 x2', desc: '戰鬥攻擊力翻倍' },
                { id: 'def_boost', name: '🛡️ 防禦 x2', desc: '戰鬥防禦力翻倍' },
                { id: 'skill_shard_drop', name: '✨ 技能碎片', desc: '每場戰鬥+10碎片' },
                { id: 'exp_boost', name: '📈 經驗 x2', desc: '戰鬥經驗值翻倍' }
            ];
            
            offers.forEach(offer => {
                const data = specialOffersData[offer.id] || {};
                const isActive = data.isActive || false;
                const remainingTime = data.remainingTime || 0;
                const cooldownRemaining = data.cooldownRemaining || 0;
                const canBuy = data.canBuy !== false;
                
                const div = document.createElement('div');
                div.style.cssText = 'background: #34495e; border-radius: 8px; padding: 8px; text-align: center;';
                
                let statusHtml = '';
                let btnHtml = '';
                
                if (isActive) {
                    statusHtml = `<div style="color: #2ecc71; font-size: 9px; margin-top: 4px;">生效中: ${formatTime(remainingTime)}</div>`;
                    btnHtml = `<button style="background: #27ae60; color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 9px; cursor: default; font-family: inherit;">生效中</button>`;
                } else if (cooldownRemaining > 0) {
                    statusHtml = `<div style="color: #e74c3c; font-size: 9px; margin-top: 4px;">冷卻中: ${formatTime(cooldownRemaining)}</div>`;
                    btnHtml = `<button style="background: #7f8c8d; color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 9px; cursor: default; font-family: inherit;">冷卻中</button>`;
                } else {
                    btnHtml = `<button onclick="buySpecialOffer('${offer.id}')" style="background: #f39c12; color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 9px; cursor: pointer; font-family: inherit;">💰 購買</button>`;
                }
                
                div.innerHTML = `
                    <div style="color: #f1c40f; font-size: 10px; font-weight: bold;">${offer.name}</div>
                    <div style="color: #bdc3c7; font-size: 8px;">${offer.desc}</div>
                    ${statusHtml}
                    <div style="margin-top: 6px;">${btnHtml}</div>
                `;
                
                list.appendChild(div);
            });
        }
        
        // 購買專用優惠
        function buySpecialOffer(offerId) {
            const names = {
                'atk_boost': '攻擊力 x2',
                'def_boost': '防禦力 x2',
                'skill_shard_drop': '技能碎片掉落',
                'exp_boost': '經驗值 x2'
            };
            
            if (!confirm(`確定要花費 10億 G 購買【${names[offerId]}】嗎？\n效果持續 6 小時，使用後需等待效果結束才能再次購買。`)) {
                return;
            }
            
            socket.emit('buySpecialOffer', offerId);
        }
        
        // 定時更新顯示
        setInterval(() => {
            if (Object.keys(specialOffersData).length > 0) {
                renderSpecialOffers();
            }
        }, 1000);
    </script>
