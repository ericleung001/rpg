<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>資源採集 - 自動採集版</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            background-color: #2c3e50; color: #fff;
            font-family: 'Press Start 2P', monospace;
            text-align: center; margin: 0; padding: 0;
            display: flex; flex-direction: column; height: 100dvh;
            overflow: scroll;
        }

        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 10px;
            padding-bottom: 40px;
        }

        .header { padding: 10px; border-bottom: 2px solid #fff; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }

        .back-btn {
            background: #e74c3c; border: 2px solid #c0392b; color: white; padding: 8px;
            cursor: pointer; font-family: inherit; font-size: 10px; text-decoration: none;
            position: relative; z-index: 10001;
        }

        .gather-status-bar {
            background: #34495e; padding: 10px; border-radius: 8px; margin-bottom: 15px;
            font-size: 10px; border: 2px solid #7f8c8d; text-align: left;
        }
        .exp-bar { width: 100%; height: 8px; background: #555; margin-top: 5px; border-radius: 4px; overflow:hidden; }
        .exp-fill { height: 100%; background: #f39c12; width: 0%; transition: width 0.3s; }

        .tabs { display: flex; justify-content: center; gap: 5px; margin-bottom: 10px; }
        .tab-btn { background: #34495e; border: 2px solid #7f8c8d; color: #bdc3c7; padding: 10px; cursor: pointer; font-family: inherit; flex: 1; font-size: 10px; }
        .tab-btn.active { background: #2ecc71; color: white; border-color: #27ae60; }

        .count-selector {
            display: flex; justify-content: center; gap: 5px; margin-bottom: 15px;
            background: #2c3e50; padding: 5px; border-radius: 8px; flex-wrap: wrap;
        }
        .count-btn {
            background: #34495e; border: 2px solid #7f8c8d; color: #fff;
            padding: 8px 12px; cursor: pointer; font-family: inherit; font-size: 10px;
            border-radius: 4px; margin-bottom: 5px;
        }
        .count-btn.selected { background: #f39c12; border-color: #e67e22; color: #000; font-weight: bold; }

        .node-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 5px; }

        .node-card {
            background: #3498db; border: 4px solid #2980b9;
            padding: 10px; border-radius: 8px; cursor: pointer; position: relative;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100px;
        }
        .node-card:active { transform: scale(0.95); }
        .node-card.locked { background: #7f8c8d; border-color: #95a5a6; cursor: not-allowed; opacity: 0.7; }

        .action-img { font-size: 30px; margin-bottom: 10px; }

        #game-toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); border: 2px solid #f1c40f; padding: 10px 20px; border-radius: 20px; z-index: 20000; transition: top 0.5s; font-size: 12px; white-space: nowrap; color: white;}

        #lock-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 10000; display: none;
            flex-direction: column; justify-content: center; align-items: center;
            color: white;
        }

        .loading-box {
            width: 80%; max-width: 300px; background: #34495e; padding: 20px;
            border-radius: 10px; border: 2px solid #f1c40f; text-align: center;
        }

        .progress-bar { width: 100%; height: 20px; background: #2c3e50; margin-top: 15px; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: #2ecc71; transition: width 0.1s linear; }
        .loading-text { font-size: 14px; margin-bottom: 5px; font-weight: bold; color: #f1c40f; }

        .overlay-stop-btn {
            background: #c0392b; border: 2px solid #e74c3c; color: white;
            padding: 10px 20px; cursor: pointer; font-family: inherit; font-size: 12px;
            border-radius: 4px; margin-top: 15px;
        }

        .collected-summary {
            margin-top: 10px;
            padding: 10px;
            background: #2c3e50;
            border-radius: 8px;
            font-size: 10px;
            max-height: 120px;
            overflow-y: auto;
        }
        .collected-summary h4 {
            margin: 0 0 8px 0;
            color: #f1c40f;
        }
        .collected-item {
            display: flex;
            justify-content: space-between;
            padding: 2px 0;
            border-bottom: 1px dashed #555;
        }

        #chat-container {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(0, 0, 0, 0.95); border-top: 4px solid #bdc3c7;
            display: flex; flex-direction: column; font-size: 10px;
            z-index: 12000;
            padding-bottom: env(safe-area-inset-bottom);
            transition: height 0.3s ease-in-out;
            height: 30px;
        }

        #chat-header {
            height: 30px; background: #34495e; color: #fff; line-height: 30px;
            cursor: pointer; font-weight: bold; border-bottom: 1px solid #555;
            display: flex; justify-content: center; align-items: center;
            touch-action: manipulation;
            flex-shrink: 0;
        }
        #chat-header:hover { background: #2c3e50; }

        .chat-open { height: 40vh !important; }
        #chat-body { flex: 1; display: none; flex-direction: column; overflow: hidden; }
        .chat-open #chat-body { display: flex; }

        #chat-history { flex: 1; overflow-y: auto; padding: 8px; text-align: left; color: white; }
        #chat-input-area { display: flex; border-top: 1px solid #555; height: 40px; flex-shrink: 0; }
        #chat-input { flex: 1; background: #222; color: white; border: none; padding: 0 10px; font-family: inherit; font-size: 12px; outline: none; }
        #chat-send { background: #2980b9; color: white; border: none; padding: 0 15px; cursor: pointer; font-family: inherit; font-size: 12px; font-weight: bold; touch-action: manipulation; }

        @media (min-width: 1024px) {
            body {
                flex-direction: row;
                justify-content: center;
                background-color: #222;
            }
            #app-layout {
                display: flex;
                width: 1000px;
                background-color: #2c3e50;
                box-shadow: 0 0 20px rgba(0,0,0,0.5);
                height: 100%;
            }
            #main-content {
                width: 600px;
                border-right: 4px solid #bdc3c7;
                padding-bottom: 10px;
            }
            #chat-container {
                position: relative;
                width: 400px;
                height: 100% !important;
                border-top: none;
                background: #34495e;
                z-index: 12000;
            }
            #chat-header {
                cursor: default;
                background: #2c3e50;
            }
            #chat-header:active { pointer-events: none; }
            #chat-body {
                display: flex !important;
                height: calc(100% - 30px);
            }
        }
    </style>
</head>
<body>
    <div id="game-toast"></div>

    <div id="app-layout">
        <div id="main-content">
            <div class="header">
                <span style="font-size:12px;">🌲 資源採集 v4</span>
                <a href="hub.html" class="back-btn">回大廳</a>
            </div>

            <div class="gather-status-bar">
                <div style="display:flex; justify-content:space-between;">
                    <span>採集熟練度: Lv.<span id="gather-lv">1</span></span>
                    <span id="gather-exp-txt">0/500</span>
                </div>
                <div class="exp-bar"><div id="gather-exp-fill" class="exp-fill"></div></div>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('wood')">🪓 伐木</button>
                <button class="tab-btn" onclick="switchTab('mine')">⛏️ 採礦</button>
                <button class="tab-btn" onclick="switchTab('fish')">🎣 釣魚</button>
            </div>

            <div class="count-selector">
                <button class="count-btn selected" onclick="setCount(1)">x1</button>
                <button class="count-btn" onclick="setCount(30)">x30</button>
                <button class="count-btn" onclick="setCount(50)">x50</button>
                <button class="count-btn" onclick="setCount(70)">x70</button>
                <button class="count-btn" onclick="setCount(100)">x100</button>
                <button class="count-btn" onclick="setCount(200)">x200</button>
                <button class="count-btn" onclick="setCount(500)">x500</button>
            </div>

            <div id="node-list" class="node-container">
                <div style="font-size:10px; color:#aaa; width:200%;">正在讀取資料...</div>
            </div>
        </div>

        <div id="chat-container">
            <div id="chat-header" onclick="toggleChat()"> 公頻聊天室 (點擊展開)</div>
            <div id="chat-body">
                <div id="chat-history"></div>
                <div id="chat-input-area">
                    <input type="text" id="chat-input" placeholder="輸入訊息..." maxlength="50">
                    <button id="chat-send">發送</button>
                </div>
            </div>
        </div>
    </div>

    <div id="lock-overlay">
        <div class="loading-box">
            <div class="loading-text" id="action-text">正在採集中...</div>
            <div id="queue-text" style="font-size: 10px; color: #ccc;">剩餘次數: 0</div>
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
            <div id="timer-text" style="margin-top: 5px; font-size: 10px; color: #aaa;">伺服器後台執行中，可關閉頁面</div>

            <div class="collected-summary" id="collected-summary" style="display:none;">
                <h4>📦 已收集物品</h4>
                <div id="collected-items"></div>
            </div>

            <button class="overlay-stop-btn" onclick="stopGathering()">⛔ 停止採集</button>
        </div>
    </div>

    <script src="socket.io.js"></script>
    <script>
const socket = io('https://mmo.ttctv-105.cc', {
    transports: ['websocket', 'polling'],
    secure: true
});

        let myToken = localStorage.getItem('rpg_token');
        if (!myToken) window.location.href = 'index.html';

        let myGatherLv = 1;
        let gatherData = {};
        let currentType = 'wood';

        // 🟢 狀態控制變數
        let isGathering = false;
        let targetCount = 1;
        let remainingCount = 0;
        let currentGatherNodeId = null;
        let currentGatherTime = 0;
        let currentActionName = "";
        let collectedItems = {};
        let hasRequestedStatus = false; // 🟢 防止重複請求
        let collectedItemNames = {}; // 🟢 物品中文名稱映射

        socket.on('connect', () => {
            socket.emit('joinGame', myToken);
        });

        socket.on('playerStatsUpdate', (p) => {
            myGatherLv = p.gatherLevel || 1;
            updateGatherUI(myGatherLv, p.gatherExp || 0, myGatherLv * 500);

            // 🟢 修改：不要在這裡請求狀態，等服務器主動發送 autoGatherResumed
            // 只在首次加載且沒有正在進行中的任務時才請求
            if (!isGathering && !hasRequestedStatus && Object.keys(gatherData).length === 0) {
                socket.emit('getGatherNodes');
            } else if (Object.keys(gatherData).length > 0) {
                renderNodes();
            }
        });

        socket.on('gatherNodeList', (data) => {
            gatherData = data;
            renderNodes();
        });

        // 🟢 [聊天室邏輯]
        socket.on('chatHistory', (history) => {
            const box = document.getElementById('chat-history');
            box.innerHTML = '';
            history.forEach(data => appendChat(data.name, data.msg));
        });

        socket.on('chatMessage', (data) => {
            if (data.isRoomChat) return;
            appendChat(data.name, data.msg);
        });

        function appendChat(name, msg) {
            const history = document.getElementById('chat-history');
            const div = document.createElement('div');

            const nameSpan = document.createElement('span');
            nameSpan.style.color = '#f1c40f';
            nameSpan.style.fontWeight = 'bold';
            nameSpan.textContent = `[${name}]: `;

            const msgNode = document.createTextNode(msg);

            div.appendChild(nameSpan);
            div.appendChild(msgNode);

            history.appendChild(div);
            history.scrollTop = history.scrollHeight;
        }

        document.getElementById('chat-send').onclick = sendChat;
        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendChat();
        });

        function sendChat() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if (msg) { socket.emit('sendChat', msg); input.value = ''; }
        }

        function toggleChat() {
            const chat = document.getElementById('chat-container');
            const header = document.getElementById('chat-header');

            if (window.innerWidth >= 1024) return;

            chat.classList.toggle('chat-open');
            if(chat.classList.contains('chat-open')) {
                header.innerText = " 點擊收起";
            } else {
                header.innerText = " 公頻聊天室 (點擊展開)";
            }
        }

        // ==========================================
        // 🟢 [核心] 自動採集邏輯
        // ==========================================

        // 初始化採集
        function initGatherSequence(nodeId, duration, name) {
            if (isGathering) return;

            currentGatherNodeId = nodeId;
            currentGatherTime = duration || 3000;
            currentActionName = name;
            collectedItems = {};
            collectedItemNames = {}; // 🟢 清除物品名稱映射

            socket.emit('startAutoGather', {
                nodeId: nodeId,
                count: targetCount
            });
        }

        // 🟢 監聽自動採集開始
        socket.on('autoGatherStarted', (data) => {
            isGathering = true;
            remainingCount = data.totalCount;
            currentGatherTime = data.gatherTime;

            document.querySelectorAll('.count-btn').forEach(b => b.style.opacity = '0.5');
            document.querySelectorAll('.tab-btn').forEach(b => b.style.opacity = '0.5');
            document.getElementById('lock-overlay').style.display = 'flex';
            document.getElementById('action-text').innerText = `🖥️ 後台採集中：${data.nodeName}`;
            document.getElementById('queue-text').innerText = `剩餘次數: ${remainingCount}`;
            document.getElementById('timer-text').innerText = '伺服器後台執行中，可關閉頁面';

            collectedItems = {};
            updateCollectedSummary();
        });

        // 🟢 監聽採集進度
        socket.on('autoGatherProgress', (data) => {
            if (!isGathering) {
                // 🟢 如果收到進度但不在採集狀態，說明是恢復的任務
                isGathering = true;
                document.querySelectorAll('.count-btn').forEach(b => b.style.opacity = '0.5');
                document.querySelectorAll('.tab-btn').forEach(b => b.style.opacity = '0.5');
                document.getElementById('lock-overlay').style.display = 'flex';
            }

            remainingCount = data.remainingCount;
            document.getElementById('queue-text').innerText = `剩餘次數: ${remainingCount}`;

            collectedItems = data.collectedItems || {};
            // 🟢 合併物品名稱映射
            if (data.collectedItemNames) {
                collectedItemNames = {...collectedItemNames, ...data.collectedItemNames};
            }
            updateCollectedSummary();

            // 更新進度條
            const fill = document.getElementById('progress-fill');
            fill.style.transition = 'none';
            fill.style.width = '0%';
            void fill.offsetWidth;
            setTimeout(() => {
                fill.style.transition = `width ${currentGatherTime}ms linear`;
                fill.style.width = '100%';
            }, 50);

            if (data.lastResult && data.lastResult.success) {
                showToast("✅ " + data.lastResult.msg);
            }

            if (data.lastResult && data.lastResult.gatherLevel) {
                updateGatherUI(data.lastResult.gatherLevel, data.lastResult.gatherExp, data.lastResult.gatherMaxExp);
            }
        });

        // 🟢 監聽採集完成
        socket.on('autoGatherCompleted', (data) => {
            isGathering = false;

            let summary = `🎉 採集完成！\n`;
            let itemCount = 0;
            for (let itemId in data.collectedItems) {
                itemCount += data.collectedItems[itemId];
            }
            summary += `共收集 ${itemCount} 個物品`;

            showToast(summary);

            // 延遲關閉遮罩（只清理 UI，不發送取消請求）
            setTimeout(() => {
                resetGatheringUI();
            }, 1500);
        });

        // 🟢 監聽採集取消
        socket.on('autoGatherCancelled', (data) => {
            isGathering = false;

            let summary = '⏹️ 採集已停止\n';
            if (data.collectedItems) {
                let itemCount = 0;
                for (let itemId in data.collectedItems) {
                    itemCount += data.collectedItems[itemId];
                }
                summary += `已收集 ${itemCount} 個物品`;
            }

            showToast(summary);
            // 只清理 UI，不發送取消請求（伺服器已經取消了）
            resetGatheringUI();
        });

        // 🟢 監聽採集狀態（手動查詢返回）
        socket.on('autoGatherStatus', (status) => {
            if (status && !isGathering) {
                showGatheringUI(status);
            }
        });

        // 🟢 監聽採集恢復（服務器主動推送）
        socket.on('autoGatherResumed', (data) => {
            console.log('[Gather] 收到恢復事件:', data);
            if (!isGathering) {
                showGatheringUI(data);
            }
        });

        // 🟢🟢 離線採集獎勵通知
        socket.on('offlineGatherResults', (data) => {
            console.log('[Gather] 收到離線獎勵:', data);
            showOfflineGatherModal(data);
        });

        // 🟢🟢 離線採集獎勵彈窗
        function showOfflineGatherModal(data) {
            const modal = document.createElement('div');
            modal.id = 'offline-gather-modal';
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.85);
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 30000;
            `;

            const content = document.createElement('div');
            content.style.cssText = `
                background: linear-gradient(135deg, #27ae60, #1e8449);
                border: 3px solid #f1c40f;
                border-radius: 15px;
                padding: 20px;
                max-width: 350px;
                width: 90%;
                text-align: center;
                animation: popIn 0.3s ease-out;
                font-family: 'Press Start 2P', monospace;
            `;

            const style = document.createElement('style');
            style.textContent = `
                @keyframes popIn {
                    from { transform: scale(0.8); opacity: 0; }
                    to { transform: scale(1); opacity: 1; }
                }
            `;
            document.head.appendChild(style);

            content.innerHTML = `
                <h2 style="color: #f1c40f; margin-bottom: 15px; font-size: 14px;">
                    🌿 離線採集獎勵
                </h2>
                <div style="text-align: left; margin-bottom: 15px; font-size: 10px; line-height: 1.8; color: white;">
                    <p>⏱️ 離線時間: <span style="color: #3498db;">${Math.floor(data.offlineSeconds / 60)} 分鐘</span></p>
                    <p>⛏️ 採集次數: <span style="color: #2ecc71;">${data.gathersCompleted} 次</span></p>
                    <hr style="border-color: rgba(255,255,255,0.3); margin: 10px 0;">
                    <p>✨ 採集經驗: <span style="color: #f1c40f;">+${data.totalGatherExp}</span></p>
                    ${data.itemNames && data.itemNames.length > 0 ? `
                    <div style="margin-top: 10px;">
                        <p style="color: #f1c40f;">📦 獲得物品:</p>
                        <div style="background: rgba(0,0,0,0.3); padding: 8px; border-radius: 5px; margin-top: 5px;">
                            ${data.itemNames.map(name => `<p style="margin: 3px 0; color: #ecf0f1;">${name}</p>`).join('')}
                        </div>
                    </div>
                    ` : ''}
                </div>
                <button id="close-offline-gather-modal" style="
                    background: #2ecc71;
                    color: white;
                    border: 2px solid #27ae60;
                    padding: 10px 30px;
                    border-radius: 5px;
                    font-size: 12px;
                    cursor: pointer;
                    font-family: inherit;
                ">確定</button>
            `;

            modal.appendChild(content);
            document.body.appendChild(modal);

            document.getElementById('close-offline-gather-modal').addEventListener('click', () => {
                modal.remove();
            });

            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.remove();
                }
            });
        }

        // 🟢 顯示採集中的 UI
        function showGatheringUI(data) {
            isGathering = true;
            remainingCount = data.remainingCount;
            currentGatherTime = data.gatherTime;
            currentActionName = data.nodeName;
            collectedItems = data.collectedItems || {};
            collectedItemNames = data.collectedItemNames || {}; // 🟢 恢復物品名稱映射

            document.querySelectorAll('.count-btn').forEach(b => b.style.opacity = '0.5');
            document.querySelectorAll('.tab-btn').forEach(b => b.style.opacity = '0.5');
            document.getElementById('lock-overlay').style.display = 'flex';
            document.getElementById('action-text').innerText = `🖥️ 後台採集中：${data.nodeName}`;
            document.getElementById('queue-text').innerText = `剩餘次數: ${data.remainingCount}`;
            document.getElementById('timer-text').innerText = '已恢復採集任務！';

            updateCollectedSummary();

            showToast('✅ 已恢復採集任務，剩餘 ' + data.remainingCount + ' 次');
        }

        // 🟢 更新收集物品統計 UI
        function updateCollectedSummary() {
            const summaryDiv = document.getElementById('collected-summary');
            const itemsDiv = document.getElementById('collected-items');

            if (Object.keys(collectedItems).length === 0) {
                summaryDiv.style.display = 'none';
                return;
            }

            summaryDiv.style.display = 'block';
            itemsDiv.innerHTML = '';

            for (let itemId in collectedItems) {
                const count = collectedItems[itemId];
                // 🟢 使用中文名稱，如果沒有則使用英文ID
                const displayName = collectedItemNames[itemId] || itemId;
                const div = document.createElement('div');
                div.className = 'collected-item';
                div.innerHTML = `<span>${displayName}</span><span>x${count}</span>`;
                itemsDiv.appendChild(div);
            }
        }

        function updateGatherUI(lv, exp, max) {
            document.getElementById('gather-lv').innerText = lv;
            document.getElementById('gather-exp-txt').innerText = `${exp}/${max}`;
            document.getElementById('gather-exp-fill').style.width = Math.min(100, (exp / max * 100)) + '%';
        }

        function switchTab(type) {
            // 切换标签时不取消后台任务，只更新 UI
            currentType = type;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderNodes();
        }

        function setCount(n) {
            if (isGathering) return;
            targetCount = n;
            document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('selected'));
            event.target.classList.add('selected');
        }

        // 🟢 清理 UI 狀態（不取消後台任務）
        function resetGatheringUI() {
            isGathering = false;
            remainingCount = 0;
            currentGatherNodeId = null;
            collectedItems = {};
            collectedItemNames = {}; // 🟢 清除物品名稱映射

            document.getElementById('lock-overlay').style.display = 'none';
            document.getElementById('collected-summary').style.display = 'none';

            document.querySelectorAll('.count-btn').forEach(b => b.style.opacity = '1');
            document.querySelectorAll('.tab-btn').forEach(b => b.style.opacity = '1');
        }

        // 🟢 真正取消採集（會通知伺服器停止後台任務）
        function stopGathering() {
            if (isGathering) {
                socket.emit('cancelAutoGather');
            }

            resetGatheringUI();
        }

        function renderNodes() {
            const container = document.getElementById('node-list');
            container.innerHTML = '';

            if (Object.keys(gatherData).length === 0) {
                container.innerHTML = '<div style="padding:20px; font-size:10px;">載入中...</div>';
                return;
            }

            Object.keys(gatherData).forEach(key => {
                const node = gatherData[key];
                if (node.type !== currentType) return;

                const isLocked = myGatherLv < node.reqLv;
                const div = document.createElement('div');
                div.className = `node-card ${isLocked ? 'locked' : ''}`;

                let icon = '🌲';
                if(currentType === 'mine') icon = '🪨';
                if(currentType === 'fish') icon = '💧';

                const lockMsg = isLocked ? `(需 Lv.${node.reqLv})` : '';
                
                // 🟢 顯示可能的掉落物品
                let dropInfo = '';
                if (node.dropNames && node.dropNames.length > 0) {
                    const dropStr = node.dropNames.map(d => `${d.name}`).join(', ');
                    dropInfo = `<div style="font-size:8px; color:#aaa; margin-top:3px;">可能獲得: ${dropStr}</div>`;
                }

                div.innerHTML = `
                    <div class="action-img">${icon}</div>
                    <div style="font-size:12px; margin-bottom:5px;">${node.name}</div>
                    <div style="font-size:10px; color:#ddd;">${lockMsg}</div>
                    ${dropInfo}
                `;

                if (!isLocked) {
                    div.onclick = () => initGatherSequence(key, node.time, node.name);
                } else {
                    div.onclick = () => showToast(`❌ 等級不足！需要採集等級 ${node.reqLv}`);
                }

                container.appendChild(div);
            });
        }

        function showToast(msg) {
            const t = document.getElementById('game-toast');
            t.innerText = msg;
            t.style.top = "30px";
            setTimeout(() => { t.style.top = "-100px"; }, 2500);
        }
    </script>
</body>
</html>
