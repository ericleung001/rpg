<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>公會大廳</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body { 
            background-color: #222; color: #ecf0f1; 
            font-family: 'Press Start 2P', monospace; 
            text-align: center; margin: 0; padding: 0; height: 100dvh; 
            display: flex; justify-content: center;
            overflow: hidden; 
        }

        #app-layout {
            display: flex;
            flex-direction: column; 
            width: 100%;
            height: 100%;
            max-width: 600px; 
            position: relative;
            background: #2c3e50;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        #container {
            flex: 1; 
            display: flex; flex-direction: column;
            background: #34495e; box-sizing: border-box;
            border-left: 2px solid #555; border-right: 2px solid #555;
            padding-bottom: 35px; 
            overflow: hidden;
            width: 100%;
        }

        .header {
            padding: 15px; background: #2c3e50; border-bottom: 4px solid #f1c40f;
            display: flex; justify-content: space-between; align-items: center;
            flex-shrink: 0;
        }
        .title { color: #f1c40f; font-size: 16px; font-weight: bold; }
        .back-btn { 
            background: #e74c3c; color: white; border: 2px solid #c0392b; 
            padding: 8px 15px; cursor: pointer; font-family: inherit; font-size: 10px; border-radius: 4px;
        }

        .content { flex: 1; overflow-y: auto; padding: 15px; }

        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn {
            flex: 1; padding: 10px; background: #95a5a6; color: #2c3e50; border: none;
            cursor: pointer; font-family: inherit; font-size: 10px; border-radius: 5px 5px 0 0;
        }
        .tab-active { background: #ecf0f1; font-weight: bold; border-bottom: 3px solid #3498db; }

        .card {
            background: rgba(0,0,0,0.2); border: 1px solid #7f8c8d;
            padding: 10px; margin-bottom: 8px; border-radius: 5px; text-align: left;
            display: flex; justify-content: space-between; align-items: center;
        }
        .card-name { font-size: 12px; color: #3498db; font-weight: bold; margin-bottom: 3px; }
        .card-info { font-size: 9px; color: #bdc3c7; }
        .btn-action {
            padding: 5px 10px; font-size: 9px; border: none; border-radius: 3px; cursor: pointer; color: white; margin-left: 5px;
        }
        .btn-green { background: #27ae60; }
        .btn-red { background: #c0392b; }
        .btn-blue { background: #2980b9; }
        .btn-gold { background: #f39c12; color: black; }

        .info-box {
            background: #2c3e50; padding: 15px; border-radius: 8px; border: 2px solid #3498db;
            margin-bottom: 15px; font-size: 10px; line-height: 1.8; text-align: left;
        }

        .loading { margin-top: 50px; color: #aaa; font-size: 10px; }
        
        input { padding: 8px; font-family: inherit; font-size: 12px; }
        select { padding: 8px; font-family: inherit; font-size: 12px; width: 100%; margin-bottom: 10px; }
        
        .offline { color: #95a5a6; }

        .dist-row { display: flex; align-items: center; margin-bottom: 8px; font-size: 10px; border-bottom: 1px dashed #555; padding-bottom: 5px; }
        .dist-checkbox { width: 20px; height: 20px; margin-right: 10px; }

        #chat-container {
            display: flex; flex-direction: column; font-size: 10px; z-index: 100;
            background: #34495e;
        }
        
        #chat-container {
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: rgba(0, 0, 0, 0.95); border-top: 4px solid #bdc3c7;
            padding-bottom: env(safe-area-inset-bottom);
            transition: height 0.3s ease-in-out;
            height: 35px; 
        }
        #chat-header {
            height: 35px; background: #34495e; color: #fff; line-height: 35px; 
            cursor: pointer; font-weight: bold; border-bottom: 1px solid #555;
            display: flex; justify-content: center; align-items: center;
            touch-action: manipulation; flex-shrink: 0;
        }
        #chat-header:hover { background: #2c3e50; }

        .chat-open { height: 45vh !important; } 
        
        #chat-body { flex: 1; display: none; flex-direction: column; overflow: hidden; }
        .chat-open #chat-body { display: flex; } 

        #chat-history { flex: 1; overflow-y: auto; padding: 8px; text-align: left; color: white; }
        #chat-input-area { display: flex; border-top: 1px solid #555; height: 40px; flex-shrink: 0; }
        #chat-input { flex: 1; background: #222; color: white; border: none; padding: 0 10px; font-family: inherit; font-size: 12px; outline: none; }
        #chat-send { background: #2980b9; color: white; border: none; padding: 0 15px; cursor: pointer; font-family: inherit; font-size: 12px; font-weight: bold; touch-action: manipulation; }

        @media (min-width: 1024px) {
            #app-layout {
                flex-direction: row; 
                max-width: 1000px;   
            }
            
            #container {
                width: 600px; 
                border-right: 4px solid #bdc3c7;
                padding-bottom: 0; 
                border-left: none;
            }

            #chat-container {
                position: static; 
                width: 400px;     
                height: 100%;     
                border-top: none;
                background: #34495e;
            }

            #chat-header { 
                cursor: default; 
                background: #2c3e50; 
                pointer-events: none; 
                border-bottom: 2px solid #bdc3c7;
            }
            
            #chat-body { display: flex !important; height: calc(100% - 35px); }
        }
    </style>
</head>
<body>

    <div id="app-layout">
        <div id="container">
            <div class="header">
                <div class="title">🏰 公會系統</div>
                <button class="back-btn" onclick="window.location.href='hub.html'">返回大廳</button>
            </div>

            <div class="content" id="main-content">
                <div class="loading">讀取資料中...</div>
            </div>
        </div>

        <div id="chat-container">
            <div id="chat-header" onclick="toggleChat()">🌍 世界頻道 (點擊展開)</div>
            <div id="chat-body">
                <div id="chat-history"></div>
                <div id="chat-input-area">
                    <input type="text" id="chat-input" placeholder="輸入訊息..." maxlength="50">
                    <button id="chat-send">發送</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        const socket = io('https://mmo.ttctv-105.cc', { 
    transports: ['websocket', 'polling'],
    secure: true // 因為你用 https，建議加呢個
});
        
        const myToken = localStorage.getItem('rpg_token');
        if (!myToken) window.location.href = 'index.html';

        function escapeHtml(text) {
            if (!text) return text;
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        // 🟢 [核心] 轉生稱號格式化工具
        function formatName(name, rebirth) {
            // 如果 rebirth 存在且大於 0
            if (rebirth && rebirth > 0) {
                // 回傳：名字 + 金色加粗的 +N
                return `${escapeHtml(name)}<span style="color:#f1c40f; font-weight:bold; margin-left:2px;">+${rebirth}</span>`;
            }
            // 否則只回傳名字
            return escapeHtml(name);
        }

        const ITEM_NAME_MAP = {
            'copper_ore': '銅礦石', 'soft_fur': '柔軟皮毛', 'beast_fang': '野獸尖牙', 'slime_gel': '黏液',
            'iron_ore': '鐵礦石', 'leather': '皮革', 'tough_hide': '硬皮革', 'magic_dust': '魔粉',
            'poison_sac': '毒囊', 'bone_shard': '碎骨片', 'silver_ore': '銀礦石', 'fire_core': '火焰核心',
            'lava_rock': '熔岩石', 'dragon_scale': '龍鱗', 'gold_ore': '金礦石', 'ice_crystal': '永恆冰晶',
            'yeti_fur': '雪怪毛皮', 'spirit_dust': '靈魂粉末', 'mithril': '秘銀', 'void_dust': '虛空之塵',
            'demon_horn': '惡魔之角', 'dark_essence': '暗之精華', 'adamantite': '精金', 'god_blood': '神之血',
            'chaos_orb': '混沌寶珠', 'angel_feather': '天使之羽', 'titan_steel': '泰坦神鋼', 'star_fragment': '星之碎片',
            'oak_log': '橡木原木', 'maple_log': '楓木原木', 'yew_log': '紫杉原木', 'ancient_log': '遠古神木',
            'spirit_wood': '靈木', 'dragon_wood': '龍骨木', 'void_wood': '虛空木', 'chaos_wood': '混沌神木',
            'carp': '鯉魚', 'salmon': '鮭魚', 'koi': '錦鯉', 'magic_fish': '魔力魚', 'tuna': '黑鮪魚',
            'shark': '大白鯊', 'lava_eel': '熔岩鰻', 'void_squid': '虛空烏賊', 'god_carp': '神之鯉',
            'pearl': '珍珠', 'coal': '煤炭', 'ruby': '紅寶石', 'diamond': '鑽石',
            'void_shard': '虛空碎片', 'dark_matter': '暗物質', 'star_core': '恆星核心',
            'cosmic_steel': '宇宙鋼', 'time_sand': '時光之沙', 'dimension_gem': '維度寶石',
            'entropy_origin': '熱寂原點',
            'void_blade': '虛空之刃', 'void_armor': '虛空戰甲',
            'galaxy_saber': '銀河光劍', 'nebula_plate': '星雲板甲',
            'ring_galaxy': '銀河指環', 'genesis_weapon': '創世·終焉之劍', 'genesis_armor': '創世·神之庇護',
            'potion_hp': '生命藥水', 'potion_mp': '魔力藥水', 'potion_mid': '中級藥水',
            'scroll_exp': '經驗卷軸', 'lucky_bag': '幸運福袋', 'enhance_stone': '強化石',
            'elixir': '萬能藥', 'gem_atk': '攻擊寶石', 'god_stone': '神之石',
            'quantum_residue': '量子殘渣', 'multiverse_shard': '多元宇宙碎片', 'divinity_core': '創世神格',
            'infinity_blade': '無限之刃', 'event_horizon': '視界戰甲', 'mobius_ring': '莫比烏斯環',
            'singularity_weapon': '奇點·萬象崩壞', 'singularity_armor': '奇點·絕對防禦', 'singularity_acc': '奇點·因果律',
            // [新增] 碎片商店專屬飾物
    'shard_ring_novice': '學徒碎片戒指',   // Lv.10
    'shard_neck_brave': '勇者碎片項鍊',    // Lv.30
    'shard_charm_wind': '疾風碎片護符',    // Lv.60
    'shard_ring_vampire': '吸血鬼碎片指環', // Lv.100 (特殊：吸血)
    'shard_earring_holy': '神聖碎片耳環',   // Lv.150 (高魔力)
    'shard_belt_titan': '泰坦碎片腰帶',    // Lv.200 (高防禦)
    'shard_pendant_dragon': '龍魂碎片吊墜', // Lv.300 (高攻防)
    'shard_ring_void': '虛空碎片之戒',     // Lv.400
    'shard_core_galaxy': '銀河碎片核心',   // Lv.450
    'shard_crown_infinity': '無限碎片皇冠', // Lv.500 (畢業級)
    // 在 ITEM_NAME_MAP 中加入：
	'shard_blade_novice': '碎光長劍',
	'shard_axe_crystal': '晶體戰斧',
	'shard_scythe_void': '虛空撕裂者',
	'shard_spear_galaxy': '星河·貫穿之槍',
	'shard_wep_dimension': '維度·終焉裁決',
	'shard_wep_origin': '原初·萬物歸零',
	// 在 ITEM_NAME_MAP 中加入：
	'shard_armor_novice': '碎光輕甲',
	'shard_armor_crystal': '晶體戰甲',
	'shard_robe_void': '虛空行者法袍',
	'shard_plate_galaxy': '星河·不滅壁壘',
	'shard_armor_dimension': '維度·虛數裝甲',
	'shard_armor_origin': '原初·混沌神軀'
        };

        let currentTab = 'members';
        let myGuildData = null;
        let myInventory = {}; 

        socket.on('connect', () => {
            socket.emit('joinGame', myToken);
            setTimeout(() => socket.emit('getGuildInfo'), 500);
        });

        socket.on('playerStatsUpdate', (p) => {
            myInventory = p.inventory || {};
        });

        socket.on('refreshGuildUI', () => { socket.emit('getGuildInfo'); });

        socket.on('guildChatUpdate', (history) => {
            const chatBox = document.getElementById('g-chat-box');
            if (chatBox) renderChatHistory(history);
        });

        socket.on('chatHistory', (history) => {
            const box = document.getElementById('chat-history');
            box.innerHTML = ''; 
            history.forEach(data => appendWorldChat(data.name, data.msg, data.rebirth));
        });
        socket.on('chatMessage', (data) => {
            if (data.name === '系統' && data.msg.includes('強化')) return; 
            appendWorldChat(data.name, data.msg, data.rebirth);
        });

        function appendWorldChat(name, msg, rebirth) {
            const div = document.createElement('div');
            if (name === '系統') {
                div.innerHTML = `<span style="color:#e74c3c; font-weight:bold;">[系統]:</span> <span style="color:#bdc3c7;">${msg}</span>`;
            } else {
                const displayName = formatName(name, rebirth);
                div.innerHTML = `<span style="color:#f1c40f; font-weight:bold;">[${displayName}]:</span> ${escapeHtml(msg)}`;
            }
            document.getElementById('chat-history').appendChild(div);
            const h = document.getElementById('chat-history');
            h.scrollTop = h.scrollHeight;
        }

        socket.on('guildListUpdate', (list) => {
            const container = document.getElementById('main-content');
            let html = `
                <div class="info-box" style="text-align:center;">
                    <div style="margin-bottom:10px; font-size:12px; color:#f1c40f;">你尚未加入任何公會</div>
                    <div style="display:flex; gap:5px; justify-content:center;">
                        <input type="text" id="new-guild-name" placeholder="輸入新公會名稱" style="width:60%">
                        <button class="btn-action btn-blue" onclick="createGuild()">建立 ($50萬)</button>
                    </div>
                </div>
                <div style="text-align:left; font-size:10px; color:#aaa; margin-bottom:5px;">公會列表</div>
            `;
            if (list.length === 0) {
                html += '<div style="margin-top:20px; color:#7f8c8d;">暫無公會，成為第一個建立者吧！</div>';
            } else {
                list.forEach(g => {
                    html += `
                        <div class="card">
                            <div>
                                <div class="card-name">${escapeHtml(g.name)}</div>
                                <div class="card-info">會長: ${escapeHtml(g.leader)} | 人數: ${g.count}/50</div>
                            </div>
                            <button class="btn-action btn-green" onclick="joinGuild('${g.id}')">申請加入</button>
                        </div>`;
                });
            }
            container.innerHTML = html;
        });

        socket.on('myGuildData', (data) => {
            myGuildData = data;
            renderMyGuild();
            if (data.chatHistory) renderChatHistory(data.chatHistory);
        });

        function renderMyGuild() {
            if (!myGuildData) return;
            const container = document.getElementById('main-content');
            const isLeader = myGuildData.isLeader;
            const daily = myGuildData.dailyStatus || { canClaim: false, gold: 0, stone: 0 };

            window.editNotice = function() {
                const newText = prompt("請輸入新的公會公告 (100字內):", myGuildData.notice);
                if (newText !== null) socket.emit('updateGuildNotice', newText);
            };

            let leaveBtnHtml = isLeader 
                ? (myGuildData.members.length === 1 ? `<button class="btn-action btn-red" onclick="leaveGuild()" style="font-size:10px;">⚠️ 解散公會</button>` : '') 
                : `<button class="btn-action btn-red" onclick="leaveGuild()" style="font-size:10px;">🚪 退出公會</button>`;

            let dailyBtnHtml = '';
            if (daily.canClaim) {
                let hint = `可領: ${daily.gold > 0 ? '$' + daily.gold.toLocaleString() : ''} ${daily.stone > 0 ? '強化石x1' : ''}`;
                dailyBtnHtml = `
                    <div style="margin: 10px 0; padding: 10px; background: rgba(241, 196, 15, 0.2); border: 1px solid #f1c40f; border-radius: 5px; text-align: center;">
                        <div style="color: #f1c40f; font-size: 10px; margin-bottom: 5px;">🎁 每日福利 (${hint})</div>
                        <button class="btn-action btn-gold" style="width: 100%; padding: 8px; font-weight: bold;" onclick="claimDaily()">💰 立即領取</button>
                    </div>`;
            } else {
                dailyBtnHtml = `
                    <div style="margin: 10px 0; padding: 5px; background: rgba(0,0,0,0.3); border-radius: 5px; text-align: center; color: #7f8c8d; font-size: 9px;">
                        🎁 每日福利: 今日已領取 或 未達標
                    </div>`;
            }

            let html = `
                <div class="info-box">
                    <div style="font-size:14px; font-weight:bold; color:#f1c40f; margin-bottom:5px; display:flex; justify-content:space-between; align-items:center;">
                        <span>${escapeHtml(myGuildData.name)}</span>
                        ${leaveBtnHtml} 
                    </div>
                    <div style="margin-bottom:5px;">💰 資金: <span style="color:#2ecc71">${myGuildData.gold.toLocaleString()}</span> / 5億</div>
                    
                    ${dailyBtnHtml}

                    <div style="background:rgba(0,0,0,0.3); padding:8px; border-left:3px solid #f39c12; margin:10px 0; border-radius:3px;">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:3px;">
                            <span style="font-size:9px; color:#f39c12; font-weight:bold;">📜 公會公告</span>
                            ${isLeader ? `<button onclick="editNotice()" style="font-size:9px; background:none; border:1px solid #aaa; color:#aaa; cursor:pointer; border-radius:3px;">✏️修改</button>` : ''}
                        </div>
                        <div style="color:#ecf0f1; font-size:10px; white-space: pre-wrap; line-height:1.4;">${escapeHtml(myGuildData.notice || "暫無公告")}</div>
                    </div>

                    <div style="background:rgba(0,0,0,0.4); border:1px solid #7f8c8d; border-radius:5px; margin:10px 0; overflow:hidden;">
                        <div style="background:#34495e; padding:5px 10px; font-size:10px; color:#bdc3c7; border-bottom:1px solid #555;">💬 公會頻 (最近20條)</div>
                        <div id="g-chat-box" style="height:150px; overflow-y:auto; padding:8px; text-align:left; font-size:10px; display:flex; flex-direction:column; gap:4px;">
                            <div style="color:#aaa; text-align:center;">載入中...</div>
                        </div>
                        <div style="display:flex; border-top:1px solid #555;">
                            <input type="text" id="g-chat-input" placeholder="輸入訊息..." style="flex:1; border:none; background:#222; color:white; padding:8px;" maxlength="50">
                            <button onclick="sendGuildChat()" style="background:#2980b9; color:white; border:none; padding:0 15px; cursor:pointer;">發送</button>
                        </div>
                    </div>

                    <div style="margin-top:10px; text-align:left;">
                        <div style="color:#f1c40f; font-size:9px; margin-bottom:3px; font-weight:bold;">🎁 公會福利規則：</div>
                        <div style="color:#bdc3c7; font-size:8px; margin-bottom:3px;">1. 需每日手動點擊上方 [立即領取] 按鈕。</div>
                        <div style="color:#bdc3c7; font-size:8px; margin-bottom:3px;">2. 成員達 20人：每人可領 [強化石 x1]。</div>
                        <div style="color:#bdc3c7; font-size:8px; margin-bottom:8px;">3. 資金達 5億：每人可領本金 10% 利息 (上限1億)。</div>
                    </div>

                    <div style="display:flex; gap:5px; border-top:1px solid #555; padding-top:10px;">
                        <input type="number" id="donate-val" placeholder="金額" style="width:80px; padding:4px;">
                        <button class="btn-action btn-blue" onclick="donate()">捐獻</button>
                    </div>
                </div>

                <div class="tabs">
                    <button class="tab-btn ${currentTab==='members'?'tab-active':''}" onclick="setTab('members')">成員</button>
                    ${isLeader ? `<button class="tab-btn ${currentTab==='distribute'?'tab-active':''}" onclick="setTab('distribute')">🎁 派發</button>` : ''}
                    ${isLeader ? `<button class="tab-btn ${currentTab==='apply'?'tab-active':''}" onclick="setTab('apply')">審核 <span style="background:red; color:white; padding:1px 4px; border-radius:4px; font-size:8px;">${myGuildData.applicants.length}</span></button>` : ''}
                </div>
            `;

            if (currentTab === 'members') {
                html += `<div style="text-align:right; font-size:9px; color:#aaa; margin-bottom:5px;">人數: ${myGuildData.members.length}/50</div>`;
                myGuildData.members.forEach(m => {
                    let kickBtn = (isLeader && m.rank !== '會長') ? `<button class="btn-action btn-red" onclick="kick('${escapeHtml(m.name)}')">踢出</button>` : '';
                    let statusTxt = m.online ? `<span style="color:#2ecc71">●</span>` : `<span class="offline">○</span>`;
                    let moneyText = m.contribution ? m.contribution.toLocaleString() : "0";
                    
                    // 🟢 [核心修改] 使用 formatName 顯示帶轉生數的名字
                    // 注意：m.rebirth 是由 Server 傳來的，如果 Server 沒傳對，這裡會是 undefined
                    const displayName = formatName(m.name, m.rebirth || 0);

                    html += `
                        <div class="card">
                            <div>
                                <div class="card-name" style="color:${m.rank==='會長'?'#f1c40f':'white'}">
                                    [${m.rank}] ${displayName} (Lv.${m.level})
                                </div>
                                <div class="card-info">
                                    ${statusTxt} ${m.online?'線上':'離線'} 
                                    <span style="color:#f39c12; margin-left:8px;">💰 捐獻: ${moneyText}</span>
                                </div>
                            </div>
                            <div>${kickBtn}</div>
                        </div>`;
                });
            } else if (currentTab === 'distribute' && isLeader) {
                let itemOptions = '<option value="">(不發送物品)</option>';
                for(let k in myInventory) {
                    let name = ITEM_NAME_MAP[k] || k;
                    itemOptions += `<option value="${k}">${name} (剩: ${myInventory[k]})</option>`;
                }
                html += `
                    <div style="background:#222; padding:10px; border-radius:5px; margin-bottom:10px; text-align:left;">
                        <div style="color:#f1c40f; margin-bottom:5px; font-weight:bold;">1. 選擇獎勵</div>
                        <div style="margin-bottom:5px;">金幣 (公會出): <input type="number" id="dist-gold" placeholder="0" style="width:80px;"> G</div>
                        <div>物品 (會長出): <select id="dist-item">${itemOptions}</select> 數量: <input type="number" id="dist-item-count" placeholder="1" style="width:50px;"></div>
                    </div>
                    <div style="color:#3498db; margin-bottom:5px; font-weight:bold; display:flex; justify-content:space-between;">
                        <span>2. 選擇對象</span><button class="btn-action btn-blue" onclick="toggleSelectAll()">全選/取消</button>
                    </div>
                    <div id="dist-list">`;
                let memberCount = 0;
                myGuildData.members.forEach(m => {
                    if (m.rank === '會長') return;
                    memberCount++;
                    // 🟢 派發清單也要顯示轉生
                    const dName = formatName(m.name, m.rebirth || 0);
                    html += `<div class="dist-row"><input type="checkbox" class="dist-checkbox" value="${escapeHtml(m.name)}"><span>${dName} <span style="color:#aaa;">(Lv.${m.level})</span></span></div>`;
                });
                if (memberCount === 0) html += '<div style="color:#aaa;">沒有其他會員可派發</div>';
                html += `</div><button class="btn-action btn-gold" style="width:100%; padding:15px; margin-top:10px; font-size:14px;" onclick="submitDistribute()">確認派發</button>`;
            } else if (currentTab === 'apply' && isLeader) {
                if (myGuildData.applicants.length === 0) {
                    html += '<div style="margin-top:20px; color:#7f8c8d;">無申請</div>';
                } else {
                    myGuildData.applicants.forEach(a => {
                        html += `
                            <div class="card">
                                <div class="card-name">${escapeHtml(a.name)}</div>
                                <div>
                                    <button class="btn-action btn-green" onclick="handleApply('${escapeHtml(a.name)}', 'accept')">接受</button>
                                    <button class="btn-action btn-red" onclick="handleApply('${escapeHtml(a.name)}', 'reject')">拒絕</button>
                                </div>
                            </div>`;
                    });
                }
            }
            container.innerHTML = html;
        }

        function renderChatHistory(history) {
            const chatBox = document.getElementById('g-chat-box');
            if (!chatBox) return;
            chatBox.innerHTML = '';
            if (!history || history.length === 0) {
                chatBox.innerHTML = '<div style="color:#aaa; text-align:center; margin-top:20px;">暫無訊息</div>';
                return;
            }
            history.forEach(row => {
                chatBox.innerHTML += `<div><span style="color:#7f8c8d; font-size:8px;">[${row.time}]</span> <span style="color:#f1c40f; font-weight:bold;">${escapeHtml(row.name)}:</span> <span style="color:#ecf0f1;">${escapeHtml(row.msg)}</span></div>`;
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function sendGuildChat() {
            const input = document.getElementById('g-chat-input');
            const msg = input.value.trim();
            if (!msg) return;
            socket.emit('sendGuildChat', msg);
            input.value = '';
        }

        document.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                if (document.activeElement.id === 'g-chat-input') sendGuildChat();
                if (document.activeElement.id === 'chat-input') sendWorldChat();
            }
        });

        function sendWorldChat() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if (!msg) return;
            socket.emit('sendChat', msg);
            input.value = '';
        }

        function toggleChat() {
            if (window.innerWidth >= 1024) return;
            const chat = document.getElementById('chat-container');
            const header = document.getElementById('chat-header');
            chat.classList.toggle('chat-open');
            header.innerText = chat.classList.contains('chat-open') ? "點擊收起" : "🌍 世界頻道 (點擊展開)";
        }
        document.getElementById('chat-send').onclick = sendWorldChat;

        function claimDaily() { socket.emit('claimGuildDaily'); }

        function leaveGuild() {
            const isLeader = myGuildData && myGuildData.isLeader;
            const msg = isLeader 
                ? "確定要【解散公會】嗎？\n此操作無法復原，公會資金與資料將永久刪除！" 
                : "確定要退出公會嗎？\n退出後將無法享有公會福利。";
            if (confirm(msg)) socket.emit('leaveGuild');
        }

        function setTab(t) { currentTab = t; renderMyGuild(); }
        function createGuild() { const name = document.getElementById('new-guild-name').value; if (confirm(`建立公會需花費 500,000G，確定嗎？`)) socket.emit('createGuild', name); }
        function joinGuild(gid) { socket.emit('joinGuildRequest', gid); }
        function donate() { const val = document.getElementById('donate-val').value; if(val) socket.emit('donateGuild', val); }
        function handleApply(targetName, action) { socket.emit('handleGuildApply', { targetName, action }); }
        function kick(targetName) { if(confirm(`確定踢出 [${targetName}]？`)) socket.emit('kickGuildMember', targetName); }
        function toggleSelectAll() { const cbs = document.querySelectorAll('.dist-checkbox'); const all = Array.from(cbs).every(c=>c.checked); cbs.forEach(c=>c.checked=!all); }
        
        function submitDistribute() {
            const cbs = document.querySelectorAll('.dist-checkbox:checked');
            const targets = Array.from(cbs).map(c=>c.value);
            if (targets.length===0) { alert("請至少選擇一位會員！"); return; }
            const gold = document.getElementById('dist-gold').value || 0;
            const itemId = document.getElementById('dist-item').value;
            const itemCount = document.getElementById('dist-item-count').value || 0;
            if (gold==0 && (!itemId || itemCount==0)) { alert("請輸入要派發的金幣或物品數量！"); return; }
            if (confirm(`確定派發給 ${targets.length} 位會員嗎？\n每人獲得: ${gold}G ${itemId ? '+ 物品' : ''}`)) {
                socket.emit('distributeGuildRewards', { targets, gold, itemId, itemCount });
            }
        }

        socket.on('guildOpSuccess', (msg) => { alert("✅ " + msg); });
        socket.on('errorMessage', (msg) => { alert("❌ " + msg); });
    </script>
</body>
</html>
