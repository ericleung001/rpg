<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>公會大廳</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body { 
            background-color: #2c3e50; color: #ecf0f1; 
            font-family: 'Press Start 2P', monospace; 
            text-align: center; margin: 0; padding: 0; height: 100dvh; 
            display: flex; flex-direction: column; align-items: center;
        }

        #container {
            width: 100%; max-width: 600px; height: 100%;
            display: flex; flex-direction: column;
            background: #34495e; box-sizing: border-box;
            border-left: 2px solid #555; border-right: 2px solid #555;
        }

        .header {
            padding: 15px; background: #2c3e50; border-bottom: 4px solid #f1c40f;
            display: flex; justify-content: space-between; align-items: center;
        }
        .title { color: #f1c40f; font-size: 16px; font-weight: bold; }
        .back-btn { 
            background: #e74c3c; color: white; border: 2px solid #c0392b; 
            padding: 8px 15px; cursor: pointer; font-family: inherit; font-size: 10px; border-radius: 4px;
        }

        .content { flex: 1; overflow-y: auto; padding: 15px; }

        /* 標籤頁樣式 */
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn {
            flex: 1; padding: 10px; background: #95a5a6; color: #2c3e50; border: none;
            cursor: pointer; font-family: inherit; font-size: 10px; border-radius: 5px 5px 0 0;
        }
        .tab-active { background: #ecf0f1; font-weight: bold; border-bottom: 3px solid #3498db; }

        /* 卡片樣式 */
        .card {
            background: rgba(0,0,0,0.2); border: 1px solid #7f8c8d;
            padding: 10px; margin-bottom: 8px; border-radius: 5px; text-align: left;
            display: flex; justify-content: space-between; align-items: center;
        }
        .card-name { font-size: 12px; color: #3498db; font-weight: bold; margin-bottom: 3px; }
        .card-info { font-size: 9px; color: #bdc3c7; }
        .btn-action {
            padding: 5px 10px; font-size: 9px; border: none; border-radius: 3px; cursor: pointer; color: white; margin-left: 5px;
        }
        .btn-green { background: #27ae60; }
        .btn-red { background: #c0392b; }
        .btn-blue { background: #2980b9; }

        .info-box {
            background: #2c3e50; padding: 15px; border-radius: 8px; border: 2px solid #3498db;
            margin-bottom: 15px; font-size: 10px; line-height: 1.8; text-align: left;
        }

        .loading { margin-top: 50px; color: #aaa; font-size: 10px; }
        
        input { padding: 8px; font-family: inherit; font-size: 12px; width: 60%; }
    </style>
</head>
<body>

    <div id="container">
        <div class="header">
            <div class="title">🏰 公會系統</div>
            <button class="back-btn" onclick="window.location.href='hub.html'">返回大廳</button>
        </div>

        <div class="content" id="main-content">
            <div class="loading">讀取資料中...</div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        const socket = io('https://mmo.ttctv-105.cc', { transports: ['websocket', 'polling'], secure: true });
        const myToken = localStorage.getItem('rpg_token');
        if (!myToken) window.location.href = 'index.html';

        let currentTab = 'members';
        let myGuildData = null;

        socket.on('connect', () => {
            socket.emit('joinGame', myToken);
            setTimeout(() => socket.emit('getGuildInfo'), 500);
        });

        // 🟢 1. 顯示公會列表 (未加入公會時)
        socket.on('guildListUpdate', (list) => {
            const container = document.getElementById('main-content');
            let html = `
                <div class="info-box" style="text-align:center;">
                    <div style="margin-bottom:10px; font-size:12px; color:#f1c40f;">你尚未加入任何公會</div>
                    <div style="display:flex; gap:5px; justify-content:center;">
                        <input type="text" id="new-guild-name" placeholder="輸入新公會名稱">
                        <button class="btn-action btn-blue" onclick="createGuild()">建立 ($50萬)</button>
                    </div>
                </div>
                <div style="text-align:left; font-size:10px; color:#aaa; margin-bottom:5px;">公會列表</div>
            `;

            if (list.length === 0) {
                html += '<div style="margin-top:20px; color:#7f8c8d;">暫無公會，成為第一個建立者吧！</div>';
            } else {
                list.forEach(g => {
                    html += `
                        <div class="card">
                            <div>
                                <div class="card-name">${escapeHtml(g.name)}</div>
                                <div class="card-info">會長: ${escapeHtml(g.leader)} | 人數: ${g.count}/50</div>
                            </div>
                            <button class="btn-action btn-green" onclick="joinGuild('${g.id}')">申請加入</button>
                        </div>
                    `;
                });
            }
            container.innerHTML = html;
        });

        // 🟢 2. 顯示我的公會 (已加入時)
        socket.on('myGuildData', (data) => {
            myGuildData = data;
            renderMyGuild();
        });

        function renderMyGuild() {
            if (!myGuildData) return;
            const container = document.getElementById('main-content');
            
            // 頂部資訊
            let html = `
                <div class="info-box">
                    <div style="font-size:14px; font-weight:bold; color:#f1c40f; margin-bottom:5px;">${escapeHtml(myGuildData.name)}</div>
                    <div>💰 資金: <span style="color:#2ecc71">${myGuildData.gold.toLocaleString()}</span> / 500,000,000</div>
                    <div style="color:#7f8c8d; font-size:9px; margin-bottom:8px;">(資金達 5億，全員每日享 10% 利息)</div>
                    <div style="display:flex; gap:5px;">
                        <input type="number" id="donate-val" placeholder="金額" style="width:80px; padding:4px;">
                        <button class="btn-action btn-blue" onclick="donate()">捐獻</button>
                    </div>
                </div>

                <div class="tabs">
                    <button class="tab-btn ${currentTab==='members'?'tab-active':''}" onclick="setTab('members')">成員列表</button>
                    ${myGuildData.isLeader ? `<button class="tab-btn ${currentTab==='apply'?'tab-active':''}" onclick="setTab('apply')">入會申請 <span style="background:red; color:white; padding:1px 4px; border-radius:4px; font-size:8px;">${myGuildData.applicants.length}</span></button>` : ''}
                </div>
            `;

            // 內容區
            if (currentTab === 'members') {
                html += `<div style="text-align:right; font-size:9px; color:#aaa; margin-bottom:5px;">人數: ${myGuildData.members.length}/50 (滿20人送強化石)</div>`;
                myGuildData.members.forEach(m => {
                    let kickBtn = (myGuildData.isLeader && m.rank !== '會長') 
                        ? `<button class="btn-action btn-red" onclick="kick('${m.id}')">踢出</button>` 
                        : '';
                    
                    html += `
                        <div class="card">
                            <div>
                                <div class="card-name" style="color:${m.rank==='會長'?'#f1c40f':'white'}">
                                    [${m.rank}] ${escapeHtml(m.name)}
                                </div>
                                <div class="card-info">LV.${m.level}</div>
                            </div>
                            <div>${kickBtn}</div>
                        </div>
                    `;
                });
            } else if (currentTab === 'apply' && myGuildData.isLeader) {
                if (myGuildData.applicants.length === 0) {
                    html += '<div style="margin-top:20px; color:#7f8c8d;">目前沒有入會申請</div>';
                } else {
                    myGuildData.applicants.forEach(a => {
                        html += `
                            <div class="card">
                                <div class="card-name">${escapeHtml(a.name)}</div>
                                <div>
                                    <button class="btn-action btn-green" onclick="handleApply('${a.id}', 'accept')">接受</button>
                                    <button class="btn-action btn-red" onclick="handleApply('${a.id}', 'reject')">拒絕</button>
                                </div>
                            </div>
                        `;
                    });
                }
            }

            container.innerHTML = html;
        }

        // --- 功能函式 ---
        function setTab(t) { currentTab = t; renderMyGuild(); }

        function createGuild() {
            const name = document.getElementById('new-guild-name').value;
            if (confirm(`建立公會需花費 500,000G，確定嗎？`)) {
                socket.emit('createGuild', name);
            }
        }

        function joinGuild(gid) {
            socket.emit('joinGuildRequest', gid);
        }

        function donate() {
            const val = document.getElementById('donate-val').value;
            if(val) socket.emit('donateGuild', val);
        }

        function handleApply(targetId, action) {
            // 前端做個小延遲防止瘋狂連點 (雖然 Server 也有擋)
            socket.emit('handleGuildApply', { targetId, action });
        }

        function kick(targetId) {
            if(confirm("確定要踢出此會員嗎？")) {
                socket.emit('kickGuildMember', targetId);
            }
        }

        socket.on('guildOpSuccess', (msg) => { alert("✅ " + msg); });
        socket.on('errorMessage', (msg) => { alert("❌ " + msg); });

        function escapeHtml(text) {
            if (!text) return text;
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }
    </script>
</body>
</html>
