<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>終極Boss</title>
<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Cinzel:wght@700;900&display=swap');

    :root {
        --gold: #c9a84c;
        --gold-light: #f0d080;
        --gold-dim: #8a7030;
        --red: #e74c3c;
        --red-deep: #8b0000;
        --orange: #e05c20;
        --orange-light: #ff8c42;
        --crimson: #c0392b;
        --ember: #ff4500;
        --bg: #06060e;
        --panel: #0c0c1a;
        --panel2: #10101f;
        --border: #2a1520;
        --text: #c8c8d4;
        --text-dim: #666680;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
        background: var(--bg);
        color: var(--text);
        font-family: 'Noto Sans TC', sans-serif;
        min-height: 100dvh;
        display: flex;
        justify-content: center;
        overflow-x: hidden;
    }

    /* ── Cosmic Starfield Background ────────────────────────── */
    #starfield {
        position: fixed; inset: 0; z-index: 0;
        pointer-events: none; overflow: hidden;
    }
    .star {
        position: absolute;
        width: 2px; height: 2px;
        background: #fff;
        border-radius: 50%;
        animation: twinkle var(--dur) ease-in-out infinite alternate;
    }
    .star.large { width: 3px; height: 3px; background: rgba(255,200,100,0.8); }
    @keyframes twinkle {
        0% { opacity: 0.1; transform: scale(0.5); }
        100% { opacity: var(--max-op, 0.7); transform: scale(1); }
    }

    /* Cosmic radial glows */
    body::before {
        content: '';
        position: fixed; inset: 0; z-index: 0;
        background:
            radial-gradient(ellipse 60% 50% at 50% 30%, rgba(224,92,32,0.08) 0%, transparent 60%),
            radial-gradient(ellipse 40% 30% at 20% 70%, rgba(192,57,43,0.06) 0%, transparent 50%),
            radial-gradient(ellipse 40% 30% at 80% 80%, rgba(139,0,0,0.05) 0%, transparent 50%),
            radial-gradient(ellipse 30% 20% at 50% 100%, rgba(255,69,0,0.07) 0%, transparent 40%);
        pointer-events: none;
        animation: cosmicPulse 10s ease-in-out infinite alternate;
    }
    @keyframes cosmicPulse {
        0% { opacity: 0.6; }
        100% { opacity: 1; }
    }

    #app-layout {
        position: relative; z-index: 1;
        width: 100%; max-width: 600px;
        min-height: 100dvh;
        display: flex; flex-direction: column;
        padding: 0 14px 20px;
    }

    /* ── Back Button ────────────────────────────────────────── */
    .btn-back {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 8px 14px; background: var(--panel);
        border: 1px solid var(--border); border-radius: 6px;
        color: #888; font-size: 12px; cursor: pointer;
        text-decoration: none; margin-top: 14px; margin-bottom: 14px;
        font-family: 'Noto Sans TC', sans-serif;
        transition: border-color 0.2s, color 0.2s;
    }
    .btn-back:hover { border-color: var(--orange); color: var(--orange); }

    /* ── Header ────────────────────────────────────────────── */
    .page-header {
        text-align: center;
        padding: 18px 0 14px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 14px;
        animation: headerGlow 3s ease-in-out infinite alternate;
    }
    @keyframes headerGlow {
        0% { filter: drop-shadow(0 0 8px rgba(224,92,32,0.2)); }
        100% { filter: drop-shadow(0 0 16px rgba(192,57,43,0.3)); }
    }
    .page-title {
        font-family: 'Cinzel', serif;
        font-size: 26px; font-weight: 900;
        background: linear-gradient(135deg, var(--ember), var(--orange-light), var(--crimson), var(--ember));
        background-size: 300% 300%;
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        letter-spacing: 4px;
        animation: titleShimmer 4s ease-in-out infinite;
    }
    @keyframes titleShimmer {
        0%, 100% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
    }
    .page-sub {
        font-size: 10px; color: var(--text-dim);
        margin-top: 4px; letter-spacing: 3px;
    }
    .page-sub span { color: var(--crimson); font-weight: 700; }

    /* ── Card ──────────────────────────────────────────────── */
    .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 14px;
        margin-bottom: 12px;
        position: relative;
        overflow: hidden;
        animation: cardEnter 0.6s ease-out both;
    }
    .card:nth-child(2) { animation-delay: 0.1s; }
    .card:nth-child(3) { animation-delay: 0.2s; }
    .card:nth-child(4) { animation-delay: 0.3s; }
    .card:nth-child(5) { animation-delay: 0.4s; }
    .card:nth-child(6) { animation-delay: 0.5s; }
    @keyframes cardEnter {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .card::before {
        content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
        background: linear-gradient(90deg, transparent, rgba(224,92,32,0.4), transparent);
    }
    .card.boss-card::before {
        background: linear-gradient(90deg, transparent, rgba(192,57,43,0.6), rgba(255,69,0,0.4), transparent);
        height: 2px;
    }
    .card-label {
        font-size: 10px; color: var(--text-dim);
        letter-spacing: 1.5px; text-transform: uppercase;
        margin-bottom: 10px;
        display: flex; align-items: center; gap: 6px;
    }
    .card-label::after {
        content: ''; flex: 1; height: 1px;
        background: var(--border);
    }

    /* ── Boss Panel ────────────────────────────────────────── */
    .boss-panel {
        text-align: center; padding: 24px 14px 18px;
        background: linear-gradient(180deg, #12080a, var(--panel), #0a0508);
    }
    .boss-avatar-container {
        position: relative;
        display: inline-block;
        margin-bottom: 12px;
    }
    .boss-avatar {
        font-size: 72px;
        display: block;
        animation: bossIdle 3s ease-in-out infinite;
        filter: drop-shadow(0 0 20px rgba(255,69,0,0.4));
    }
    @keyframes bossIdle {
        0%, 100% { transform: translateY(0) scale(1); filter: drop-shadow(0 0 20px rgba(255,69,0,0.4)); }
        25% { transform: translateY(-6px) scale(1.02); filter: drop-shadow(0 0 30px rgba(224,92,32,0.5)); }
        50% { transform: translateY(-3px) scale(1.04); filter: drop-shadow(0 0 40px rgba(192,57,43,0.6)); }
        75% { transform: translateY(-8px) scale(1.01); filter: drop-shadow(0 0 25px rgba(255,140,66,0.4)); }
    }
    .boss-glow-ring {
        position: absolute; inset: -20px;
        border: 2px solid rgba(255,69,0,0.15);
        border-radius: 50%;
        animation: ringPulse 2s ease-in-out infinite;
    }
    .boss-glow-ring:nth-child(2) {
        inset: -35px;
        animation-delay: 0.5s;
        border-color: rgba(192,57,43,0.1);
    }
    .boss-glow-ring:nth-child(3) {
        inset: -50px;
        animation-delay: 1s;
        border-color: rgba(224,92,32,0.06);
    }
    @keyframes ringPulse {
        0%, 100% { transform: scale(1); opacity: 0.5; }
        50% { transform: scale(1.1); opacity: 1; }
    }
    .boss-name {
        font-size: 20px; font-weight: 900;
        color: #fff;
        text-shadow: 0 0 20px rgba(255,69,0,0.5), 0 2px 4px rgba(0,0,0,0.8);
        margin-bottom: 4px;
        letter-spacing: 2px;
    }
    .boss-level {
        font-size: 12px; color: var(--ember);
        letter-spacing: 2px; margin-bottom: 16px;
        font-weight: 700;
    }
    .boss-level span {
        color: var(--orange-light);
        font-size: 16px;
    }

    /* Boss HP Bar */
    .boss-hp-container {
        width: 100%; margin-bottom: 14px;
    }
    .boss-hp-label {
        display: flex; justify-content: space-between;
        font-size: 10px; margin-bottom: 4px; color: var(--text-dim);
    }
    .boss-hp-label span:last-child { color: var(--crimson); font-weight: 700; }
    .boss-hp-outer {
        width: 100%; height: 22px;
        background: #1a0808; border-radius: 12px;
        border: 1px solid #3a1515;
        overflow: hidden; position: relative;
        box-shadow: inset 0 2px 6px rgba(0,0,0,0.5);
    }
    .boss-hp-inner {
        height: 100%; border-radius: 12px;
        background: linear-gradient(90deg, var(--red-deep), var(--crimson), var(--ember), var(--orange));
        background-size: 200% 100%;
        animation: hpShimmer 3s linear infinite;
        transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        box-shadow: 0 0 12px rgba(192,57,43,0.5);
    }
    @keyframes hpShimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
    }
    .boss-hp-inner::after {
        content: ''; position: absolute;
        top: 3px; left: 6px; right: 6px; height: 6px;
        background: linear-gradient(180deg, rgba(255,255,255,0.15), transparent);
        border-radius: 4px;
    }
    .boss-hp-text {
        position: absolute; top: 0; left: 0; right: 0; bottom: 0;
        display: flex; align-items: center; justify-content: center;
        font-size: 9px; font-weight: 900; color: #fff;
        text-shadow: 0 1px 3px rgba(0,0,0,0.9);
        letter-spacing: 1px;
    }

    /* Boss Stats Grid */
    .boss-stats-grid {
        display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
        margin-top: 10px;
    }
    .boss-stat {
        display: flex; flex-direction: column; align-items: center;
        background: rgba(192,57,43,0.08);
        border: 1px solid rgba(192,57,43,0.15);
        border-radius: 8px; padding: 10px 8px;
    }
    .boss-stat-icon { font-size: 16px; margin-bottom: 4px; }
    .boss-stat-label { font-size: 9px; color: var(--text-dim); letter-spacing: 1px; margin-bottom: 2px; }
    .boss-stat-value {
        font-size: 14px; font-weight: 900;
        color: var(--orange-light);
        text-shadow: 0 0 8px rgba(255,140,66,0.3);
    }

    /* ── Player Stats Panel ────────────────────────────────── */
    .player-stats-grid {
        display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
        margin-bottom: 12px;
    }
    .player-stat {
        text-align: center;
        background: var(--panel2); border: 1px solid var(--border);
        border-radius: 8px; padding: 10px 6px;
    }
    .player-stat-icon { font-size: 18px; margin-bottom: 4px; }
    .player-stat-label { font-size: 9px; color: var(--text-dim); letter-spacing: 1px; }
    .player-stat-value { font-size: 13px; font-weight: 700; color: var(--gold-light); margin-top: 2px; }

    /* Check Results */
    .check-result {
        display: flex; align-items: center; gap: 10px;
        padding: 10px 12px; border-radius: 8px;
        margin-bottom: 6px; font-size: 12px; font-weight: 500;
    }
    .check-result.pass {
        background: rgba(46,204,113,0.08);
        border: 1px solid rgba(46,204,113,0.2);
        color: #2ecc71;
    }
    .check-result.fail {
        background: rgba(231,76,60,0.08);
        border: 1px solid rgba(231,76,60,0.2);
        color: #e74c3c;
    }
    .check-icon { font-size: 16px; }

    /* ── Requirements Panel ────────────────────────────────── */
    .req-list { font-size: 11px; line-height: 2.4; }
    .req-row {
        display: flex; align-items: center; gap: 8px;
        padding: 4px 0;
    }
    .req-row + .req-row { border-top: 1px solid rgba(42,21,32,0.6); }
    .req-icon { font-size: 14px; flex-shrink: 0; }
    .req-text { flex: 1; color: var(--text); }
    .req-val { color: var(--orange-light); font-weight: 700; white-space: nowrap; }

    /* Comparison Box */
    .comparison-box {
        margin-top: 12px;
        background: var(--panel2);
        border: 1px dashed var(--border);
        border-radius: 8px;
        padding: 12px;
    }
    .comp-title {
        font-size: 9px; color: var(--text-dim);
        letter-spacing: 1.5px; text-align: center;
        margin-bottom: 10px;
    }
    .comp-row {
        display: flex; align-items: center; gap: 6px;
        margin-bottom: 6px; font-size: 11px;
    }
    .comp-label { flex: 1; color: var(--text-dim); }
    .comp-vs { color: var(--crimson); font-weight: 700; font-size: 10px; }
    .comp-player { color: var(--gold-light); font-weight: 700; text-align: right; flex: 1; }
    .comp-boss { color: var(--orange-light); font-weight: 700; text-align: left; flex: 1; }
    .comp-result {
        text-align: center; padding: 8px;
        border-radius: 6px; font-size: 12px; font-weight: 700;
        margin-top: 6px;
    }
    .comp-result.pass { background: rgba(46,204,113,0.1); color: #2ecc71; }
    .comp-result.fail { background: rgba(231,76,60,0.1); color: #e74c3c; }

    /* ── Reward Preview ────────────────────────────────────── */
    .reward-preview {
        text-align: center;
    }
    .reward-title-preview {
        font-size: 20px; font-weight: 900;
        background: linear-gradient(135deg, var(--gold-dim), var(--gold-light), var(--gold), var(--gold-light));
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        margin-bottom: 10px;
        letter-spacing: 3px;
    }
    .reward-items-preview {
        display: flex; flex-direction: column; gap: 6px;
    }
    .reward-item-row {
        display: flex; align-items: center; gap: 10px;
        background: var(--panel2); border: 1px solid var(--border);
        border-radius: 8px; padding: 10px 14px;
        font-size: 12px;
    }
    .reward-item-icon { font-size: 20px; }
    .reward-item-text { flex: 1; color: #bbb; }
    .reward-item-text strong { color: var(--gold-light); }

    /* ── Challenge Button ──────────────────────────────────── */
    .btn-challenge {
        width: 100%; padding: 18px;
        border: none; border-radius: 12px;
        font-family: 'Noto Sans TC', sans-serif;
        font-size: 18px; font-weight: 900;
        cursor: pointer; transition: all 0.3s;
        display: flex; align-items: center; justify-content: center; gap: 10px;
        position: relative; overflow: hidden;
        background: linear-gradient(135deg, var(--red-deep), var(--crimson), var(--ember));
        color: #fff;
        box-shadow: 0 6px 30px rgba(192,57,43,0.4), 0 2px 8px rgba(0,0,0,0.5);
        letter-spacing: 3px;
        animation: challengePulse 2s ease-in-out infinite;
    }
    @keyframes challengePulse {
        0%, 100% { box-shadow: 0 6px 30px rgba(192,57,43,0.4), 0 2px 8px rgba(0,0,0,0.5); }
        50% { box-shadow: 0 8px 40px rgba(255,69,0,0.5), 0 2px 8px rgba(0,0,0,0.5), 0 0 60px rgba(224,92,32,0.15); }
    }
    .btn-challenge:hover:not(:disabled) {
        filter: brightness(1.15);
        transform: translateY(-1px);
    }
    .btn-challenge:active:not(:disabled) { transform: scale(0.98); }
    .btn-challenge:disabled {
        opacity: 0.35; cursor: not-allowed;
        transform: none; filter: none;
        animation: none;
        box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .btn-challenge::before {
        content: '';
        position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        animation: btnSweep 3s ease-in-out infinite;
    }
    @keyframes btnSweep {
        0% { left: -100%; }
        50% { left: 100%; }
        100% { left: 100%; }
    }
    .btn-challenge:disabled::before { display: none; }

    /* ── Victory Screen ────────────────────────────────────── */
    #victory-screen {
        display: none;
        position: fixed; inset: 0; z-index: 500;
        background: radial-gradient(ellipse at center, rgba(40,30,5,0.97), rgba(6,6,14,0.99));
        justify-content: center; align-items: center;
        flex-direction: column; gap: 16px;
        animation: victoryFadeIn 0.8s ease-out;
    }
    #victory-screen.show { display: flex; }
    @keyframes victoryFadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    .victory-particles {
        position: absolute; inset: 0; overflow: hidden; pointer-events: none;
    }
    .v-particle {
        position: absolute;
        width: 4px; height: 4px;
        background: var(--gold-light);
        border-radius: 50%;
        animation: particleRise var(--p-dur, 3s) ease-out infinite;
        animation-delay: var(--p-delay, 0s);
    }
    @keyframes particleRise {
        0% { transform: translateY(100vh) scale(0); opacity: 0; }
        20% { opacity: 1; }
        100% { transform: translateY(-20vh) scale(1.5); opacity: 0; }
    }

    .victory-crown {
        font-size: 60px;
        animation: crownFloat 2s ease-in-out infinite;
        filter: drop-shadow(0 0 20px rgba(240,208,128,0.6));
    }
    @keyframes crownFloat {
        0%, 100% { transform: translateY(0) rotate(-3deg); }
        50% { transform: translateY(-10px) rotate(3deg); }
    }

    .victory-title {
        font-family: 'Cinzel', serif;
        font-size: 36px; font-weight: 900;
        background: linear-gradient(135deg, var(--gold-dim), var(--gold-light), #fff, var(--gold-light), var(--gold));
        background-size: 400% 400%;
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        animation: victoryShimmer 3s ease-in-out infinite, victoryPulse 2s ease-in-out infinite;
        letter-spacing: 6px;
        text-shadow: none;
    }
    @keyframes victoryShimmer {
        0%, 100% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
    }
    @keyframes victoryPulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
    }

    .victory-subtitle {
        font-size: 14px; color: var(--gold);
        text-align: center;
        line-height: 2;
        letter-spacing: 2px;
        animation: victoryTextIn 1s ease-out 0.5s both;
    }
    @keyframes victoryTextIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .victory-title-badge {
        font-size: 12px; color: var(--text-dim);
        background: rgba(201,168,76,0.1);
        border: 1px solid rgba(201,168,76,0.2);
        border-radius: 20px; padding: 6px 18px;
        letter-spacing: 1px;
        animation: victoryTextIn 1s ease-out 0.8s both;
    }

    .btn-victory-back {
        margin-top: 10px; padding: 14px 40px;
        background: linear-gradient(135deg, var(--gold-dim), var(--gold));
        border: none; border-radius: 8px;
        color: #0a0a14; font-family: 'Noto Sans TC', sans-serif;
        font-size: 14px; font-weight: 900;
        cursor: pointer; letter-spacing: 2px;
        transition: all 0.2s;
        animation: victoryTextIn 1s ease-out 1.1s both;
        text-decoration: none; display: inline-block;
    }
    .btn-victory-back:hover { filter: brightness(1.2); }
    .btn-victory-back:active { transform: scale(0.97); }

    /* ── Toast ─────────────────────────────────────────────── */
    #boss-toast {
        position: fixed; top: -80px; left: 50%; transform: translateX(-50%);
        background: var(--panel2); border: 1px solid var(--crimson);
        color: var(--orange-light); padding: 12px 24px;
        border-radius: 8px; font-size: 13px;
        transition: top 0.4s cubic-bezier(0.34,1.56,0.64,1);
        z-index: 1000; white-space: nowrap; max-width: 90vw;
        box-shadow: 0 4px 20px rgba(192,57,43,0.3);
    }
    #boss-toast.show { top: 20px; }
    #boss-toast.error { border-color: var(--red); color: var(--red); }
    #boss-toast.success { border-color: #2ecc71; color: #2ecc71; }

    /* ── Loading State ─────────────────────────────────────── */
    .loading-text {
        text-align: center; color: var(--text-dim);
        font-size: 12px; padding: 40px 0;
    }
    .loading-dots::after {
        content: '';
        animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots {
        0% { content: ''; }
        25% { content: '.'; }
        50% { content: '..'; }
        75% { content: '...'; }
    }

    /* ── Entrance Animations ───────────────────────────────── */
    .entrance-anim {
        animation: entranceRise 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes entranceRise {
        from { opacity: 0; transform: translateY(40px) scale(0.95); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Defeated Badge ────────────────────────────────────── */
    .defeated-badge {
        display: inline-block;
        background: linear-gradient(135deg, var(--gold-dim), var(--gold));
        color: #0a0a14;
        font-size: 10px; font-weight: 900;
        padding: 3px 10px; border-radius: 10px;
        letter-spacing: 1px;
        animation: badgePulse 2s ease-in-out infinite;
    }
    @keyframes badgePulse {
        0%, 100% { box-shadow: 0 0 8px rgba(201,168,76,0.3); }
        50% { box-shadow: 0 0 16px rgba(201,168,76,0.5); }
    }

    /* ── Separator ─────────────────────────────────────────── */
    .sep {
        height: 1px; background: var(--border);
        margin: 6px 0;
    }

    /* ── Result Overlay ────────────────────────────────────── */
    .result-overlay {
        display: none; position: fixed; inset: 0; z-index: 500;
        background: rgba(0,0,0,0.9);
        justify-content: center; align-items: center;
        flex-direction: column; gap: 16px;
        animation: fadeIn 0.4s ease;
    }
    .result-overlay.show { display: flex; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .result-icon { font-size: 64px; animation: resultBounce 0.6s ease-out; }
    @keyframes resultBounce {
        0% { transform: scale(0); }
        60% { transform: scale(1.3); }
        100% { transform: scale(1); }
    }
    .result-title {
        font-family: 'Cinzel', serif;
        font-size: 24px; font-weight: 900;
        letter-spacing: 3px;
    }
    .result-title.win { color: var(--gold-light); text-shadow: 0 0 20px rgba(240,208,128,0.5); }
    .result-title.lose { color: var(--crimson); text-shadow: 0 0 20px rgba(192,57,43,0.5); }
    .result-desc {
        font-size: 13px; color: var(--text-dim);
        text-align: center; line-height: 1.8;
        max-width: 300px;
    }
    .result-rewards {
        background: var(--panel2); border: 1px solid var(--border);
        border-radius: 10px; padding: 14px 20px;
        font-size: 13px; text-align: center;
        min-width: 250px;
    }
    .result-reward-item { margin-bottom: 4px; color: #ccc; }
    .result-reward-item:last-child { margin-bottom: 0; }
    .result-close {
        margin-top: 8px; padding: 12px 36px;
        background: var(--panel); border: 1px solid var(--border);
        border-radius: 8px; color: var(--gold);
        font-family: 'Noto Sans TC', sans-serif;
        font-size: 14px; font-weight: 700;
        cursor: pointer; transition: border-color 0.2s;
        letter-spacing: 1px;
    }
    .result-close:hover { border-color: var(--gold); }
</style>
</head>
<body>
<div id="starfield"></div>
<div id="app-layout">
    <a class="btn-back" href="hub.html">← 返回主城</a>
    <div class="page-header entrance-anim">
        <div class="page-title">💀 終極Boss</div>
        <div class="page-sub">Lv.<span>1000</span> · <span>宇宙終焉者</span></div>
    </div>
    <div class="card entrance-anim" style="margin-top:20px;">
        <div class="card-label">⚔️ 選擇戰鬥模式</div>
        <div style="display:flex; flex-direction:column; gap:12px; margin-top:14px;">
            <button class="btn-challenge" onclick="createUBRoom('solo')" style="animation:none;">
                🗡️ 單人挑戰
            </button>
            <button class="btn-challenge" onclick="createUBRoom('public')" style="animation:none; background:linear-gradient(135deg,#1a5276,#2980b9);">
                🌐 公開房間
            </button>
            <div style="margin-top:6px;">
                <input type="text" id="ub-password" placeholder="輸入房間密碼（選填）" style="width:100%;padding:14px;border-radius:8px;border:1px solid var(--border);background:var(--panel2);color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:14px;box-sizing:border-box;">
            </div>
            <button class="btn-challenge" onclick="createUBRoom('private')" style="animation:none; background:linear-gradient(135deg,#4a235a,#7d3c98);">
                🔒 私人房間
            </button>
        </div>
        <div style="margin-top:16px;">
            <div style="font-size:10px; color:var(--orange); opacity:0.8;">
                ⚠️ 終極次元干擾場：回復技能與增益技能全部被封印！
            </div>
            <div style="font-size:10px; color:var(--text-dim); margin-top:8px;">
                📋 挑戰需求：神話III代全套 +28~30
            </div>
        </div>
    </div>
    <!-- Reward info -->
    <div class="card entrance-anim">
        <div class="card-label">🏆 擊敗獎勵</div>
        <div class="reward-preview">
            <div class="reward-title-preview">「宇宙最強」</div>
            <div class="sep" style="margin:10px 0;"></div>
            <div class="reward-items-preview">
                <div class="reward-item-row"><span class="reward-item-icon">🏅</span><span class="reward-item-text">專屬稱號：<strong>宇宙最強</strong></span></div>
                <div class="reward-item-row"><span class="reward-item-icon">💎</span><span class="reward-item-text">碎片 ×<strong>1,000,000</strong></span></div>
                <div class="reward-item-row"><span class="reward-item-icon">🔮</span><span class="reward-item-text">轉蛋城材料（大量）</span></div>
            </div>
        </div>
    </div>
</div>

<script>
// ── Starfield ────────────────────────────────────────────────────────
function createStarfield() {
    const container = document.getElementById('starfield');
    const count = 80;
    for (let i = 0; i < count; i++) {
        const star = document.createElement('div');
        star.className = 'star' + (Math.random() > 0.85 ? ' large' : '');
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.setProperty('--dur', (2 + Math.random() * 4) + 's');
        star.style.setProperty('--max-op', (0.3 + Math.random() * 0.7));
        star.style.animationDelay = Math.random() * 5 + 's';
        container.appendChild(star);
    }
}
createStarfield();

// ── Socket Connection ────────────────────────────────────────────────
const myToken = localStorage.getItem('rpg_token');
if (!myToken) { location.href = 'index.html'; }
const socket = io('https://mmo.ttctv-105.cc', { transports: ['websocket', 'polling'], secure: true });

function createUBRoom(mode) {
    const password = document.getElementById('ub-password').value || '';
    socket.emit('createUltimateBossRoom', { mode, password });
}

socket.on('connect', () => { socket.emit('joinGame', myToken); });

socket.on('ultimateBossRoomCreated', (res) => {
    if (res && res.roomId) {
        window.location.href = 'battle_v22.html?ub_room=' + res.roomId;
    }
});

socket.on('ultimateBossRoomError', (res) => {
    alert(res.msg || '無法建立房間');
});
</script>
</body>
</html>
