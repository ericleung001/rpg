<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>冒險者公會 - 重設密碼</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body { 
            background-color: #2c3e50; color: #ecf0f1; 
            font-family: 'Press Start 2P', monospace; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100dvh; margin: 0; 
            background-image: radial-gradient(#34495e 15%, transparent 16%), radial-gradient(#34495e 15%, transparent 16%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }

        .container {
            background: #fff; color: #333; 
            padding: 30px 20px; 
            border-radius: 10px; 
            border: 4px solid #000;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.5);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        h1 { font-size: 20px; margin-bottom: 20px; color: #e74c3c; text-shadow: 2px 2px 0 #000; }

        input {
            width: 100%; padding: 12px; margin: 8px 0; 
            font-family: inherit; font-size: 12px; 
            border: 2px solid #333; background: #eee;
            box-sizing: border-box;
            outline: none;
        }
        input:focus { background: #fff; border-color: #3498db; }

        button {
            width: 100%; padding: 14px; margin-top: 12px;
            font-family: inherit; font-size: 13px; font-weight: bold; 
            cursor: pointer; border: 2px solid #000; 
            transition: all 0.1s;
            background: #2ecc71; color: white;
        }
        button:active { transform: translateY(3px); }
        button:disabled { background: #95a5a6; cursor: not-allowed; }

        #msg { margin-top: 15px; font-size: 10px; min-height: 20px; white-space: pre-line; line-height: 1.6; }
        
        .rules { font-size: 9px; color: #999; margin-top: 10px; text-align: left; line-height: 1.8; }
        .rules .ok { color: #27ae60; }
        .rules .fail { color: #e74c3c; }

        .back-link { font-size: 9px; color: #3498db; text-decoration: underline; cursor: pointer; margin-top: 15px; display: inline-block; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🔑 重設密碼</h1>

        <div id="form-area">
            <input type="password" id="new-pass" placeholder="新密碼" maxlength="30" oninput="checkRules()">
            <input type="password" id="confirm-pass" placeholder="確認新密碼" maxlength="30" oninput="checkRules()">

            <div class="rules" id="rules">
                <div id="rule-len">❌ 至少 8 個字元</div>
                <div id="rule-upper">❌ 包含大寫英文 (A-Z)</div>
                <div id="rule-lower">❌ 包含小寫英文 (a-z)</div>
                <div id="rule-num">❌ 包含數字 (0-9)</div>
                <div id="rule-match">❌ 兩次密碼一致</div>
            </div>

            <button id="btn-submit" onclick="doReset()" disabled>🔑 確認重設密碼</button>
        </div>

        <div id="success-area" style="display:none;">
            <div style="font-size:40px; margin:20px 0;">✅</div>
            <div style="font-size:12px; color:#27ae60; font-weight:bold;">密碼重設成功！</div>
            <div style="font-size:10px; color:#666; margin-top:10px;">請用新密碼登入</div>
            <a class="back-link" href="index.html">返回登入頁面</a>
        </div>

        <div id="msg"></div>

        <a class="back-link" href="index.html" id="back-link">◀ 返回登入</a>
    </div>

    <script>
        const msgDiv = document.getElementById('msg');
        const urlParams = new URLSearchParams(window.location.search);
        const resetToken = urlParams.get('token');

        if (!resetToken) {
            document.getElementById('form-area').innerHTML = `
                <div style="font-size:12px; color:#e74c3c; margin:20px 0;">
                    ❌ 無效的重設連結<br><br>
                    <span style="font-size:10px; color:#666;">請從 Email 中點擊正確的連結</span>
                </div>
            `;
        }

        function showMsg(txt, color) {
            msgDiv.style.color = color || "#c0392b";
            msgDiv.innerText = txt;
        }

        // 即時密碼規則檢查
        function checkRules() {
            const pw = document.getElementById('new-pass').value;
            const pw2 = document.getElementById('confirm-pass').value;

            const rules = {
                len: pw.length >= 8,
                upper: /[A-Z]/.test(pw),
                lower: /[a-z]/.test(pw),
                num: /[0-9]/.test(pw),
                match: pw.length > 0 && pw === pw2
            };

            setRule('rule-len', rules.len, '至少 8 個字元');
            setRule('rule-upper', rules.upper, '包含大寫英文 (A-Z)');
            setRule('rule-lower', rules.lower, '包含小寫英文 (a-z)');
            setRule('rule-num', rules.num, '包含數字 (0-9)');
            setRule('rule-match', rules.match, '兩次密碼一致');

            const allPass = Object.values(rules).every(v => v);
            document.getElementById('btn-submit').disabled = !allPass;
        }

        function setRule(id, ok, text) {
            const el = document.getElementById(id);
            el.className = ok ? 'ok' : 'fail';
            el.innerText = (ok ? '✅ ' : '❌ ') + text;
        }

        async function doReset() {
            const newPassword = document.getElementById('new-pass').value;
            const confirmPassword = document.getElementById('confirm-pass').value;

            if (newPassword !== confirmPassword) {
                return showMsg("❌ 兩次密碼不一致");
            }

            document.getElementById('btn-submit').disabled = true;
            showMsg("處理中...", "#666");

            try {
                const resp = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: resetToken, newPassword })
                });
                const result = await resp.json();

                if (result.success) {
                    document.getElementById('form-area').style.display = 'none';
                    document.getElementById('success-area').style.display = 'block';
                    document.getElementById('back-link').style.display = 'none';
                    msgDiv.innerText = "";
                    // 清除可能存在的舊 token
                    localStorage.removeItem('rpg_token');
                } else {
                    showMsg("❌ " + result.msg);
                    document.getElementById('btn-submit').disabled = false;
                }
            } catch (err) {
                showMsg("❌ 網路錯誤，請稍後再試");
                document.getElementById('btn-submit').disabled = false;
            }
        }

        // Enter 鍵提交
        document.getElementById('confirm-pass').addEventListener('keyup', (e) => {
            if (e.key === 'Enter' && !document.getElementById('btn-submit').disabled) doReset();
        });
    </script>
</body>
</html>
