<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>轉生神殿2</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { 
            background-color: #2c3e50; color: #fff; 
            font-family: 'Press Start 2P', monospace; 
            text-align: center; padding: 20px; 
            min-height: 100vh; margin:0; display:flex; flex-direction:column; align-items:center;
        }
        .card { 
            background: rgba(0,0,0,0.3); border: 4px solid #f1c40f; 
            padding: 20px; border-radius: 12px; width: 100%; max-width: 500px;
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.2);
        }
        h1 { color: #f1c40f; margin-bottom: 20px; text-shadow: 2px 2px 0 #000; }
        .info-row { margin: 15px 0; font-size: 12px; line-height: 1.8; }
        .highlight { color: #2ecc71; font-weight: bold; }
        .warn { color: #e74c3c; font-size: 10px; margin-top: 10px; }
        
        .rebirth-badge {
            font-size: 40px; margin: 20px 0; display: block;
        }

        .btn-rebirth {
            background: #e74c3c; color: white; border: 3px solid #c0392b;
            padding: 15px 30px; font-size: 14px; cursor: pointer; border-radius: 8px;
            font-family: inherit; margin-top: 20px; width: 100%;
            transition: transform 0.1s;
        }
        .btn-rebirth:active { transform: scale(0.95); }
        .btn-disabled { background: #7f8c8d; border-color: #95a5a6; cursor: not-allowed; }

        .back-btn { 
            margin-top: 20px; display: block; color: #bdc3c7; text-decoration: none; font-size: 12px; 
            border: 2px solid #bdc3c7; padding: 10px; border-radius: 6px; width: 100%; max-width: 500px; box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>🌟 轉生神殿</h1>
        <div class="rebirth-badge">🔄 <span id="rb-count">0</span></div>
        
        <div class="info-row">
            當前等級: <span id="curr-lv" style="color:#3498db">Loading...</span><br>
            轉生條件: <span style="color:#f1c40f">Lv.900</span><br>
            當前加成: <span id="curr-bonus" class="highlight">0%</span>
        </div>

        <div style="border-top: 1px dashed #555; margin: 15px 0;"></div>

        <div class="info-row" style="text-align: left;">
            <b>轉生好處：</b><br>
            1. 全屬性提升 <span style="color:#2ecc71">+20%</span><br>
            2. 獲得轉生稱號與榮耀<br>
            3. 保留技能與技能等級<br>
            <br>
            <b>🎴 轉生 11 次起額外獎勵：</b><br>
            每次轉生獲得 <span style="color:#f1c40f">50 張一番賞券</span><br>
            <br>
            <b>⚠️ 轉生代價 (硬核模式)：</b><br>
            1. 等級重置為 Lv.1<br>
            2. <span style="color:#e74c3c">保留背包與身上所有裝備/物品</span><br>
            3. <span style="color:#e74c3c">金幣保留上限 1000 萬</span>
        </div>

        <button id="btn-action" class="btn-rebirth btn-disabled" onclick="doRebirth()" disabled>
            等級不足
        </button>
        
        <div id="msg-area" style="margin-top:10px; font-size:10px; color:#f1c40f; min-height:15px;"></div>
    </div>

    <a href="hub.html" class="back-btn">◀ 返回大廳</a>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        const socket = io('https://mmo.ttctv-105.cc', { transports: ['websocket'], secure: true });
        const myToken = localStorage.getItem('rpg_token');
        if (!myToken) window.location.href = 'index.html';

        socket.on('connect', () => { socket.emit('joinGame', myToken); });

        socket.on('playerStatsUpdate', (p) => {
            const rb = p.rebirth || 0;
            const lv = p.level;
            
            document.getElementById('rb-count').innerText = "+" + rb;
            document.getElementById('curr-lv').innerText = "Lv." + lv;
            document.getElementById('curr-bonus').innerText = "+" + (rb * 20) + "%";

            const btn = document.getElementById('btn-action');
            
            if (rb >= 20) {
                btn.innerText = "已達轉生巔峰";
                btn.disabled = true;
                btn.className = "btn-rebirth btn-disabled";
            } else if (lv >= 900) {
                btn.innerText = "🔥 立即轉生 🔥";
                btn.disabled = false;
                btn.className = "btn-rebirth";
            } else {
                btn.innerText = `等級不足 (需 ${900 - lv} 級)`;
                btn.disabled = true;
                btn.className = "btn-rebirth btn-disabled";
            }
        });

        socket.on('rebirthResult', (res) => {
            if (res.success) {
                document.getElementById('msg-area').innerText = "轉生成功！力量湧現！";
                setTimeout(() => {
                    alert("轉生成功！請重新整理頁面以更新狀態。");
                    window.location.href = "hub.html";
                }, 1000);
            }
        });

        socket.on('errorMessage', (msg) => {
            alert(msg);
        });

        function doRebirth() {
            if (confirm("⚠️ 警告：轉生將會重置等級為Lv.1！\n\n背包、裝備及金幣（上限1000萬）將保留。\n\n確定要繼續嗎？")) {
                if(confirm("再問一次：真的要轉生嗎？")) {
                    socket.emit('playerRebirth');
                }
            }
        }
    </script>
</body>
</html>
