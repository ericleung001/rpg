<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>冒險者公會 - 登入</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body { 
            background-color: #2c3e50; color: #ecf0f1; 
            font-family: 'Press Start 2P', monospace; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100dvh; margin: 0; 
            background-image: radial-gradient(#34495e 15%, transparent 16%), radial-gradient(#34495e 15%, transparent 16%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }

        .container {
            background: #fff; color: #333; 
            padding: 30px 20px; 
            border-radius: 10px; 
            border: 4px solid #000;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.5);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        h1 { font-size: 24px; margin-bottom: 20px; color: #e74c3c; text-shadow: 2px 2px 0 #000; }

        input {
            width: 100%; padding: 12px; margin: 6px 0; 
            font-family: inherit; font-size: 12px; 
            border: 2px solid #333; background: #eee;
            box-sizing: border-box;
            outline: none;
        }
        input:focus { background: #fff; border-color: #3498db; }

        .btn-group { display: flex; gap: 8px; margin-top: 15px; flex-wrap: wrap; }

        button {
            flex: 1; padding: 12px; 
            font-family: inherit; font-size: 12px; font-weight: bold; 
            cursor: pointer; border: 2px solid #000; 
            transition: all 0.1s;
            min-width: 80px;
        }
        button:active { transform: translateY(3px); box-shadow: none; }
        
        #msg { margin-top: 12px; font-size: 10px; min-height: 20px; color: #c0392b; white-space: pre-line; line-height: 1.6; }
        
        .footer { margin-top: 30px; font-size: 10px; color: #bdc3c7; }

        .panel { display: none; margin-top: 10px; }
        .panel.active { display: block; }

        .tab-bar { display: flex; gap: 0; margin-bottom: 15px; border-bottom: 2px solid #333; }
        .tab-bar button {
            flex: 1; padding: 10px 5px; font-size: 10px; border: 2px solid #333;
            background: #ddd; color: #666; cursor: pointer; border-bottom: none;
            border-radius: 6px 6px 0 0; margin-bottom: -2px;
        }
        .tab-bar button.active { background: #fff; color: #333; font-weight: bold; }

        .verify-row { display: flex; gap: 8px; align-items: center; margin: 6px 0; }
        .verify-row input { flex: 1; }
        .verify-row .countdown { font-size: 9px; color: #999; min-width: 50px; text-align: center; }

        .hint { font-size: 9px; color: #999; margin-top: 8px; }
        .step-info { font-size: 10px; color: #333; margin-bottom: 8px; background: #f0f0f0; padding: 8px; border-radius: 6px; }
        .step-info b { color: #e74c3c; }
    </style>
</head>
<body>

    <div class="container">
        <h1>⚔️ 冒險者公會</h1>
        
        <!-- Tab 切換 -->
        <div class="tab-bar">
            <button id="tab-login" class="active" onclick="switchTab('login')">📧 登入</button>
            <button id="tab-register" onclick="switchTab('register')">📝 註冊</button>
            <button id="tab-bind" onclick="switchTab('bind')">🔗 綁定Email</button>
        </div>

        <!-- ==================== 登入面板 ==================== -->
        <div id="panel-login" class="panel active">
            <input type="email" id="login-email" placeholder="📧 Email" maxlength="100">
            <input type="password" id="login-pass" placeholder="🔑 密碼" maxlength="20">
            <div class="btn-group">
                <button style="background:#2ecc71; color:white;" onclick="doLogin()">登入</button>
            </div>
            <div class="hint">💡 必須使用已驗證的 Email 登入</div>
        </div>

        <!-- ==================== 註冊面板 ==================== -->
        <div id="panel-register" class="panel">
            <!-- Step 1: 填資料 -->
            <div id="reg-step1">
                <input type="text" id="reg-user" placeholder="👤 帳號 (5字以上，僅英數)" maxlength="20">
                <input type="password" id="reg-pass" placeholder="🔑 密碼 (8位+大寫+小寫+數字)" maxlength="20">
                <input type="email" id="reg-email" placeholder="📧 Email (用來驗證和登入)" maxlength="100">
                <div class="btn-group">
                    <button style="background:#f1c40f; color:black;" onclick="doRegister()">📧 發送驗證碼</button>
                </div>
                <div class="hint">註冊後必須用 Email 登入</div>
            </div>
            <!-- Step 2: 輸入驗證碼 -->
            <div id="reg-step2" style="display:none;">
                <div class="step-info">
                    📧 驗證碼已發送至 <b id="reg-sent-email"></b>
                </div>
                <div class="verify-row">
                    <input type="text" id="reg-code" placeholder="輸入 6 位驗證碼" maxlength="6" style="font-size:18px; text-align:center; letter-spacing:6px;">
                    <span class="countdown" id="reg-countdown"></span>
                </div>
                <div class="btn-group">
                    <button style="background:#2ecc71; color:white;" onclick="doVerifyRegister()">✅ 確認註冊</button>
                    <button style="background:#95a5a6; color:white;" onclick="resetRegister()">◀ 返回</button>
                </div>
            </div>
        </div>

        <!-- ==================== 綁定 Email 面板 (舊玩家) ==================== -->
        <div id="panel-bind" class="panel">
            <div class="step-info" style="background:#fff3e0;">
                ⚠️ 舊玩家必須綁定並驗證 Email<br>
                綁定後請改用 Email 登入
            </div>
            <!-- Step 1 -->
            <div id="bind-step1">
                <input type="text" id="bind-user" placeholder="👤 帳號 (Username)" maxlength="20">
                <input type="password" id="bind-pass" placeholder="🔑 密碼" maxlength="20">
                <input type="email" id="bind-email" placeholder="📧 要綁定的 Email" maxlength="100">
                <div class="btn-group">
                    <button style="background:#e67e22; color:white;" onclick="doBindEmail()">📧 發送驗證碼</button>
                </div>
            </div>
            <!-- Step 2 -->
            <div id="bind-step2" style="display:none;">
                <div class="step-info">
                    📧 驗證碼已發送至 <b id="bind-sent-email"></b>
                </div>
                <div class="verify-row">
                    <input type="text" id="bind-code" placeholder="輸入 6 位驗證碼" maxlength="6" style="font-size:18px; text-align:center; letter-spacing:6px;">
                    <span class="countdown" id="bind-countdown"></span>
                </div>
                <div class="btn-group">
                    <button style="background:#2ecc71; color:white;" onclick="doVerifyBind()">✅ 確認綁定</button>
                    <button style="background:#95a5a6; color:white;" onclick="resetBind()">◀ 返回</button>
                </div>
            </div>
        </div>

        <div id="msg"></div>
        
        <div style="margin-top:10px;">
            <span style="font-size:9px; color:#3498db; cursor:pointer; text-decoration:underline;" onclick="switchTab('changepw')">修改密碼</span>
        </div>

        <!-- ==================== 修改密碼 (隱藏面板) ==================== -->
        <div id="panel-changepw" class="panel">
            <input type="text" id="chpw-user" placeholder="👤 帳號" maxlength="20">
            <input type="password" id="chpw-old" placeholder="🔑 舊密碼" maxlength="20">
            <input type="password" id="chpw-new" placeholder="🔑 新密碼 (8位+大寫+小寫+數字)" maxlength="30">
            <div class="btn-group">
                <button style="background:#8e44ad; color:white;" onclick="doChangePass()">確認修改</button>
                <button style="background:#95a5a6; color:white;" onclick="switchTab('login')">◀ 返回</button>
            </div>
        </div>
    </div>

    <div class="footer">Server Status: <span id="status" style="color:red">Connecting...</span></div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    
    <script>
        
const socket = io('https://mmo.ttctv-105.cc', { 
    transports: ['websocket', 'polling'],
    secure: true
});

        const statusSpan = document.getElementById('status');
        const msgDiv = document.getElementById('msg');
        const savedToken = localStorage.getItem('rpg_token');

        if (savedToken) {
            msgDiv.innerText = "嘗試自動登入中...";
        }

        socket.on('connect', () => {
            statusSpan.innerText = "Online";
            statusSpan.style.color = "#2ecc71";
            if (savedToken) window.location.href = 'hub.html';
        });

        socket.on('connect_error', () => {
            statusSpan.innerText = "Error";
            showMsg("無法連線伺服器，請稍後再試");
        });

        socket.on('disconnect', () => {
            statusSpan.innerText = "Offline";
            statusSpan.style.color = "red";
        });

        // ==================== Tab 切換 ====================
        let currentTab = 'login';
        function switchTab(tab) {
            currentTab = tab;
            // 隱藏所有面板
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            // 取消所有 tab 高亮
            document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
            
            // 啟動目標面板
            const panel = document.getElementById('panel-' + tab);
            if (panel) panel.classList.add('active');
            
            // 高亮 tab (修改密碼沒有 tab 按鈕)
            const tabBtn = document.getElementById('tab-' + tab);
            if (tabBtn) tabBtn.classList.add('active');
            
            msgDiv.innerText = "";
        }

        // ==================== 工具函式 ====================
        function validatePassword(pw) {
            if (pw.length < 8) return "密碼長度需至少 8 位";
            if (!/[A-Z]/.test(pw)) return "密碼需包含大寫英文 (A-Z)";
            if (!/[a-z]/.test(pw)) return "密碼需包含小寫英文 (a-z)";
            if (!/[0-9]/.test(pw)) return "密碼需包含數字 (0-9)";
            return null;
        }

        function showMsg(txt, color) {
            msgDiv.style.color = color || "#c0392b";
            msgDiv.innerText = txt;
        }

        // 倒計時
        let countdownTimers = {};
        function startCountdown(elementId, seconds) {
            const el = document.getElementById(elementId);
            if (!el) return;
            if (countdownTimers[elementId]) clearInterval(countdownTimers[elementId]);
            
            let remaining = seconds;
            el.innerText = `${remaining}s`;
            countdownTimers[elementId] = setInterval(() => {
                remaining--;
                if (remaining <= 0) {
                    clearInterval(countdownTimers[elementId]);
                    el.innerText = "已過期";
                    el.style.color = "#e74c3c";
                } else {
                    const min = Math.floor(remaining / 60);
                    const sec = remaining % 60;
                    el.innerText = min > 0 ? `${min}:${String(sec).padStart(2,'0')}` : `${sec}s`;
                }
            }, 1000);
        }

        // ==================== 登入 ====================
        function doLogin() {
            const email = document.getElementById('login-email').value.trim();
            const pass = document.getElementById('login-pass').value.trim();
            
            if (!socket.connected) return showMsg("⚠️ 無法連線到伺服器");
            if (!email) return showMsg("⚠️ 請輸入 Email");
            if (!pass) return showMsg("⚠️ 請輸入密碼");

            showMsg("處理中...", "#666");
            socket.emit('login', { user: email, pass });
        }

        // Enter 鍵登入
        document.getElementById('login-pass').addEventListener('keyup', (e) => { if (e.key === 'Enter') doLogin(); });
        document.getElementById('login-email').addEventListener('keyup', (e) => { if (e.key === 'Enter') document.getElementById('login-pass').focus(); });

        // ==================== 註冊 ====================
        let pendingRegEmail = null;

        function doRegister() {
            const user = document.getElementById('reg-user').value.trim();
            const pass = document.getElementById('reg-pass').value.trim();
            const email = document.getElementById('reg-email').value.trim();

            if (!socket.connected) return showMsg("⚠️ 無法連線到伺服器");
            if (user.length < 5) return showMsg("⚠️ 帳號至少需 5 字元");
            
            const pwErr = validatePassword(pass);
            if (pwErr) return showMsg("⚠️ " + pwErr);

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) return showMsg("⚠️ 請填寫正確的 Email");

            showMsg("正在發送驗證碼...", "#666");
            socket.emit('register', { user, pass, email });
        }

        function doVerifyRegister() {
            const code = document.getElementById('reg-code').value.trim();
            if (!code || code.length !== 6) return showMsg("⚠️ 請輸入 6 位驗證碼");
            if (!pendingRegEmail) return showMsg("⚠️ 請重新註冊");

            showMsg("驗證中...", "#666");
            socket.emit('verifyRegister', { email: pendingRegEmail, code });
        }

        function resetRegister() {
            document.getElementById('reg-step1').style.display = 'block';
            document.getElementById('reg-step2').style.display = 'none';
            document.getElementById('reg-code').value = '';
            pendingRegEmail = null;
            msgDiv.innerText = "";
        }

        // ==================== 綁定 Email ====================
        let pendingBindEmail = null;

        function doBindEmail() {
            const user = document.getElementById('bind-user').value.trim();
            const pass = document.getElementById('bind-pass').value.trim();
            const email = document.getElementById('bind-email').value.trim();

            if (!socket.connected) return showMsg("⚠️ 無法連線到伺服器");
            if (!user || !pass) return showMsg("⚠️ 請填寫帳號和密碼");
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) return showMsg("⚠️ 請填寫正確的 Email");

            showMsg("正在發送驗證碼...", "#666");
            socket.emit('bindEmail', { user, pass, email });
        }

        function doVerifyBind() {
            const code = document.getElementById('bind-code').value.trim();
            if (!code || code.length !== 6) return showMsg("⚠️ 請輸入 6 位驗證碼");
            if (!pendingBindEmail) return showMsg("⚠️ 請重新操作");

            showMsg("驗證中...", "#666");
            socket.emit('verifyBindEmail', { email: pendingBindEmail, code });
        }

        function resetBind() {
            document.getElementById('bind-step1').style.display = 'block';
            document.getElementById('bind-step2').style.display = 'none';
            document.getElementById('bind-code').value = '';
            pendingBindEmail = null;
            msgDiv.innerText = "";
        }

        // ==================== 修改密碼 ====================
        function doChangePass() {
            const user = document.getElementById('chpw-user').value.trim();
            const oldPass = document.getElementById('chpw-old').value.trim();
            const newPass = document.getElementById('chpw-new').value.trim();

            if (!user || !oldPass || !newPass) return showMsg("請填寫所有欄位");
            const err = validatePassword(newPass);
            if (err) return showMsg("⚠️ " + err);

            showMsg("修改中...", "#666");
            socket.emit('changePassword', { user, oldPass, newPass });
        }

        // ==================== Socket 事件處理 ====================
        
        // 驗證碼已發送
        socket.on('emailCodeSent', (res) => {
            if (!res.success) return;

            if (res.type === 'register') {
                pendingRegEmail = res.email;
                document.getElementById('reg-step1').style.display = 'none';
                document.getElementById('reg-step2').style.display = 'block';
                document.getElementById('reg-sent-email').innerText = res.email;
                document.getElementById('reg-code').focus();
                startCountdown('reg-countdown', 600);
                showMsg(res.msg, "#27ae60");
            } else if (res.type === 'bind') {
                pendingBindEmail = res.email;
                document.getElementById('bind-step1').style.display = 'none';
                document.getElementById('bind-step2').style.display = 'block';
                document.getElementById('bind-sent-email').innerText = res.email;
                document.getElementById('bind-code').focus();
                startCountdown('bind-countdown', 600);
                showMsg(res.msg, "#27ae60");
            }
        });

        // 登入/註冊結果
        socket.on('authResult', (res) => {
            if (res.success) {
                showMsg("✅ " + res.msg, "#27ae60");
                if (res.token) {
                    localStorage.setItem('rpg_token', res.token);
                    setTimeout(() => window.location.href = 'hub.html', 1000);
                }
            } else {
                showMsg("❌ " + res.msg);
            }
        });

        // 綁定結果
        socket.on('bindEmailResult', (res) => {
            if (res.success) {
                showMsg("✅ " + res.msg, "#27ae60");
                setTimeout(() => {
                    resetBind();
                    switchTab('login');
                    showMsg("✅ 綁定成功！現在可以用 Email 登入了", "#27ae60");
                }, 2000);
            } else {
                showMsg("❌ " + res.msg);
            }
        });

        // 舊玩家未綁定 Email → 自動跳轉到綁定面板
        socket.on('needBindEmail', (data) => {
            switchTab('bind');
            if (data.username) {
                document.getElementById('bind-user').value = data.username;
            }
            if (data.hasUnverifiedEmail) {
                showMsg("⚠️ 你的 Email 尚未驗證\n請重新綁定並完成驗證", "#e67e22");
            } else {
                showMsg("⚠️ 你的帳號尚未綁定 Email\n請在此綁定後用 Email 登入", "#e67e22");
            }
        });
    </script>
</body>
</html>
