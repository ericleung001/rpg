<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>冒險者公會 - 登入</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body { 
            background-color: #2c3e50; color: #ecf0f1; 
            font-family: 'Press Start 2P', monospace; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100dvh; margin: 0; 
            background-image: radial-gradient(#34495e 15%, transparent 16%), radial-gradient(#34495e 15%, transparent 16%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }

        .container {
            background: #fff; color: #333; 
            padding: 30px 20px; 
            border-radius: 10px; 
            border: 4px solid #000;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.5);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        h1 { font-size: 24px; margin-bottom: 30px; color: #e74c3c; text-shadow: 2px 2px 0 #000; }

        input {
            width: 100%; padding: 15px; margin: 10px 0; 
            font-family: inherit; font-size: 14px; 
            border: 2px solid #333; background: #eee;
            box-sizing: border-box;
            outline: none;
        }
        input:focus { background: #fff; border-color: #3498db; }

        .btn-group { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }

        button {
            flex: 1; padding: 15px; 
            font-family: inherit; font-size: 14px; font-weight: bold; 
            cursor: pointer; border: 2px solid #000; 
            transition: all 0.1s;
            min-width: 80px;
        }

        #btn-login { background: #2ecc71; color: white; }
        #btn-reg { background: #f1c40f; color: black; }
        #btn-change { background: #3498db; color: white; width: 100%; margin-top: 5px; }

        button:active { transform: translateY(3px); box-shadow: none; }
        
        #msg { margin-top: 15px; font-size: 12px; min-height: 20px; color: #c0392b; white-space: pre-line; }
        
        .footer { margin-top: 30px; font-size: 10px; color: #bdc3c7; }

        /* 修改密碼專用欄位 (預設隱藏) */
        #new-pass-area { display: none; margin-top: 10px; border-top: 2px dashed #ccc; padding-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>⚔️ 冒險者公會</h1>
        
        <input type="text" id="user" placeholder="帳號 或 Email" maxlength="100">
        <input type="password" id="pass" placeholder="密碼 (Password)" maxlength="20">
        
        <!-- 註冊時才顯示的 Email 欄位 -->
        <div id="email-area" style="display:none;">
            <input type="email" id="reg-email" placeholder="Email (註冊必填)" maxlength="100">
        </div>

        <div id="new-pass-area">
            <input type="password" id="new-pass" placeholder="新密碼 (8位+大寫+小寫+數字)" maxlength="30">
            <button onclick="doChangePass()" style="background:#8e44ad; color:white; width:100%;">確認修改</button>
            <button onclick="toggleChangeMode()" style="background:#95a5a6; color:white; width:100%; margin-top:5px;">取消</button>
        </div>

        <!-- 綁定 Email 區域 -->
        <div id="bind-email-area" style="display:none;">
            <div style="font-size:10px; color:#666; margin-bottom:8px;">
                舊玩家綁定 Email 後可用 Email 登入
            </div>
            <input type="email" id="bind-email" placeholder="輸入你的 Email" maxlength="100">
            <button onclick="doBindEmail()" style="background:#e67e22; color:white; width:100%; margin-top:5px;">確認綁定</button>
            <button onclick="toggleBindMode()" style="background:#95a5a6; color:white; width:100%; margin-top:5px;">取消</button>
        </div>

        <div class="btn-group" id="main-btns">
            <button id="btn-login" onclick="doAuth('login')">登入</button>
            <button id="btn-reg" onclick="showRegisterMode()">註冊</button>
            <button id="btn-change" onclick="toggleChangeMode()">修改密碼</button>
            <button id="btn-bind" onclick="toggleBindMode()" style="background:#e67e22; color:white; width:100%; margin-top:5px;">📧 綁定 Email (舊玩家)</button>
        </div>

        <div id="msg"></div>
    </div>

    <div class="footer">Server Status: <span id="status" style="color:red">Connecting...</span></div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    
    <script>
        
const socket = io('https://mmo.ttctv-105.cc', { 
    transports: ['websocket', 'polling'],
    secure: true // 因為你用 https，建議加呢個
});

        const statusSpan = document.getElementById('status');
        const msgDiv = document.getElementById('msg');
        const savedToken = localStorage.getItem('rpg_token');

        if (savedToken) {
            msgDiv.innerText = "嘗試自動登入中...";
        }

        socket.on('connect', () => {
            console.log("✅ 連線成功！Socket ID:", socket.id);
            statusSpan.innerText = "Online";
            statusSpan.style.color = "#2ecc71";
            if (savedToken) window.location.href = 'hub.html';
        });

        socket.on('connect_error', (err) => {
            console.error("❌ 連線失敗:", err);
            statusSpan.innerText = "Error";
            msgDiv.innerText = "無法連線伺服器，請稍後再試";
        });

        socket.on('disconnect', () => {
            statusSpan.innerText = "Offline";
            statusSpan.style.color = "red";
        });

        socket.on('authResult', (res) => {
            if (res.success) {
                msgDiv.style.color = "#27ae60";
                msgDiv.innerText = "✅ " + res.msg;
                
                if (res.token) {
                    localStorage.setItem('rpg_token', res.token);
                    setTimeout(() => window.location.href = 'hub.html', 1000);
                } else {
                    // 修改密碼成功後，重置介面
                    if (document.getElementById('new-pass-area').style.display === 'block') {
                        toggleChangeMode();
                        document.getElementById('user').value = '';
                        document.getElementById('pass').value = '';
                        document.getElementById('new-pass').value = '';
                    }
                }
            } else {
                msgDiv.style.color = "#c0392b";
                msgDiv.innerText = "❌ " + res.msg;
            }
        });

        // 綁定 Email 結果
        socket.on('bindEmailResult', (res) => {
            if (res.success) {
                msgDiv.style.color = "#27ae60";
                msgDiv.innerText = "✅ " + res.msg;
                setTimeout(() => toggleBindMode(), 2000);
            } else {
                msgDiv.style.color = "#c0392b";
                msgDiv.innerText = "❌ " + res.msg;
            }
        });

        // 強密碼驗證 (8位, 大寫, 小寫, 數字)
        function validatePassword(pw) {
            if (pw.length < 8) return "密碼長度需至少 8 位";
            if (!/[A-Z]/.test(pw)) return "密碼需包含大寫英文 (A-Z)";
            if (!/[a-z]/.test(pw)) return "密碼需包含小寫英文 (a-z)";
            if (!/[0-9]/.test(pw)) return "密碼需包含數字 (0-9)";
            return null; // 通過
        }

        let isRegisterMode = false;

        // 顯示註冊模式（展開 Email 欄位）
        function showRegisterMode() {
            if (isRegisterMode) {
                // 已在註冊模式 → 執行註冊
                doAuth('register');
            } else {
                // 切換到註冊模式
                isRegisterMode = true;
                document.getElementById('email-area').style.display = 'block';
                document.getElementById('btn-reg').innerText = '確認註冊';
                document.getElementById('btn-login').innerText = '◀ 返回登入';
                document.getElementById('btn-login').onclick = function() { hideRegisterMode(); };
                document.getElementById('btn-change').style.display = 'none';
                document.getElementById('btn-bind').style.display = 'none';
                document.getElementById('user').placeholder = '帳號 (Username)';
                msgDiv.innerText = "📧 新帳號需要填寫 Email";
                msgDiv.style.color = "#3498db";
            }
        }

        function hideRegisterMode() {
            isRegisterMode = false;
            document.getElementById('email-area').style.display = 'none';
            document.getElementById('btn-reg').innerText = '註冊';
            document.getElementById('btn-login').innerText = '登入';
            document.getElementById('btn-login').onclick = function() { doAuth('login'); };
            document.getElementById('btn-change').style.display = '';
            document.getElementById('btn-bind').style.display = '';
            document.getElementById('user').placeholder = '帳號 或 Email';
            msgDiv.innerText = "";
        }

        function doAuth(type) {
            const user = document.getElementById('user').value.trim();
            const pass = document.getElementById('pass').value.trim();
            
            if (!socket.connected) return showMsg("⚠️ 無法連線到伺服器");
            if (user.length < 3) return showMsg("⚠️ 帳號/Email 太短");

            if (type === 'register') {
                const err = validatePassword(pass);
                if (err) return showMsg("⚠️ " + err);

                // 註冊需要 email
                const email = document.getElementById('reg-email').value.trim();
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!email || !emailRegex.test(email)) {
                    return showMsg("⚠️ 請填寫正確的 Email 地址");
                }

                msgDiv.innerText = "處理中...";
                socket.emit('register', { user, pass, email });
            } else {
                // 登入：帳號或 email 都可以
                if (pass.length < 1) return showMsg("⚠️ 請輸入密碼");
                msgDiv.innerText = "處理中...";
                socket.emit('login', { user, pass });
            }
        }

        // 切換修改密碼模式
        function toggleChangeMode() {
            const area = document.getElementById('new-pass-area');
            const btns = document.getElementById('main-btns');
            
            // 同時關閉綁定模式
            document.getElementById('bind-email-area').style.display = 'none';
            
            if (area.style.display === 'none' || area.style.display === '') {
                area.style.display = 'block';
                btns.style.display = 'none';
                document.getElementById('user').placeholder = '帳號 (Username)';
                msgDiv.innerText = "請輸入帳號、舊密碼 與 新密碼";
                msgDiv.style.color = "#3498db";
            } else {
                area.style.display = 'none';
                btns.style.display = 'flex';
                document.getElementById('user').placeholder = '帳號 或 Email';
                msgDiv.innerText = "";
            }
        }

        // 切換綁定 Email 模式
        function toggleBindMode() {
            const area = document.getElementById('bind-email-area');
            const btns = document.getElementById('main-btns');
            
            // 同時關閉改密碼模式
            document.getElementById('new-pass-area').style.display = 'none';
            
            if (area.style.display === 'none' || area.style.display === '') {
                area.style.display = 'block';
                btns.style.display = 'none';
                document.getElementById('user').placeholder = '帳號 (Username)';
                msgDiv.innerText = "請輸入帳號、密碼，再填 Email";
                msgDiv.style.color = "#e67e22";
            } else {
                area.style.display = 'none';
                btns.style.display = 'flex';
                document.getElementById('user').placeholder = '帳號 或 Email';
                msgDiv.innerText = "";
            }
        }

        // 執行綁定 Email
        function doBindEmail() {
            const user = document.getElementById('user').value.trim();
            const pass = document.getElementById('pass').value.trim();
            const email = document.getElementById('bind-email').value.trim();

            if (!user || !pass || !email) return showMsg("請填寫所有欄位");
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) return showMsg("⚠️ Email 格式不正確");

            msgDiv.innerText = "綁定中...";
            socket.emit('bindEmail', { user, pass, email });
        }

        // 執行修改密碼
        function doChangePass() {
            const user = document.getElementById('user').value.trim();
            const oldPass = document.getElementById('pass').value.trim();
            const newPass = document.getElementById('new-pass').value.trim();

            if (!user || !oldPass || !newPass) return showMsg("請填寫所有欄位");
            
            // 驗證新密碼強度
            const err = validatePassword(newPass);
            if (err) return showMsg("⚠️ " + err);

            msgDiv.innerText = "修改中...";
            socket.emit('changePassword', { user, oldPass, newPass });
        }

        function showMsg(txt) {
            msgDiv.style.color = "#c0392b";
            msgDiv.innerText = txt;
        }
    </script>
</body>
</html>
