<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>裝備強化</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { 
            background-color: #2c3e50; color: #fff; 
            font-family: 'Press Start 2P', monospace; 
            text-align: center; margin: 0; padding: 0;
            display: flex; justify-content: center;
            height: 100dvh; overflow: hidden; 
        }

        #app-layout {
            display: flex;
            flex-direction: column; 
            width: 100%;
            height: 100%;
            max-width: 600px; 
            position: relative;
        }

        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
            padding: 15px;
            padding-bottom: 40px; 
            width: 100%;
            box-sizing: border-box;
        }
        
        .header { width: 100%; max-width: 600px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .gold-display { color: #f1c40f; font-size: 14px; font-weight: bold; }
        h1 { font-size: 20px; margin: 0; color: #e67e22; text-shadow: 2px 2px 0 #000; }

        .container { 
            width: 100%; max-width: 600px; flex: 1; 
            display: flex; flex-direction: column; gap: 15px; 
        }

        .enhance-card { 
            background: #34495e; border: 4px solid #7f8c8d; 
            padding: 15px; border-radius: 10px; 
            width: 100%; box-sizing: border-box; 
        }

        .slot-btn { 
            width: 100%; padding: 15px; margin: 8px 0; 
            border: 2px solid #bdc3c7; background: #2c3e50; color: white; 
            font-family: inherit; cursor: pointer; 
            display: flex; justify-content: space-between; align-items: center;
            border-radius: 6px; font-size: 10px;
            transition: all 0.2s;
        }
        .slot-btn:active { transform: scale(0.98); }
        .slot-btn.selected { border-color: #f1c40f; background: #222; box-shadow: 0 0 10px rgba(241, 196, 15, 0.3); }
        
        .enhance-info { 
            background: #222; padding: 20px; border: 2px dashed #e67e22; 
            margin-top: 10px; display: none; border-radius: 8px; 
            width: 100%; box-sizing: border-box; text-align: left;
        }
        
        .info-row { margin-bottom: 8px; font-size: 10px; display: flex; justify-content: space-between; }
        .plus-text { color: #f1c40f; font-weight: bold; }
        
        .risk-safe { color: #2ecc71; }
        .risk-drop { color: #e67e22; }
        .risk-break { color: #e74c3c; font-weight: bold; }

        .btn-group {
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px;
        }

        .btn { 
            padding: 12px 5px; 
            font-family: inherit; font-size: 10px; font-weight: bold;
            cursor: pointer; border: 2px solid #fff; color: white; width: 100%; 
            background: #c0392b; border-radius: 6px;
        }
        .btn-auto { background: #8e44ad; } 
        .btn-auto-10 { background: #27ae60; } 
        .btn-custom { background: #d35400; } 
        .btn:disabled { background: #555; cursor: not-allowed; opacity: 0.6; }
        
        .back-btn { 
            background: #7f8c8d; color: white; padding: 15px; 
            text-decoration: none; font-size: 14px; 
            border: 3px solid #fff; display: block; 
            width: 100%; max-width: 600px; box-sizing: border-box; border-radius: 8px;
            margin-top: 20px;
        }

        #game-toast {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.95); border: 2px solid #f1c40f; color: #fff;
            padding: 15px 30px; border-radius: 30px; z-index: 20000; font-size: 14px;
            font-weight: bold; white-space: nowrap; transition: top 0.5s ease-in-out; 
            pointer-events: none; 
        }

        #hammer-anim { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); z-index: 30000; display: none; 
            flex-direction: column; justify-content: center; align-items: center;
        }
        .hammer { font-size: 80px; animation: hit 0.5s infinite; }
        @keyframes hit { 0% { transform: rotate(0deg); } 50% { transform: rotate(-45deg); } 100% { transform: rotate(0deg); } }

        /* 防爆石 Checkbox 樣式 */
        .safe-stone-box {
            margin: 10px 0; padding: 8px; 
            border: 1px solid #555; border-radius: 5px; 
            background: rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: space-between;
        }
        .safe-stone-label {
            display: flex; align-items: center; cursor: pointer; font-size: 10px; color: #f1c40f;
        }
        .safe-stone-label input { margin-right: 8px; width: 16px; height: 16px; }

        /* --- 聊天室樣式 --- */
        #chat-container {
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: rgba(0, 0, 0, 0.95); border-top: 4px solid #bdc3c7;
            display: flex; flex-direction: column; font-size: 10px; 
            z-index: 12000; 
            padding-bottom: env(safe-area-inset-bottom);
            transition: height 0.3s ease-in-out;
            height: 30px; 
        }
        #chat-header {
            height: 30px; background: #34495e; color: #fff; line-height: 30px; 
            cursor: pointer; font-weight: bold; border-bottom: 1px solid #555;
            display: flex; justify-content: center; align-items: center;
            touch-action: manipulation; flex-shrink: 0; 
        }
        #chat-header:hover { background: #2c3e50; }
        .chat-open { height: 40vh !important; }
        #chat-body { flex: 1; display: none; flex-direction: column; overflow: hidden; }
        .chat-open #chat-body { display: flex; } 
        #chat-history { flex: 1; overflow-y: auto; padding: 8px; text-align: left; color: white; }
        #chat-input-area { display: flex; border-top: 1px solid #555; height: 40px; flex-shrink: 0; }
        #chat-input { flex: 1; background: #222; color: white; border: none; padding: 0 10px; font-family: inherit; font-size: 12px; outline: none; }
        #chat-send { background: #2980b9; color: white; border: none; padding: 0 15px; cursor: pointer; font-family: inherit; font-size: 12px; font-weight: bold; touch-action: manipulation; }

        @media (min-width: 1024px) {
            body { background-color: #222; }
            #app-layout {
                flex-direction: row; 
                max-width: 1000px; 
                background-color: #2c3e50;
                box-shadow: 0 0 20px rgba(0,0,0,0.5);
            }
            #main-content {
                width: 600px; 
                border-right: 4px solid #bdc3c7;
            }
            #chat-container {
                position: relative; 
                width: 400px;
                height: 100% !important; 
                border-top: none;
                background: #34495e;
            }
            #chat-header { cursor: default; background: #2c3e50; }
            #chat-header:active { pointer-events: none; }
            #chat-body { display: flex !important; height: calc(100% - 30px); }
        }
    </style>
</head>
<body>
    <div id="game-toast"></div>
    
    <div id="hammer-anim">
        <div class="hammer">🔨</div>
        <div id="hammer-text" style="color:white; margin-top:20px; font-size:14px;">強化進行中...</div>
    </div>

    <div id="app-layout">
        <div id="main-content">
            <div class="header">
                <h1> 裝備強化</h1>
                <div class="gold-display"> <span id="my-gold">0</span> G</div>
            </div>

            <div class="container">
                <div style="font-size: 10px; color: #bdc3c7; margin-bottom: 5px;">
                    消耗金幣與強化石提升裝備能力<br>
                    擁有強化石: <span id="stone-count" style="color:#2ecc71; font-size:12px;">0</span>
                </div>

                <div class="enhance-card">
                    <button id="btn-weapon" class="slot-btn" onclick="selectEnhanceSlot('weapon')">
                        <span>⚔️ 武器</span>
                        <span id="weapon-display">無</span>
                    </button>
                    <button id="btn-armor" class="slot-btn" onclick="selectEnhanceSlot('armor')">
                        <span>️ 防具</span>
                        <span id="armor-display">無</span>
                    </button>
                    <button id="btn-acc" class="slot-btn" onclick="selectEnhanceSlot('acc')">
                        <span> 飾品</span>
                        <span id="acc-display">無</span>
                    </button>
                </div>

                <div id="enhance-info" class="enhance-info">
                    <div id="target-name" style="color: #f1c40f; margin-bottom: 15px; font-size: 14px; font-weight: bold; text-align:center; border-bottom:1px solid #555; padding-bottom:10px;"></div>
                    
                    <div class="info-row"><span>當前等級:</span> <span id="cur-lv" style="color:#fff">0</span></div>
                    <div class="info-row"><span>強化目標:</span> <span id="next-lv" style="color:#f1c40f; font-weight:bold;">+1</span></div>
                    <div class="info-row"><span>成功機率:</span> <span id="rate-txt">100%</span></div>
                    <div class="info-row"><span>消耗金幣:</span> <span id="cost-txt" style="color:#f1c40f">1000</span></div>
                    <div class="info-row" style="margin-top:6px;">
                        <label style="font-size:11px; color:#9b59b6; cursor:pointer; display:flex; align-items:center; gap:6px;">
                            <input type="checkbox" id="pay-with-shard">
                            <span>💎 用碎片付款</span>
                        </label>
                    </div>
                    <div class="info-row"><span>消耗材料:</span> <span>強化石 x1</span></div>
                    
                    <div style="margin-top: 10px; border-top: 1px dashed #555; padding-top: 10px; text-align:center;">
                        失敗風險: <span id="risk-txt" class="risk-safe">無</span>
                    </div>

                    <div id="safe-stone-area" class="safe-stone-box">
                        <label class="safe-stone-label">
                            <input type="checkbox" id="use-safe-stone">
                            <span>使用防爆石 (必過)</span>
                        </label>
                        <div style="font-size:9px; color:#aaa;">擁有: <span id="safe-stone-count" style="color:white;">0</span></div>
                    </div>
                    
                    <div class="btn-group">
                        <button class="btn action-btn" onclick="doEnhance()">強化 x1</button>
                        <button class="btn btn-auto action-btn" onclick="startAutoEnhance(5)">連強 x5</button>
                        <button class="btn btn-auto-10 action-btn" onclick="startAutoEnhance(10)">連強 x10</button>
                        <button class="btn btn-custom action-btn" onclick="customAutoEnhance()">自訂 xN</button>
                    </div>
                </div>
            </div>

            <a href="hub.html" class="back-btn">◀ 返回大廳</a>
        </div>

        <div id="chat-container">
            <div id="chat-header" onclick="toggleChat()"> 公頻聊天室 (點擊展開)</div>
            <div id="chat-body">
                <div id="chat-history"></div>
                <div id="chat-input-area">
                    <input type="text" id="chat-input" placeholder="輸入訊息..." maxlength="50">
                    <button id="chat-send">發送</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        const socket = io('https://mmo.ttctv-105.cc', { 
    transports: ['websocket', 'polling'],
    secure: true // 因為你用 https，建議加呢個
});
        
        let myToken = localStorage.getItem('rpg_token');
        if (!myToken) window.location.href = 'index.html';

        let myData = null;
        let selectedEnhanceSlot = null;
        
        // 🟢 連續強化變數
        let remainingAutoCount = 0;
        let isProcessing = false;

        const ITEM_MAP = {
            'wood_sword': '木劍', 'copper_dagger': '銅匕首', 'iron_sword': '鐵劍', 'silver_blade': '銀刃',
            'spike_club': '狼牙棒', 'poison_dag': '劇毒匕首', 'shark_tooth': '鯊魚牙匕首',
            'flame_staff': '火焰法杖', 'emerald_staff': '翡翠法杖', 'gold_axe': '黃金巨斧',
            'obsidian_blade': '黑曜石之劍', 'frost_bow': '寒冰弓', 'dragon_spear': '龍骨長槍',
            'mithril_saber': '秘銀軍刀', 'void_reaper': '虛空收割者', 'void_reaper_dark': '闇·虛空收割者',
            'god_slayer': '弒神劍', 'chaos_staff': '混沌法杖', 'hero_sword': '勇者之劍',
            'steel_blade': '精鋼劍', 'assassin_dag': '刺客短刀', 'genesis_weapon': '創世·終焉之劍',
            'void_blade': '虛空之刃', 'galaxy_saber': '銀河光劍', 'entropy_sword': '終焉·熱寂之劍',
            'oak_bow': '橡木弓', 'maple_staff': '楓木法杖',
            'cloth_armor': '布衣', 'hunt_vest': '獵人背心', 'leather_armor': '皮甲', 'plate_mail': '板金甲',
            'dragon_mail': '龍鱗甲', 'chain_mail': '鎖子甲', 'iron_armor': '鐵盔甲', 'magma_plate': '熔岩胸甲',
            'ice_robe': '冰霜法袍', 'yeti_cloak': '雪怪斗篷', 'demon_armor': '惡魔戰甲',
            'angel_armor': '熾天使鎧甲', 'genesis_armor': '創世·神之庇護',
            'void_armor': '虛空戰甲', 'nebula_plate': '星雲板甲', 'entropy_god_armor': '終焉·神之庇護',
            'bone_ring': '骨戒', 'ring_str': '力量戒指', 'bracelet_def': '堅毅手環',
            'necklace_hp': '紅水晶項鍊', 'necklace_mp': '藍水晶項鍊', 'snake_boots': '蛇皮長靴',
            'fish_ring': '魚鱗戒指', 'pearl_necklace': '珍珠項鍊', 'amulet_soul': '靈魂護符',
            'ring_lord': '領主指環', 'crown_chaos': '混沌之冠', 'ring_galaxy': '銀河指環',
            'ring_life': '生命護符', 'ring_magic': '魔力耳環', 'dimension_ring': '維度指環',

            // Lv.450 - 500 新裝備
            'infinity_blade': '無限之刃',
            'event_horizon': '視界戰甲',
            'mobius_ring': '莫比烏斯環',
            'singularity_weapon': '奇點·萬象崩壞',
            'singularity_armor': '奇點·絕對防禦',
            'singularity_acc': '奇點·因果律',
            'shard_ring_novice': '學徒碎片戒指',   // Lv.10
    'shard_neck_brave': '勇者碎片項鍊',    // Lv.30
    'shard_charm_wind': '疾風碎片護符',    // Lv.60
    'shard_ring_vampire': '吸血鬼碎片指環', // Lv.100 (特殊：吸血)
    'shard_earring_holy': '神聖碎片耳環',   // Lv.150 (高魔力)
    'shard_belt_titan': '泰坦碎片腰帶',    // Lv.200 (高防禦)
    'shard_pendant_dragon': '龍魂碎片吊墜', // Lv.300 (高攻防)
    'shard_ring_void': '虛空碎片之戒',     // Lv.400
    'shard_core_galaxy': '銀河碎片核心',   // Lv.450
    'shard_crown_infinity': '無限碎片皇冠', // Lv.500 (畢業級)
                // 在 ITEM_NAME_MAP 中加入：
        'shard_blade_novice': '碎光長劍',
        'shard_axe_crystal': '晶體戰斧',
        'shard_scythe_void': '虛空撕裂者',
        'shard_spear_galaxy': '星河·貫穿之槍',
        'shard_wep_dimension': '維度·終焉裁決',
        'shard_wep_origin': '原初·萬物歸零',
        // 在 ITEM_NAME_MAP 中加入：
        'shard_armor_novice': '碎光輕甲',
        'shard_armor_crystal': '晶體戰甲',
        'shard_robe_void': '虛空行者法袍',
        'shard_plate_galaxy': '星河·不滅壁壘',
        'shard_armor_dimension': '維度·虛數裝甲',
        'shard_armor_origin': '原初·混沌神軀',
        'myth_weapon': '神話·毀滅之刃',
        'myth_armor': '神話·絕對防禦',
        'myth_acc': '神話·命運之環',
        'myth2_weapon': '神話II·天裁之劍',
        'myth2_armor': '神話II·永恆聖壁',
        'myth2_acc': '神話II·命運輪迴',
        'myth3_weapon': '神話III·宇宙終焉之刃',
        'myth3_armor': '神話III·永恆宇宙聖壁',
        'myth3_acc': '神話III·宇宙命運之環'
        };

        // 🟢 [前端設定] 強化機率表 (需與 Server 保持一致)
        const ENHANCE_RATES = {
    // === +1 ~ +10 (基礎強化) ===
    1: { rate: 1.0,  cost: 1000,  risk: 'safe' },    
    2: { rate: 1.0,  cost: 2000,  risk: 'safe' },
    3: { rate: 1.0,  cost: 5000,  risk: 'safe' },
    4: { rate: 0.8,  cost: 10000, risk: 'drop' },    
    5: { rate: 0.8,  cost: 20000, risk: 'drop' },
    6: { rate: 0.7,  cost: 40000, risk: 'drop' },
    7: { rate: 0.7,  cost: 80000, risk: 'drop' },  
    8: { rate: 0.6,  cost: 150000,risk: 'drop' },
    9: { rate: 0.6,  cost: 300000,risk: 'drop' },
    10:{ rate: 0.5,  cost: 1000000,risk: 'drop'},

    // === +11 ~ +15 (進階強化 - 失敗降級) ===
    11:{ rate: 0.5, cost: 2000000, risk: 'drop'}, // 50%
    12:{ rate: 0.4, cost: 3000000, risk: 'drop'},
    13:{ rate: 0.4, cost: 5000000, risk: 'drop'}, 
    14:{ rate: 0.3, cost: 8000000, risk: 'drop'},
    15:{ rate: 0.3, cost: 10000000,risk: 'drop'}, // 30%

    // === +16 ~ +20 (神話強化 - 失敗破碎) ===
    16:{ rate: 0.3,  cost: 20000000, risk: 'break'}, // 10%
    17:{ rate: 0.3, cost: 30000000, risk: 'break'}, // 7%
    18:{ rate: 0.3, cost: 50000000, risk: 'break'}, // 5%
    19:{ rate: 0.3, cost: 80000000, risk: 'break'}, // 3%
    20:{ rate: 0.3, cost: 100000000,risk: 'break'}, // 1% (1億G)

    // === [新增] +21 ~ +25 (虛空強化 - 失敗破碎) ===
    21:{ rate: 0.3, cost: 150000000, risk: 'break'}, // 0.5% (1.5億G)
    22:{ rate: 0.3, cost: 200000000, risk: 'break'}, // 0.4% (2億G)
    23:{ rate: 0.3, cost: 300000000, risk: 'break'}, // 0.3% (3億G)
    24:{ rate: 0.2, cost: 400000000, risk: 'break'}, // 0.2% (4億G)
    25:{ rate: 0.1, cost: 500000000, risk: 'break'}, // 0.1% (5億G) - 千分之一

    // === [新增] +26 ~ +30 (創世強化 - 奇蹟機率) ===
    26:{ rate: 0.05, cost: 1000000000, risk: 'break'}, // 0.05% (10億G) - 萬分之五
    27:{ rate: 0.03, cost: 2000000000, risk: 'break'}, // 0.03% (20億G)
    28:{ rate: 0.02, cost: 4000000000, risk: 'break'}, // 0.01% (40億G) - 萬分之一
    29:{ rate: 0.01,cost: 6000000000, risk: 'break'}, // 0.005% (60億G)
    30:{ rate: 0.01,cost: 10000000000,risk: 'break'}  // 0.001% (100億G) - 十萬分之一
};

        socket.on('connect', () => { socket.emit('joinGame', myToken); });

        socket.on('playerStatsUpdate', (p) => {
            myData = p;
            document.getElementById('my-gold').innerText = p.gold.toLocaleString();
            updateUI();
        });

        // 🟢 處理強化結果 (含狀態重置)
        socket.on('enhanceResult', (res) => {
            showMsg(res.msg);

            // 處理連強邏輯
            if (remainingAutoCount > 0) {
                if (res.broken || (res.success && res.lv >= 30)) { // 如果碎了或滿級，停止連強
                    stopAutoEnhance("強化中止");
                } else {
                    remainingAutoCount--;
                    document.getElementById('hammer-text').innerText = `連強中... 剩餘 ${remainingAutoCount} 次`;
                    
                    if (remainingAutoCount > 0) {
                        setTimeout(executeEnhance, 1000);
                    } else {
                        stopAutoEnhance("連強完成");
                    }
                }
            } else {
                isProcessing = false; 
                document.getElementById('hammer-anim').style.display = 'none';
                unlockAllButtons();
                if (selectedEnhanceSlot) selectEnhanceSlot(selectedEnhanceSlot);
            }

            if(res.broken) {
                document.getElementById('enhance-info').style.display = 'none';
                selectedEnhanceSlot = null;
                document.querySelectorAll('.slot-btn').forEach(el => el.classList.remove('selected'));
                isProcessing = false; 
                unlockAllButtons();
            }
        });

        socket.on('errorMessage', (msg) => { 
            stopAutoEnhance("發生錯誤");
            alert("❌ " + msg); 
            isProcessing = false;
            unlockAllButtons();
        });

        socket.on('chatHistory', (history) => {
            const box = document.getElementById('chat-history');
            box.innerHTML = ''; 
            history.forEach(data => appendChat(data.name, data.msg));
        });
        socket.on('chatMessage', (data) => { if (data.isRoomChat) return; appendChat(data.name, data.msg); });
        
        function appendChat(name, msg) {
            const history = document.getElementById('chat-history');
            const div = document.createElement('div');
            const nameSpan = document.createElement('span');
            nameSpan.style.color = '#f1c40f'; nameSpan.style.fontWeight = 'bold';
            nameSpan.textContent = `[${name}]: `;
            div.appendChild(nameSpan); div.appendChild(document.createTextNode(msg));
            history.appendChild(div); history.scrollTop = history.scrollHeight;
        }

        document.getElementById('chat-send').onclick = sendChat;
        document.getElementById('chat-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendChat(); });
        function sendChat() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if (msg) { socket.emit('sendChat', msg); input.value = ''; }
        }
        function toggleChat() {
            const chat = document.getElementById('chat-container');
            const header = document.getElementById('chat-header');
            if (window.innerWidth >= 1024) return;
            chat.classList.toggle('chat-open');
            header.innerText = chat.classList.contains('chat-open') ? " 點擊收起" : " 公頻聊天室 (點擊展開)";
        }

        function updateUI() {
            if(!myData) return;
            const stones = myData.inventory['enhance_stone'] || 0;
            const safeStones = myData.inventory['safe_stone'] || 0;
            document.getElementById('stone-count').innerText = stones;
            document.getElementById('safe-stone-count').innerText = safeStones; // 更新防爆石數量

            updateSlotDisplay('weapon');
            updateSlotDisplay('armor');
            updateSlotDisplay('acc');

            if (selectedEnhanceSlot && !isProcessing) {
                selectEnhanceSlot(selectedEnhanceSlot);
            }
        }

        function updateSlotDisplay(slot) {
            const el = document.getElementById(`${slot}-display`);
            const itemId = myData.equipment[slot];
            
            if (itemId) {
                const lv = (myData.enhancements && myData.enhancements[itemId]) || 0;
                let name = ITEM_MAP[itemId] || itemId;
                
                if (lv > 0) {
                    name += ` <span class="plus-text">+${lv}</span>`;
                }
                el.innerHTML = name;
                el.style.color = "#fff";
            } else {
                el.innerHTML = `<span style="color:#555">無</span>`;
            }
        }

        function selectEnhanceSlot(slot) {
            if (isProcessing) return;

            document.querySelectorAll('.slot-btn').forEach(el => el.classList.remove('selected'));
            document.getElementById(`btn-${slot}`).classList.add('selected');

            const itemId = myData.equipment[slot];
            if (!itemId) {
                document.getElementById('enhance-info').style.display = 'none';
                selectedEnhanceSlot = null;
                alert("該部位沒有裝備！");
                return;
            }

            selectedEnhanceSlot = slot;
            const currentLv = (myData.enhancements && myData.enhancements[itemId]) || 0;
            const nextLv = currentLv + 1;

            if (nextLv > 30) {
                document.getElementById('enhance-info').style.display = 'block';
                document.getElementById('target-name').innerText = (ITEM_MAP[itemId] || itemId) + " (MAX)";
                document.querySelector('.btn-group').style.display = 'none';
                document.getElementById('safe-stone-area').style.display = 'none';
                return;
            } else {
                document.querySelector('.btn-group').style.display = 'grid'; 
            }

            const config = ENHANCE_RATES[nextLv];
            
            document.getElementById('enhance-info').style.display = 'block';
            document.getElementById('target-name').innerText = ITEM_MAP[itemId] || itemId;
            
            document.getElementById('cur-lv').innerText = `+${currentLv}`;
            document.getElementById('next-lv').innerText = `+${nextLv}`;
            
            // 🟢 [顯示] 計算顯示的機率 (處理極小數值)
            let displayRate = (config.rate * 100);
            let rateString = displayRate < 0.01 ? displayRate.toFixed(4) : (displayRate < 1 ? displayRate.toFixed(2) : Math.floor(displayRate));
            
            document.getElementById('rate-txt').innerText = `${rateString}%`;
            const shardEquiv = Math.ceil(config.cost * 0.01);
            document.getElementById('cost-txt').innerText = config.cost.toLocaleString() + " G  |  💎 " + shardEquiv.toLocaleString() + " 碎片";
            
            const riskEl = document.getElementById('risk-txt');
            riskEl.className = "";
            if (config.risk === 'safe') {
                riskEl.innerText = "安全 (無懲罰)"; riskEl.classList.add("risk-safe");
            } else if (config.risk === 'drop') {
                riskEl.innerText = "危險 (失敗降級)"; riskEl.classList.add("risk-drop");
            } else {
                riskEl.innerText = "極度危險 (失敗裝備消失)"; riskEl.classList.add("risk-break");
            }

            // 🟢 檢查是否隱藏防爆石選項 (Lv.26 以上隱藏)
            const safeStoneArea = document.getElementById('safe-stone-area');
            const safeStoneCheckbox = document.getElementById('use-safe-stone');

            if (nextLv > 25) {
                safeStoneArea.style.display = 'none'; // 隱藏
                safeStoneCheckbox.checked = false; // 強制取消勾選
            } else {
                safeStoneArea.style.display = 'flex'; // 顯示
            }
        }

        function doEnhance() {
            if (!selectedEnhanceSlot || isProcessing) return;
            if (!checkRequirements()) return;

            // 🟢 檢查是否勾選防爆石
            const useSafe = document.getElementById('use-safe-stone').checked;
            const msg = useSafe 
                ? `確定要消耗 [防爆石] 進行 100% 強化嗎？` 
                : `確定要強化嗎？\n失敗可能會導致降級或消失！`;

            if (confirm(msg)) {
                remainingAutoCount = 0; 
                startProcess("強化進行中...");
                setTimeout(executeEnhance, 1500);
            }
        }

        function startAutoEnhance(count) {
            if (!selectedEnhanceSlot || isProcessing) return;
            if (!checkRequirements()) return;

            // 🟢 連強模式下，強制取消勾選防爆石 (避免誤觸連續消耗)
            const safeCheckbox = document.getElementById('use-safe-stone');
            if (safeCheckbox.checked) {
                if(!confirm("⚠️ 注意：連強模式將【取消】使用防爆石。\n如需使用防爆石，請使用單次強化。\n是否繼續？")) return;
                safeCheckbox.checked = false;
            }

            if (confirm(`確定要連續強化 ${count} 次嗎？\n(如果裝備爆掉或滿級會自動停止)`)) {
                remainingAutoCount = count; 
                startProcess(`連強中... ${count}/${count}`);
                setTimeout(executeEnhance, 1500);
            }
        }

        // 🟢 自訂連強次數
        function customAutoEnhance() {
            if (!selectedEnhanceSlot || isProcessing) return;
            if (!checkRequirements()) return;

            const input = prompt("請輸入連續強化次數 (1-50):", "10");
            if (input === null) return;
            
            let count = parseInt(input);
            if (isNaN(count) || count < 1) count = 1;
            if (count > 50) count = 50; // 防呆上限

            // 🟢 同樣檢查防爆石
            const safeCheckbox = document.getElementById('use-safe-stone');
            if (safeCheckbox.checked) {
                if(!confirm("⚠️ 注意：連強模式將【取消】使用防爆石。\n如需使用防爆石，請使用單次強化。\n是否繼續？")) return;
                safeCheckbox.checked = false;
            }

            if (confirm(`確定要連續強化 ${count} 次嗎？\n(如果裝備爆掉或滿級會自動停止)`)) {
                remainingAutoCount = count; 
                startProcess(`連強中... ${count}/${count}`);
                setTimeout(executeEnhance, 1500);
            }
        }

        function checkRequirements() {
            const itemId = myData.equipment[selectedEnhanceSlot];
            const currentLv = (myData.enhancements && myData.enhancements[itemId]) || 0;
            const nextLv = currentLv + 1;
            
            if (nextLv > 30) { alert("已達最大等級"); return false; }

            const config = ENHANCE_RATES[nextLv];
            const stones = myData.inventory['enhance_stone'] || 0;
            const safeStones = myData.inventory['safe_stone'] || 0;
            const useSafe = document.getElementById('use-safe-stone').checked;

            const useShards = (document.getElementById('pay-with-shard') || {}).checked || false;
            if (useShards) {
                const shardNeed = Math.ceil(config.cost * 0.01);
                if ((myData.inventory['skill_shard'] || 0) < shardNeed) { alert(`碎片不足！需要 ${shardNeed} 塊技能碎片`); return false; }
            } else if (myData.gold < config.cost) { alert("金幣不足！"); return false; }
            
            if (useSafe) {
                if (safeStones < 1) { alert("防爆石不足！"); return false; }
            } else {
                if (stones < 1) { alert("強化石不足！"); return false; }
            }
            
            return true;
        }

        function startProcess(msg) {
            isProcessing = true;
            document.getElementById('hammer-text').innerText = msg;
            document.getElementById('hammer-anim').style.display = 'flex';
            lockAllButtons();
        }

        function stopAutoEnhance(msg) {
            isProcessing = false;
            remainingAutoCount = 0;
            document.getElementById('hammer-anim').style.display = 'none';
            if (msg) showMsg(msg);
            
            unlockAllButtons();
            
            if (selectedEnhanceSlot) selectEnhanceSlot(selectedEnhanceSlot);
        }

        function lockAllButtons() {
            document.querySelectorAll('.action-btn').forEach(b => b.disabled = true);
            document.querySelectorAll('.slot-btn').forEach(b => b.disabled = true);
            document.getElementById('use-safe-stone').disabled = true; // 鎖定 checkbox
        }

        function unlockAllButtons() {
            document.querySelectorAll('.action-btn').forEach(b => b.disabled = false);
            document.querySelectorAll('.slot-btn').forEach(b => b.disabled = false);
            document.getElementById('use-safe-stone').disabled = false; // 解鎖 checkbox
        }

        function executeEnhance() {
            if (!checkRequirements()) {
                stopAutoEnhance("資源不足，停止強化");
                return;
            }
            // 🟢 傳送包含防爆石狀態的物件
            const useSafe = document.getElementById('use-safe-stone').checked;
            const useShardsPay = (document.getElementById('pay-with-shard') || {}).checked || false;
            socket.emit('enhanceItem', { slot: selectedEnhanceSlot, useSafeStone: useSafe, useShardPay: useShardsPay });
        }

        function showMsg(text) {
            const toast = document.getElementById('game-toast');
            toast.innerText = text;
            toast.style.top = "30px"; 
            setTimeout(() => { toast.style.top = "-100px"; }, 3000);
        }
    </script>
</body>
</html>
